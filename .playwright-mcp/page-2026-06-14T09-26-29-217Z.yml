  - dialog [ref=e356]:
    - generic [ref=e360]:
      - generic [ref=e362]:
        - generic [ref=e363]: Introduction to course competencies
        - img [ref=e365] [cursor=pointer]
      - separator [ref=e367]
      - generic [ref=e368]:
        - generic [ref=e369]:
          - heading "What is Adaptive Learning?" [level=5] [ref=e370]
          - paragraph [ref=e371]: Adaptive learning tailors educational content to each student's unique needs, adjusting in real-time based on their performance. By providing personalized support and challenges, it helps students learn more efficiently, stay engaged, and achieve mastery at their own pace.
          - paragraph [ref=e372]: In Artemis course competencies are the foundation for Adaptive Learning. They are overarching learning objectives that can be obtained by interacting with different lectures and exercises. Based on these competency models Artemis can offer students personalized learning paths that fit their individual needs.
          - heading "Why?" [level=5] [ref=e373]
          - paragraph [ref=e374]: Competency-based education empowers students to master skills at their own pace, ensuring real progress and confidence. It creates a personalized, engaging learning experience that leads to better outcomes and long-term success. So, even without enabling learning paths, students benefit from being able to track their progress.
          - paragraph [ref=e375]: With learning paths, students receive recommendations to support their learning efforts. Making it easier for them to master all the required competencies of a course.
        - separator [ref=e376]
        - generic [ref=e377]:
          - heading "How to create a course competency?" [level=5] [ref=e378]
          - paragraph [ref=e379]: In general we distinguish between a competency and a prerequisite.
          - paragraph [ref=e380]: To create a competency, click the 'Create Competency' button at the top of the competency page. On the creation page, you can specify a unique name and an appropriate description for the competency. Additionally, you have the option to set a recommended completion date, which indicates to students by when they should master the connected learning objects.
          - paragraph [ref=e381]: You can also add taxonomy to the competency, providing students with greater insight into its purpose. If certain learning objects within this competency are optional, you can establish a threshold for when the competency will be considered mastered. You also have the option to mark the entire competency as optional.
          - paragraph [ref=e382]: Finally, you can directly link lecture content to the competency. While you can also connect exercises to a competency, this must be done in the exercise edit/creation view.
          - 'generic "Tutorial: Creating course competencies" [ref=e384]'
          - paragraph [ref=e385]:
            - text: In addition to creating competencies or prerequisites yourself, you can also import them from other courses or utilize standardized competencies. For more information on this process, please refer to the user
            - link "manual for Artemis." [ref=e386] [cursor=pointer]:
              - /url: https://docs.artemis.tum.de/instructor/adaptive-learning
        - separator [ref=e387]
        - generic [ref=e388]:
          - heading "What are course competency relationships?" [level=5] [ref=e389]
          - paragraph [ref=e390]: Course competencies can support or rely on one another, which is why you can establish different types of relationships between them. Competencies can either MATCH, EXTEND, or REQUIRE each other. Detailed descriptions of these relationships are provided below.
          - strong [ref=e391]:
            - paragraph [ref=e392]: "In summary:"
          - paragraph [ref=e393]:
            - text: MATCH is about equivalency between two skills.
            - text: EXTEND is about building on an existing skill.
            - text: REQUIRE means one skill is a prerequisite for another.
          - paragraph [ref=e394]: To create these relationships, open the 'Edit Relations' window. In this window, you can either select the related competencies or click on each one consecutively. After that, choose the desired relation type and create the relationship. To update or delete a relation, simply click on the specific relation and either update the relation type in the form or delete it.
          - 'generic "Tutorial: Creating course competency relations" [ref=e396]'
          - generic [ref=e397]:
            - heading "1. MATCH" [level=6] [ref=e398]
            - paragraph [ref=e399]: This relationship implies that two competencies are at the same level, covering the same skills and requirements. If you have one, you already have the other, and they can be considered interchangeable.
            - strong [ref=e400]:
              - paragraph [ref=e401]: "Example:"
            - paragraph [ref=e402]: "Competency A: Balancing on a stationary bike. Competency B: Standing on one leg (balancing without moving). Here, balancing on a stationary bike might \"MATCH\" with balancing on one leg because both involve the same fundamental skill of balance. If you can do one, you're very likely able to do the other, as the core competency (balance) is the same in both scenarios."
          - generic [ref=e403]:
            - heading "2. EXTEND" [level=6] [ref=e404]
            - paragraph [ref=e405]: This relationship means one competency adds complexity or expands on another. In other words, once you have mastered one competency, you can move on to mastering the extended one, which takes that skill further.
            - strong [ref=e406]:
              - paragraph [ref=e407]: "Example:"
            - paragraph [ref=e408]: "Competency A: Riding a bike in a straight line. Competency B: Riding a bike around curves and turns. Riding in a straight line is the foundational skill that \"EXTENDS\" into riding around curves and turns. Competency B builds upon Competency A by adding the need to navigate changes in direction while maintaining balance and control. Once you can ride in a straight line, you're ready to extend that ability to more complex riding scenarios."
          - generic [ref=e409]:
            - heading "3. REQUIRES" [level=6] [ref=e410]
            - paragraph [ref=e411]: This relationship implies that one competency relies on another being already mastered. To perform the more advanced competency, the learner must first have the underlying skill or knowledge.
            - strong [ref=e412]:
              - paragraph [ref=e413]: "Example:"
            - paragraph [ref=e414]: "Competency A: Riding a bike with confidence on flat terrain. Competency B: Riding a bike uphill. Riding a bike uphill \"REQUIRES\" that the learner has already mastered riding on flat terrain. The skill of riding on flat ground is a prerequisite because uphill riding adds more resistance and requires additional strength and technique. Without mastering the basic competency of flat-ground riding, the learner wouldn't be ready to tackle riding uphill."