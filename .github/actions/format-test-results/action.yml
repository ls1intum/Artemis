name: 'Format Test Results'
description: 'Produce formatted markdown fragments for the E2E PR comment from raw test data'

inputs:
  summary:
    description: 'Raw summary HTML from mikepenz/action-junit-report'
    required: false
    default: ''
  wall-clock-duration:
    description: 'Human-readable wall-clock duration to substitute into the summary'
    required: false
    default: ''
  failures:
    description: 'Multiline failure lines from extract-failed-tests'
    required: false
    default: ''
  phase-label:
    description: 'Label for the failures details section (e.g. "Phase 1", "Phase 2")'
    required: false
    default: ''
  test-outcome:
    description: 'The test step outcome ("success" or "failure")'
    required: true
  job-status:
    description: 'The job.status value'
    required: true
  reporter-failed:
    description: 'Set to "true" if the monocart reporter failed'
    required: false
    default: ''

outputs:
  formatted-summary:
    description: 'Summary HTML with wall-clock time replaced'
    value: ${{ steps.format.outputs.formatted-summary }}
  failures-section:
    description: 'Formatted markdown details block with failed tests (empty if none)'
    value: ${{ steps.format.outputs.failures-section }}
  reporter-note:
    description: 'Reporter-failed warning note (empty if not applicable)'
    value: ${{ steps.format.outputs.reporter-note }}
  infra-note:
    description: 'Infrastructure issue warning note (empty if not applicable)'
    value: ${{ steps.format.outputs.infra-note }}
  status-emoji:
    description: 'Status emoji (checkmark or cross)'
    value: ${{ steps.format.outputs.status-emoji }}
  status-text:
    description: '"Passed" or "Failed"'
    value: ${{ steps.format.outputs.status-text }}
  details:
    description: 'Formatted summary or fallback text'
    value: ${{ steps.format.outputs.details }}

runs:
  using: 'composite'
  steps:
    - name: Format results
      id: format
      uses: actions/github-script@v8
      with:
        result-encoding: string
        script: |
          const wallClock = `${{ inputs.wall-clock-duration }}`;
          let summary = `${{ inputs.summary }}`;

          // The summary from mikepenz/action-junit-report@v6.3.0 is an HTML table where
          // the last <td> before </tr></table> is the cumulative test time across all
          // parallel worker threads. We replace it with the wall-clock duration since the
          // cumulative time overstates the real elapsed time when tests run in parallel.
          //
          // Example summary HTML:
          //   <table><tr><th>...</th><th>Time ⏱</th></tr>
          //   <tr><td>28 ran</td><td>28 passed</td>...<td>5m 33s 789ms</td></tr></table>
          //                                               ^^^^^^^^^^^^^^ replaced
          if (wallClock) {
            summary = summary.replace(/<td>[^<]*<\/td>(<\/tr><\/table>)/, `<td>${wallClock}</td>$1`);
          }

          const testOutcome = '${{ inputs.test-outcome }}';
          const jobStatus = '${{ inputs.job-status }}';
          const failures = `${{ inputs.failures }}`;
          const phaseLabel = '${{ inputs.phase-label }}';
          const reporterFailed = '${{ inputs.reporter-failed }}';

          const emoji = testOutcome === 'success' ? '✅' : '❌';
          const statusText = testOutcome === 'success' ? 'Passed' : 'Failed';
          const details = summary || (testOutcome === 'success' ? 'All tests passed' : 'Tests failed');

          let failuresSection = '';
          if (failures.trim()) {
            const label = phaseLabel ? `Failed Tests (${phaseLabel})` : 'Failed Tests';
            failuresSection = `\n\n<details><summary>❌ ${label}</summary>\n\n`;
            for (const line of failures.trim().split('\n')) {
              failuresSection += `- \`${line}\`\n`;
            }
            failuresSection += '\n</details>\n';
          }

          let reporterNote = '';
          if (reporterFailed === 'true') {
            const phaseNote = phaseLabel ? ` in ${phaseLabel}` : '';
            reporterNote = `\n\n> **Note:** The test reporter (monocart) failed${phaseNote}. Test results were not affected, but coverage data may be incomplete.`;
          }

          let infraNote = '';
          if (testOutcome === 'success' && jobStatus !== 'success') {
            infraNote = '\n\n> ⚠️ **Note:** Tests passed but the job encountered an infrastructure issue (e.g., artifact upload failure). See the workflow run linked below for details.';
          }

          core.setOutput('formatted-summary', summary);
          core.setOutput('failures-section', failuresSection);
          core.setOutput('reporter-note', reporterNote);
          core.setOutput('infra-note', infraNote);
          core.setOutput('status-emoji', emoji);
          core.setOutput('status-text', statusText);
          core.setOutput('details', details);

          return '';
