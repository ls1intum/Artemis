name: 'E2E Test Setup'
description: 'Common setup steps for E2E test jobs'

inputs:
  workflow-run-id:
    description: 'Run ID that holds the `docker-tag` artifact (the umbrella run id under workflow_call).'
    required: true
  github-token:
    description: 'Token for the cross-job artifact download.'
    required: true
  test-notice:
    description: 'Optional human-readable notice describing the test selection (logged for the run).'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Add link to triggering workflow
      shell: bash
      env:
        RUN_ID: ${{ inputs.workflow-run-id }}
        REPO: ${{ github.repository }}
        # `test-notice` is composed from determine-relevant-tests.sh output; route through
        # env to keep its content out of shell-injection paths.
        NOTICE: ${{ inputs.test-notice }}
      run: |
        echo "::notice title=Triggered by workflow run::This E2E test was triggered by workflow run #$RUN_ID - View it at https://github.com/$REPO/actions/runs/$RUN_ID"
        if [ -n "$NOTICE" ]; then
          echo "::notice title=Test Selection::$NOTICE"
        fi

    - name: Download Docker tag
      uses: actions/download-artifact@v8
      with:
        name: docker-tag
        github-token: ${{ inputs.github-token }}
        run-id: ${{ inputs.workflow-run-id }}

    - name: Set Docker Tag Environment Variable
      shell: bash
      run: |
        if [ -f "docker-tag.txt" ]; then
          ARTEMIS_DOCKER_TAG=$(cat docker-tag.txt)
          echo "ARTEMIS_DOCKER_TAG=${ARTEMIS_DOCKER_TAG}" >> $GITHUB_ENV
          echo "Using Docker tag: ${ARTEMIS_DOCKER_TAG}"
        else
          echo "::error::No docker-tag.txt found in the previous build workflow! Artifact is needed to run E2E tests."
          exit 1
        fi

    - name: Make scripts executable
      shell: bash
      run: |
        chmod +x .ci/E2E-tests/cleanup.sh
        chmod +x .ci/E2E-tests/execute.sh

    - name: Run cleanup script (before E2E)
      shell: bash
      run: .ci/E2E-tests/cleanup.sh

    - name: Clean old test results
      shell: bash
      run: |
        echo "Cleaning up old test results from previous runs..."
        rm -rf src/test/playwright/test-reports/*.xml || true
        rm -rf src/test/playwright/test-reports/monocart-report-* || true
        rm -rf src/test/playwright/test-reports/client-coverage || true
        rm -f src/test/playwright/test-reports/.reporter-failed || true
        ls -la src/test/playwright/test-reports/ 2>/dev/null || echo "test-reports directory does not exist yet"
        echo "Test results cleanup complete"
