name: 'Find E2E PR Comment'
description: 'Find the existing E2E comment on a PR, if any'

inputs:
  pr-number:
    description: 'PR number to search within'
    required: true

outputs:
  pr-number:
    description: 'The PR number, echoed for caller convenience (empty string if pr-number is 0)'
    value: ${{ inputs.pr-number != '0' && inputs.pr-number || '' }}
  comment-id:
    description: 'The existing E2E comment ID (empty string if not found)'
    value: ${{ steps.find-comment.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Find existing E2E comment
      id: find-comment
      if: inputs.pr-number != '0'
      uses: actions/github-script@v9
      env:
        PR_NUMBER: ${{ inputs.pr-number }}
      with:
        result-encoding: string
        script: |
          const prNumber = Number(process.env.PR_NUMBER);
          const marker = '<!-- E2E Test Results -->';
          const MAX_PAGES = 50;
          for (let page = 1; page <= MAX_PAGES; page++) {
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
              page,
            });
            if (!comments.length) break;
            const found = comments.find(c => c.body && c.body.includes(marker));
            if (found) return found.id;
          }
          return '';
