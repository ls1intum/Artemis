name: 'Wall-Clock Timer'
description: 'Record a start time or compute elapsed wall-clock duration'

inputs:
  mode:
    description: '"start" to record the current time, "stop" to compute duration'
    required: true
  start-time:
    description: 'Epoch seconds from the start invocation (required when mode=stop)'
    required: false

outputs:
  start:
    description: 'Epoch seconds at invocation (only set when mode=start)'
    value: ${{ steps.start.outputs.start }}
  duration:
    description: 'Human-readable duration like "1h 23m 45s" (only set when mode=stop)'
    value: ${{ steps.stop.outputs.duration }}

runs:
  using: 'composite'
  steps:
    - name: Record start time
      id: start
      if: inputs.mode == 'start'
      shell: bash
      run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

    - name: Calculate duration
      id: stop
      if: inputs.mode == 'stop'
      shell: bash
      run: |
        START=${{ inputs.start-time }}
        END=$(date +%s)
        ELAPSED=$((END - START))
        HOURS=$((ELAPSED / 3600))
        MINUTES=$(( (ELAPSED % 3600) / 60 ))
        SECONDS=$((ELAPSED % 60))
        if [ $HOURS -gt 0 ]; then
          echo "duration=${HOURS}h ${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT
        elif [ $MINUTES -gt 0 ]; then
          echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT
        else
          echo "duration=${SECONDS}s" >> $GITHUB_OUTPUT
        fi
