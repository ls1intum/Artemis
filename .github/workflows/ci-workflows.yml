name: Workflow Lint

# Reusable workflow called by ci.yml when files under .github/ change.
# Runs actionlint (configured via .github/actionlint.yaml) and the node/java version
# drift check.

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        # `bash <(curl …)` is the install snippet from the actionlint README; pin to a release
        # tag instead of `main` because it executes a downloaded binary. Reads
        # `.github/actionlint.yaml` for the self-hosted runner labels in use.
        env:
          ACTIONLINT_VERSION: '1.7.12'
        run: |
          bash <(curl --silent --location \
            "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") \
            "${ACTIONLINT_VERSION}"
          ./actionlint -color

      - name: Check version pins are in sync
        # Catches drift in top-level `env: { node, java }` blocks (auto-discovered).
        # Does NOT catch values hard-coded inline at `with: java-version: '...'` etc.
        run: |
          set -Eeuo pipefail
          for key in node java; do
            mapfile -t files < <(grep -lE "^  ${key}: " .github/workflows/*.yml)
            if [ "${#files[@]}" -eq 0 ]; then
              echo "::error::No workflow pins '${key}:'. Did the env blocks move?"
              exit 1
            fi
            mapfile -t values < <(grep -hE "^  ${key}: " "${files[@]}" | awk '{print $2}' | sort -u)
            if [ "${#values[@]}" -ne 1 ]; then
              echo "::error::Version drift on '${key}:' across ${files[*]} — values: ${values[*]}"
              exit 1
            fi
            echo "${key}: ${values[0]} (consistent across ${files[*]})"
          done

      - name: Check local composite actions are preceded by actions/checkout in their job
        # actionlint doesn't catch step ordering. A `uses: ./.github/actions/<x>` before
        # the workspace is checked out fails at runtime because the action.yml isn't on
        # disk yet. This check enforces that every job using a local composite has at
        # least one `actions/checkout` step earlier in the same job.
        run: |
          set -Eeuo pipefail
          python3 <<'PY'
          import sys, yaml, glob
          fail = False
          for f in sorted(glob.glob('.github/workflows/*.yml')):
              doc = yaml.safe_load(open(f))
              if not isinstance(doc, dict):
                  continue
              for jname, job in (doc.get('jobs') or {}).items():
                  if not isinstance(job, dict) or 'steps' not in job:
                      continue
                  seen_checkout = False
                  for step in job['steps']:
                      uses = (step or {}).get('uses', '')
                      if isinstance(uses, str) and uses.startswith('actions/checkout@'):
                          seen_checkout = True
                      if isinstance(uses, str) and uses.startswith('./.github/actions/') and not seen_checkout:
                          print(f"::error file={f}::Job '{jname}' uses local composite '{uses}' before actions/checkout — the action.yml is not on disk yet")
                          fail = True
          sys.exit(1 if fail else 0)
          PY
