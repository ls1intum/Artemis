name: Lint Workflows

# Reusable workflow called by ci.yml when files under .github/ change.
# Runs actionlint (configured via .github/actionlint.yaml) and the node/java version
# drift check.

on:
  workflow_call: {}

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        # Pin the install script to a release tag, not `main` — it executes a downloaded
        # binary. `-shellcheck=` disables integrated shellcheck, which flags pre-existing
        # style issues in the legacy deploy workflows.
        env:
          ACTIONLINT_VERSION: '1.7.12'
        run: |
          bash <(curl --silent --location \
            "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") \
            "${ACTIONLINT_VERSION}"
          ./actionlint -color -shellcheck=

      - name: Check version pins are in sync
        # Catches drift in top-level `env: { node, java }` blocks (auto-discovered).
        # Does NOT catch values hard-coded inline at `with: java-version: '...'` etc.
        run: |
          set -Eeuo pipefail
          for key in node java; do
            mapfile -t files < <(grep -lE "^  ${key}: " .github/workflows/*.yml)
            if [ "${#files[@]}" -eq 0 ]; then
              echo "::error::No workflow pins '${key}:'. Did the env blocks move?"
              exit 1
            fi
            mapfile -t values < <(grep -hE "^  ${key}: " "${files[@]}" | awk '{print $2}' | sort -u)
            if [ "${#values[@]}" -ne 1 ]; then
              echo "::error::Version drift on '${key}:' across ${files[*]} — values: ${values[*]}"
              exit 1
            fi
            echo "${key}: ${values[0]} (consistent across ${files[*]})"
          done

      - name: Check area filters exercise their own implementations
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          text = Path(".github/workflows/ci.yml").read_text()
          filters: dict[str, list[str]] = {}
          current = None
          for line in text.splitlines():
              if line.startswith("            has_") and line.rstrip().endswith(":"):
                  current = line.strip()[:-1]
                  filters[current] = []
                  continue
              if current and line.startswith("              - "):
                  filters[current].append(line.split("- ", 1)[1].strip().strip("'\""))
                  continue
              if current and line and not line.startswith("              "):
                  current = None

          required = {
              "has_java": {
                  ".github/workflows/ci.yml",
                  ".github/workflows/ci-quality.yml",
                  "supporting_scripts/analyze_java_files.py",
                  "supporting_scripts/find_slow_queries.py",
              },
              "has_docs": {".github/workflows/ci.yml", ".github/workflows/ci-docs.yml"},
              "has_i18n": {".github/workflows/ci.yml", ".github/workflows/ci-translation.yml", ".ci/translation-file-checker/**"},
              "has_gradle": {".github/workflows/ci.yml", ".github/workflows/ci-gradle-wrapper.yml"},
          }

          failed = False
          for name, paths in required.items():
              present = set(filters.get(name, []))
              missing = sorted(paths - present)
              if missing:
                  failed = True
                  print(f"::error::{name} is missing implementation self-test paths: {', '.join(missing)}")

          if failed:
              sys.exit(1)
          PY
