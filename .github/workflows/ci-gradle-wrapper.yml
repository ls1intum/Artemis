name: Gradle Wrapper

# Reusable workflow called by ci.yml. Do NOT add a `concurrency:` block here — the parent's
# group already applies, and a child group can deadlock the parent run.

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  validate:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
