name: PR Coverage Reporter

# Reuses coverage artifacts produced by the CI umbrella's `test` job (ci-test.yml) to render
# the coverage table in the PR description, instead of re-running the entire test suite a
# second time (which was the historical bottleneck).
#
# `workflow_run` listens for the umbrella's name. Coverage artifacts are uploaded by
# ci-test.yml's `server-tests` job under the umbrella's run id, so artifact lookups via
# `workflow_run.id` continue to work after the migration.
#
# SECURITY: a `workflow_run` job runs in the base-repo context with write permissions. To avoid a
# "pwn request", this workflow NEVER checks out or executes PR/fork code — it checks out the trusted
# default branch, derives changed files from the GitHub API, and runs the coverage tooling with
# `node` (no `pnpm install`, whose postinstall hook is fork-editable) against downloaded artifacts.
on:
  workflow_run:
    # Must match the `name:` field of .github/workflows/ci.yml.
    workflows: ["CI"]
    types: [completed]

# Group by PR number when available, falling back to head_sha — head_branch alone collides
# across PRs that share a branch name on a shared fork.
concurrency:
  group: coverage-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  CI: true
  node: 24

jobs:
  report-coverage:
    name: Report PR Coverage
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled' &&
      github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
      contents: read
      actions: read
    steps:
      - name: Find PR number
        id: find-pr
        uses: actions/github-script@v9
        continue-on-error: true
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_REPO_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
        with:
          result-encoding: string
          script: |
            const branch = process.env.HEAD_BRANCH;
            const headOwner = process.env.HEAD_REPO_OWNER;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${headOwner}:${branch}`,
              state: 'open'
            });
            if (!prs.length) {
              console.log(`No open PR found for branch ${headOwner}:${branch}`);
              return '';
            }
            core.setOutput('base_ref', prs[0].base.ref);
            core.setOutput('author', prs[0].user.login);
            return prs[0].number;

      - name: Exit if no PR found
        if: steps.find-pr.outputs.result == ''
        run: |
          echo "No matching open PR; skipping coverage report."
          exit 0

      # SECURITY (workflow_run pwn-request prevention): this job runs in the base-repo context with
      # `pull-requests: write`, so it must NEVER check out or execute PR/fork-controlled code. We
      # check out the base repo's DEFAULT branch — the trusted coverage tooling — and run it against
      # downloaded artifacts only. There is deliberately no `pnpm install` (its `postinstall` hook is
      # fork-editable) and no `pnpm run` of a PR script. The changed-file list comes from the GitHub
      # API below, not from a `git diff` of a checked-out PR tree.
      - name: Checkout coverage tooling (trusted default branch — never the PR head)
        uses: actions/checkout@v6
        if: steps.find-pr.outputs.result != ''

      - name: Detect changed files (via API — no PR checkout)
        if: steps.find-pr.outputs.result != ''
        id: changes
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.result }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber, per_page: 100,
            });
            const CLIENT = 'src/main/webapp/app/';
            const SERVER = 'src/main/java/de/tum/cit/aet/artemis/';
            const changed = [];
            const clientModules = new Set();
            const serverModules = new Set();
            let hasClient = false, hasServer = false;
            for (const f of files) {
              if (f.status === 'removed') continue;       // deleted files have no coverage to report
              const p = f.filename;
              if (p.startsWith(CLIENT) && p.endsWith('.ts') && !p.endsWith('.spec.ts') && !p.endsWith('.module.ts')) {
                hasClient = true; changed.push(p);
                const rel = p.slice(CLIENT.length);
                if (rel.includes('/')) clientModules.add(rel.split('/')[0]);
              } else if (p.startsWith(SERVER) && p.endsWith('.java')) {
                hasServer = true; changed.push(p);
                serverModules.add(p.slice(SERVER.length).split('/')[0]);
              }
            }
            core.setOutput('has_client_changes', String(hasClient));
            core.setOutput('has_server_changes', String(hasServer));
            core.setOutput('client_modules', [...clientModules].join(','));
            core.setOutput('server_modules', [...serverModules].join(','));
            core.setOutput('changed_files', changed.join(','));
            console.log(`Client: ${hasClient} (${[...clientModules].join(',')}); Server: ${hasServer} (${[...serverModules].join(',')}); ${changed.length} coverage-relevant files`);

      - name: Overlay PR source for accurate line/expect counts (data only)
        if: steps.find-pr.outputs.result != ''
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.result }}
        run: |
          set -uo pipefail
          # The coverage table's per-file Lines/Expects columns are counted by reading source and
          # spec files. To count the PR's code (not the trusted default branch we checked out)
          # WITHOUT re-introducing the pwn-request, overlay ONLY the source trees from the PR head
          # as DATA. The coverage tooling under supporting_scripts/ is NOT overlaid and is what
          # actually executes; the overlaid files are only read as text (no install, nothing run
          # from the PR tree). Best-effort: on any failure the counts fall back to default-branch
          # values, which is no worse than skipping this step.
          if git fetch --depth=1 origin "pull/${PR_NUMBER}/head" 2>/dev/null \
             && git checkout FETCH_HEAD -- src/main/webapp src/main/java 2>/dev/null; then
            echo "Overlaid PR source for accurate line/expect counts."
          else
            echo "::warning::Could not overlay PR source; line/expect counts may be default-branch-relative."
          fi

      - name: Download server JaCoCo XML
        if: steps.changes.outputs.has_server_changes == 'true'
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: Server JaCoCo XML
          path: build/reports/jacoco/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download client coverage summaries
        if: steps.changes.outputs.has_client_changes == 'true'
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: Client Coverage Summaries
          # upload-artifact@v6 strips the common ancestor of the uploaded paths.
          # ci-test.yml's uploader ships build/test-results/vitest/coverage/coverage-summary.json
          # (the whole client now runs on Vitest), so the archive contains
          # vitest/coverage/coverage-summary.json. Restore the stripped ancestor here so the file
          # lands where supporting_scripts/code-coverage/local-pr-coverage/local-pr-coverage.mjs reads it.
          path: build/test-results/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # `node` only — the coverage script imports just Node builtins + a local utils.mjs (zero
      # third-party deps), so there is no `pnpm install` (and thus no fork-editable postinstall).
      - name: Setup Node.js
        if: steps.changes.outputs.has_client_changes == 'true' || steps.changes.outputs.has_server_changes == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '${{ env.node }}'

      - name: Generate coverage table
        id: coverage
        if: steps.changes.outputs.has_client_changes == 'true' || steps.changes.outputs.has_server_changes == 'true'
        env:
          CLIENT_MODULES: ${{ steps.changes.outputs.client_modules }}
          SERVER_MODULES: ${{ steps.changes.outputs.server_modules }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed_files }}
          HAS_CLIENT: ${{ steps.changes.outputs.has_client_changes }}
          HAS_SERVER: ${{ steps.changes.outputs.has_server_changes }}
        run: |
          set -o pipefail
          # --changed-files (from the API) replaces the git-diff detection, so the trusted script
          # never needs the PR tree. --skip-tests means it only reads the downloaded coverage data.
          ARGS=(--skip-tests --print --changed-files "$CHANGED_FILES")
          if [ "$HAS_CLIENT" = "true" ] && [ "$HAS_SERVER" != "true" ]; then
            ARGS+=(--client-only)
          elif [ "$HAS_SERVER" = "true" ] && [ "$HAS_CLIENT" != "true" ]; then
            ARGS+=(--server-only)
          fi
          if [ -n "$CLIENT_MODULES" ]; then
            ARGS+=(--client-modules "$CLIENT_MODULES")
          fi
          if [ -n "$SERVER_MODULES" ]; then
            ARGS+=(--server-modules "$SERVER_MODULES")
          fi

          echo "Running: node local-pr-coverage.mjs ${ARGS[*]}"
          if ! COVERAGE_OUTPUT=$(node supporting_scripts/code-coverage/local-pr-coverage/local-pr-coverage.mjs "${ARGS[@]}" 2>&1); then
            echo "$COVERAGE_OUTPUT"
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$COVERAGE_OUTPUT"
          echo "success=true" >> "$GITHUB_OUTPUT"

          # Extract content between the script's separator lines (rows of ─).
          COVERAGE_TABLE=$(echo "$COVERAGE_OUTPUT" | sed -n '/^─/,/^─/p' | sed '1d;$d')
          {
            echo 'coverage_table<<COVERAGE_EOF'
            echo "$COVERAGE_TABLE"
            echo 'COVERAGE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update PR description with coverage
        if: steps.find-pr.outputs.result != ''
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.result }}
          PR_AUTHOR: ${{ steps.find-pr.outputs.author }}
          HAS_CLIENT: ${{ steps.changes.outputs.has_client_changes }}
          HAS_SERVER: ${{ steps.changes.outputs.has_server_changes }}
          COVERAGE_TABLE: ${{ steps.coverage.outputs.coverage_table }}
          COVERAGE_SUCCESS: ${{ steps.coverage.outputs.success }}
          TEST_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TEST_RUN_URL: ${{ github.event.workflow_run.html_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const author = process.env.PR_AUTHOR;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const hasClient = process.env.HAS_CLIENT === 'true';
            const hasServer = process.env.HAS_SERVER === 'true';
            const coverageTable = (process.env.COVERAGE_TABLE || '').trim();
            const coverageSuccess = process.env.COVERAGE_SUCCESS === 'true';
            const testConclusion = process.env.TEST_CONCLUSION;
            const testRunUrl = process.env.TEST_RUN_URL;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            let body = pr.body || '';
            const coverageSection = '### Test Coverage';
            const coverageIndex = body.indexOf(coverageSection);
            if (coverageIndex === -1) {
              console.log('Test Coverage section not found in PR description');
              return;
            }
            const afterCoverage = body.substring(coverageIndex + coverageSection.length);
            const nextSectionMatch = afterCoverage.match(/\n###\s/);
            const nextSectionIndex = nextSectionMatch
              ? coverageIndex + coverageSection.length + nextSectionMatch.index
              : body.length;

            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';

            const lines = [
              coverageSection,
              '<!-- Please add the test coverages for all changed files modified in this PR here. You can generate the coverage table using one of these options: -->',
              '<!-- 1. Run `pnpm run coverage:pr` to generate coverage locally by running only the affected module tests (see supporting_scripts/code-coverage/local-pr-coverage/README.md) -->',
              '<!-- 2. Use `supporting_scripts/code-coverage/generate_code_cov_table/generate_code_cov_table.py` to generate the table from CI artifacts (requires GitHub token, follow the README for setup) -->',
              '<!-- The line coverage must be above 90% for changed files, and you must use extensive and useful assertions for server tests and expect statements for client tests. -->',
              '<!-- Note: Confirm in the last column that you have implemented extensive assertions for server tests and expect statements for client tests. -->',
              '<!--       Remove rows with only trivial changes from the table. -->',
              ''
            ];

            const noChanges = !hasClient && !hasServer;
            if (noChanges) {
              lines.push('**No code changes detected** - test coverage not required for this PR.', '');
            } else if (!coverageSuccess) {
              lines.push(
                `**Warning:** Coverage table could not be generated. The \`Test\` workflow concluded with status \`${testConclusion}\`; coverage artifacts may be missing or incomplete. See [workflow logs](${testRunUrl}).`,
                ''
              );
            } else {
              if (testConclusion !== 'success') {
                lines.push(
                  `**Note:** Some tests in the [Test workflow](${testRunUrl}) did not pass (\`${testConclusion}\`). Coverage below may be partial.`,
                  ''
                );
              }
              if (coverageTable) {
                lines.push(coverageTable, '');
              } else {
                lines.push('Coverage data was found, but no rows applied to changed files.', '');
              }
            }
            lines.push(`_Last updated: ${timestamp}_`, '', '');

            const newBody = body.substring(0, coverageIndex) + lines.join('\n') + body.substring(nextSectionIndex);

            await github.rest.pulls.update({ owner, repo, pull_number: prNumber, body: newBody });
            console.log('Updated PR description with coverage results');

            // Notify the author.
            if (noChanges) return;
            const commentBody = coverageSuccess
              ? `@${author} Test coverage has been automatically updated in the PR description.`
              : `@${author} Coverage table could not be generated. See the [Test workflow run](${testRunUrl}) for details.`;
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body: commentBody
            });
