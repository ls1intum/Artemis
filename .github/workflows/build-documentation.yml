# Validates that the documentation builds successfully.
# Keep the build steps in sync with deploy-documentation.yml
name: Build Documentation

on:
  pull_request:
    paths:
      - 'documentation/**'
      - '.github/workflows/build-documentation.yml'
  push:
    branches:
      - develop
    paths:
      - 'documentation/**'
      - '.github/workflows/build-documentation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: documentation/package.json
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: documentation/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: documentation
        run: pnpm install --frozen-lockfile

      - name: Documentation Code Style
        working-directory: documentation
        run: pnpm run lint

      - name: Build Docusaurus site
        working-directory: documentation
        run: pnpm run build
