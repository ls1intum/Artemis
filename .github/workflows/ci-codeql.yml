name: CodeQL

# CodeQL static security analysis (Java + JavaScript/TypeScript). Invoked by ci.yml as an
# advisory PR/push check and by codeql-analysis.yml for the weekly scheduled scan, so the
# scan steps live in exactly one place. CodeQL must build the code itself (its tracer has to
# observe compilation to build the analysis database — a prebuilt WAR cannot be analysed), so
# the Angular + Java build here is inherent, not a duplication that can be cached away.

on:
  workflow_call:
    inputs:
      commit_sha:
        description: 'SHA to analyse. PR runs use the PR head SHA (matching ci-build.yml).'
        required: true
        type: string

permissions: {}  # default-deny; the job grants only what CodeQL needs

# Workflow-level node/java pins are drift-checked by ci-workflows.yml.
env:
  CI: true
  node: 24
  java: 25

jobs:
  analyse:
    name: Analyse (Java + JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      security-events: write  # upload the SARIF results to the code-scanning API
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '${{ env.node }}'
          cache: 'pnpm'
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '${{ env.java }}'
          # `cache: 'gradle'` is the legacy path; `setup-gradle@v6` below owns Gradle caching.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript, java
      # Build the Angular client separately so esbuild gets full system memory without
      # competing with the Gradle JVM (which reserves up to 4g).
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Angular Client
        run: pnpm run clean-www && pnpm run prebuild && pnpm exec ng build --configuration production --optimization=false
      - name: Build Java
        run: ./gradlew -Pprod -Pwar bootWar -x webapp
      # Drop the bundled client static resources so CodeQL analyses source, not minified output.
      - run: rm -rf build/resources/main/static
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
