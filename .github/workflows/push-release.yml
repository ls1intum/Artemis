name: Push Release CI

on:
  push:
    branches:
      - 'release/*'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - 'README.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'SECURITY.md'
      - '.husky/**'
      - '.coderabbit.yaml'
      - '.editorconfig'
      - '.gitattributes'
      - 'artemis-server-cli'
      - 'supporting_scripts/**'
      - 'CITATION.cff'
      - 'proxy.conf.mjs'

concurrency:
  group: push-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      has_gradle: ${{ steps.filter.outputs.has_gradle }}
      build_relevant: ${{ steps.filter.outputs.build_relevant }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -Eeuo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if git rev-parse --verify "${BASE_SHA}^{commit}" >/dev/null 2>&1; then
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          elif git rev-parse --verify "${HEAD_SHA}^" >/dev/null 2>&1; then
            echo "Base SHA $BASE_SHA is unavailable. Falling back to the first parent of $HEAD_SHA."
            CHANGED_FILES="$(git diff --name-only "${HEAD_SHA}^" "$HEAD_SHA")"
          else
            echo "No comparable base commit available. Marking the build as relevant."
            CHANGED_FILES="__FORCE_BUILD__"
          fi

          if echo "$CHANGED_FILES" | rg -q '(^|/)gradle/|^gradlew$|^gradlew\.bat$|^build\.gradle$|^settings\.gradle$'; then
            echo "has_gradle=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gradle=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | rg -q '^(src/main/|src/test/|docker/|gradle/|build\.gradle|settings\.gradle|package\.json|package-lock\.json|tsconfig|angular\.json|vite|playwright|webpack|\.github/workflows/|__FORCE_BUILD__)'; then
            echo "build_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_relevant=false" >> "$GITHUB_OUTPUT"
          fi

  gradle-wrapper:
    name: Gradle Wrapper Validation
    needs: detect-changes
    if: needs.detect-changes.outputs.has_gradle == 'true'
    uses: ./.github/workflows/ci-gradle-wrapper.yml

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.build_relevant == 'true'
    uses: ./.github/workflows/ci-build.yml
    permissions:
      contents: read
      packages: write
    with:
      ref_name: ${{ github.ref_name }}
      commit_sha: ${{ github.sha }}
      docker_ref: ${{ github.ref_name }}
      is_pr: false

  test:
    name: Test
    needs: detect-changes
    if: needs.detect-changes.outputs.build_relevant == 'true'
    uses: ./.github/workflows/ci-test.yml
    secrets: inherit
    with:
      base_branch: main
      run_all_tests: true
      is_pr: false

  e2e:
    name: E2E Tests
    needs: [detect-changes, build, test]
    if: needs.detect-changes.outputs.build_relevant == 'true' && needs.build.result == 'success' && needs.test.result == 'success'
    uses: ./.github/workflows/ci-e2e.yml
    secrets: inherit
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    with:
      branch_name: ${{ github.ref_name }}
      commit_sha: ${{ github.sha }}
      base_branch: main
      is_pr: false
