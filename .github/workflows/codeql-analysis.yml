name: "CodeQL"

on:
  push:
    branches: [develop, main]
    paths-ignore:
    - 'README.md'
    - 'CODE_OF_CONDUCT.md'
    - 'CONTRIBUTING.md'
    - 'LICENSE'
    - 'SECURITY.md'
    - 'documentation/**'
    - '.github/**'
    - '!.github/workflows/codeql-analysis.yml'
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Keep in sync with build.yml and test.yml and analysis-of-endpoint-connections.yml
env:
  CI: true
  node: 24
  java: 21


jobs:
  analyse:
    name: Analyse
    runs-on: arc-buildkit-ls1intum-theiaprod-amd64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '${{ env.node }}'
        cache: 'pnpm'

    # Install Java
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '${{ env.java }}'
        cache: 'gradle'

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      # Override language selection by uncommenting this and choosing your languages
      with:
         languages: javascript, java

    # Build Angular client separately so esbuild gets full system memory without
    # competing with the Gradle JVM (which reserves up to 4g).
    - name: Install pnpm dependencies
      run: pnpm install --frozen-lockfile
    - name: Build Angular Client
      run: pnpm run clean-www && pnpm run prebuild && pnpm exec ng build --configuration production --optimization=false
    - name: Build Java
      run: ./gradlew -Pprod -Pwar bootWar -x webapp

    - run: rm -rf build/resources/main/static

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
