name: "CodeQL"

on:
  push:
    branches: [develop, main]
    paths-ignore:
    - 'README.md'
    - 'CODE_OF_CONDUCT.md'
    - 'CONTRIBUTING.md'
    - 'LICENSE'
    - 'SECURITY.md'
    - 'documentation/**'
    - '.github/**'
    - '!.github/workflows/codeql-analysis.yml'
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Keep in sync with build.yml and test.yml and analysis-of-endpoint-connections.yml
env:
  CI: true
  node: 24
  java: 21


jobs:
  analyse:
    name: Analyse
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '${{ env.node }}'

    # Install Java
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '${{ env.java }}'
        cache: 'gradle'

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      # Override language selection by uncommenting this and choosing your languages
      with:
         languages: javascript, java

    # Build Angular client separately so esbuild gets full system memory without
    # competing with the Gradle JVM (which reserves up to 4g).
    - name: Install JS dependencies
      run: bun install --frozen-lockfile
    - name: Build Angular Client
      run: bun run clean-www && bun run prebuild && bunx ng build --configuration production --optimization=false
    - name: Build Java
      run: ./gradlew -Pprod -Pwar bootWar -x webapp

    - run: rm -rf build/resources/main/static

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
