name: Build Documentation

# Reusable workflow. Validates that the Docusaurus documentation builds successfully.
# Keep the build steps in sync with deploy-documentation.yml.

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: documentation/package.json
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: documentation/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: documentation
        run: pnpm install --frozen-lockfile

      - name: Documentation Code Style
        working-directory: documentation
        run: pnpm run lint

      - name: Build Docusaurus site
        working-directory: documentation
        run: pnpm run build
