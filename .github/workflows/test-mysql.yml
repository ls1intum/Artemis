name: Test (MySQL)

# TODO: Re-enable automatic triggers once MySQL testcontainers are reliable
on:
  workflow_dispatch: # Manual trigger only for now

# Limit the number of concurrent runs to one per PR
concurrency:
  group: test-mysql-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Keep in sync with ci-test.yml
env:
  CI: true
  node: 24
  java: 25
  RUN_ALL_TESTS: ${{ (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || github.event.repository.default_branch == github.ref_name }}

jobs:

  server-tests-mysql:
    runs-on: aet-large-ubuntu
    timeout-minutes: 80

    steps:
    - uses: actions/checkout@v6
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: |
          17
          ${{ env.java }}
        cache: 'gradle'
    - name: Java Tests (module-affected)
      if: ${{ !env.RUN_ALL_TESTS }}
      run: |
        set -o pipefail

        DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
        git fetch origin "$DEFAULT_BRANCH"

        chmod +x ./supporting_scripts/get_changed_modules.sh
        CHANGED_MODULES=$(./supporting_scripts/get_changed_modules.sh "origin/$DEFAULT_BRANCH")

        if [ -n "${CHANGED_MODULES}" ]; then
          IFS=,
          TEST_MODULE_TAGS=$(echo "-DincludeModules=${CHANGED_MODULES[*]}")

          echo "Executing tests for modules: $CHANGED_MODULES"
          ./gradlew --console=plain test jacocoTestReport -x webapp jacocoTestCoverageVerification "$TEST_MODULE_TAGS" -Dzonky.test.database.type=MYSQL | tee tests.log
          exit 0
        fi

        echo "Executing all tests"
        ./gradlew --console=plain test jacocoTestReport -x webapp jacocoTestCoverageVerification -Dzonky.test.database.type=MYSQL | tee tests.log
    - name: Java Tests (All)
      if: ${{ env.RUN_ALL_TESTS }}
      run: |
        set -o pipefail
        ./gradlew --console=plain test jacocoTestReport -x webapp jacocoTestCoverageVerification -Dzonky.test.database.type=MYSQL | tee tests.log
    - name: Upload JUnit Test Results
      if: success() || failure()
      uses: actions/upload-artifact@v7
      with:
        name: JUnit Test Results (MySQL)
        path: build/test-results/test/*.xml
    - name: Print failed tests
      if: failure()
      run: grep "Test >.* FAILED\$" tests.log || echo "No failed tests."
    - name: Test Report
      # Renders the JUnit report as a check-run AND annotates failing tests in the PR diff.
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3.0.0
      if: success() || failure()
      with:
        name: MySQL Tests
        path: build/test-results/test/*.xml
        reporter: java-junit
    - name: Number of Server Starts
      if: success() || failure()
      run: bash supporting_scripts/extract_number_of_server_starts.sh
