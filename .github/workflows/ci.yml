name: CI
# Single CI entry point. See .github/workflows/README.md for the contract.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - develop
      - main
      - release/*
  release:
    # `published` covers draft promotion. No `push: tags:` trigger — UI release publish
    # would otherwise double-fire.
    types: [published]
  merge_group:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Bypass change detection and run every job'
        type: boolean
        default: false

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.event.pull_request.number)
     || github.event_name == 'merge_group'  && format('ci-mq-{0}', github.event.merge_group.head_sha)
     || github.event_name == 'release'      && format('ci-release-{0}', github.event.release.tag_name)
     || format('ci-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:

  detect-changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      build_relevant: ${{ steps.decide.outputs.build_relevant }}
      has_java: ${{ steps.decide.outputs.has_java }}
      has_docs: ${{ steps.decide.outputs.has_docs }}
      has_i18n: ${{ steps.decide.outputs.has_i18n }}
      has_gradle: ${{ steps.decide.outputs.has_gradle }}
      has_workflows: ${{ steps.decide.outputs.has_workflows }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # dorny/paths-filter handles the edge cases hand-rolled `git diff` does not:
      # initial commits, force-pushes, missing merge-base, and `merge_group` events.
      # Two filter passes, because dorny's `predicate-quantifier` is a per-step setting and
      # the two passes need opposite logic:
      #   relevant (`every`): a file counts only if it matches ALL patterns — i.e. it is NOT
      #     markdown, NOT LICENSE, NOT under documentation/. So `build` + `test` (the REQUIRED
      #     jobs) run unless every changed file is pure docs. A new code or config path is
      #     therefore never silently skipped (over-run is safe; a false-negative would merge
      #     unbuilt code). Negation patterns only subtract under `every`; with the default
      #     `some` they are dead, so this MUST stay its own step. dorny runs picomatch with
      #     dot:true, so dotfiles (.npmrc, .github/...) match normally.
      - id: relevant
        if: github.event_name != 'workflow_dispatch' || !inputs.force_build
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          # On push/merge_group: diff against the previous commit. On PR: against base.ref.
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || '' }}
          predicate-quantifier: every
          filters: |
            build:
              - '!**/*.md'
              - '!LICENSE'
              - '!documentation/**'
      #   area (default `some`): positive allow-lists (OR logic) that gate the advisory jobs.
      - id: area
        if: github.event_name != 'workflow_dispatch' || !inputs.force_build
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || '' }}
          filters: |
            has_java:
              - 'src/main/java/**'
              - 'src/test/java/**'
              - 'build.gradle'
              - 'gradle/**'
            has_docs:
              - 'documentation/**'
            has_i18n:
              - 'src/main/webapp/i18n/**'
            has_gradle:
              - 'gradle/wrapper/**'
              - 'gradlew'
              - 'gradlew.bat'
            has_workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/actionlint.yaml'

      - id: decide
        env:
          # Events with no diff baseline (release, merge_group root commit) or an explicit
          # opt-in (workflow_dispatch + force_build) run everything.
          FORCE: >-
            ${{ (github.event_name == 'workflow_dispatch' && inputs.force_build)
             || github.event_name == 'release'
             || github.event_name == 'merge_group' }}
          F_BUILD: ${{ steps.relevant.outputs.build }}
          F_JAVA: ${{ steps.area.outputs.has_java }}
          F_DOCS: ${{ steps.area.outputs.has_docs }}
          F_I18N: ${{ steps.area.outputs.has_i18n }}
          F_GRADLE: ${{ steps.area.outputs.has_gradle }}
          F_WORKFLOWS: ${{ steps.area.outputs.has_workflows }}
        run: |
          set -Eeuo pipefail
          if [ "$FORCE" = "true" ]; then
            for k in build_relevant has_java has_docs has_i18n has_gradle has_workflows; do
              echo "$k=true" >> "$GITHUB_OUTPUT"
            done
          else
            {
              echo "build_relevant=${F_BUILD:-false}"
              echo "has_java=${F_JAVA:-false}"
              echo "has_docs=${F_DOCS:-false}"
              echo "has_i18n=${F_I18N:-false}"
              echo "has_gradle=${F_GRADLE:-false}"
              echo "has_workflows=${F_WORKFLOWS:-false}"
            } >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.build_relevant == 'true'
    uses: ./.github/workflows/ci-build.yml
    permissions:
      # `contents: write` required by `gh release upload` in build-war's release path.
      contents: write
      packages: write
    with:
      ref_name: ${{ github.event.pull_request.head.ref || github.ref_name }}
      commit_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      is_internal_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      is_release: ${{ github.event_name == 'release' }}
      release_tag: ${{ github.event.release.tag_name || '' }}

  test:
    name: Test
    needs: detect-changes
    if: needs.detect-changes.outputs.build_relevant == 'true'
    uses: ./.github/workflows/ci-test.yml
    permissions:
      contents: read
      checks: write
    with:
      commit_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      base_branch: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}
      # Module-affected mode is opt-in for draft PRs. Default branch and non-PR events run everything.
      run_all_tests: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
      is_internal_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      pr_author: ${{ github.event.pull_request.user.login || '' }}
    secrets:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

  java-analysis:
    name: Java Analysis
    needs: detect-changes
    if: needs.detect-changes.outputs.has_java == 'true'
    uses: ./.github/workflows/ci-java-analysis.yml
    permissions:
      contents: read
    with:
      base_branch: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}

  gradle-wrapper:
    name: Gradle Wrapper
    needs: detect-changes
    if: needs.detect-changes.outputs.has_gradle == 'true'
    uses: ./.github/workflows/ci-gradle-wrapper.yml
    permissions:
      contents: read

  workflows:
    name: Workflow Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.has_workflows == 'true'
    uses: ./.github/workflows/ci-workflows.yml
    permissions:
      contents: read

  docs:
    name: Documentation
    needs: detect-changes
    if: needs.detect-changes.outputs.has_docs == 'true'
    uses: ./.github/workflows/ci-docs.yml
    permissions:
      contents: read

  translation:
    name: Translation Keys
    needs: detect-changes
    if: needs.detect-changes.outputs.has_i18n == 'true'
    uses: ./.github/workflows/ci-translation.yml
    permissions:
      contents: read

  # Advisory — not in the required gate. Depends on `build` for the Docker image, not on
  # `test`, so a flaky unit-test run never blocks it; runs only when `build` succeeded
  # (enforced implicitly by `needs:` without `always()`). Fork PRs are excluded: they cannot
  # push the image to GHCR (ci-build.yml's docker-pr is internal-PR-only), so E2E would only
  # fail at setup with no image to pull.
  e2e:
    name: E2E
    needs: [detect-changes, build]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/ci-e2e.yml
    permissions:
      contents: read
      statuses: write
      pull-requests: write
      actions: read
    with:
      branch_name: ${{ github.event.pull_request.head.ref || github.ref_name }}
      commit_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      base_branch: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      pr_number: ${{ github.event.pull_request.number || 0 }}
    secrets:
      ARTEMIS_ADMIN_PASSWORD: ${{ secrets.ARTEMIS_ADMIN_PASSWORD }}
      ARTEMIS_ADMIN_USERNAME: ${{ secrets.ARTEMIS_ADMIN_USERNAME }}
      PLAYWRIGHT_REPORT_TOKEN: ${{ secrets.PLAYWRIGHT_REPORT_TOKEN }}
      HELIOS_REPO_SECRET: ${{ secrets.HELIOS_REPO_SECRET }}

  # The single required status check. It depends ONLY on the jobs that gate merges today
  # (Build .war + the four server/client test jobs, here as the `build` and `test`
  # reusables). Advisory jobs — e2e, java-analysis, gradle-wrapper, docs, translation,
  # workflows — run in parallel, post their own checks, and are deliberately NOT in `needs:`
  # so a flaky or slow advisory suite never blocks merging. `detect-changes` is included so
  # a change-detection failure fails the gate closed. To promote an advisory job to required,
  # add it here and to the branch-protection ruleset.
  all-required-ci-passed:
    name: All required CI Passed
    if: always()
    needs:
      - detect-changes
      - build
      - test
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 5
    steps:
      - name: Evaluate gate
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          failing=$(jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | "\(.key): \(.value.result)"
          ' <<< "$NEEDS")
          if [ -n "$failing" ]; then
            echo "::error::One or more required CI jobs did not pass:"
            echo "$failing"
            exit 1
          fi
