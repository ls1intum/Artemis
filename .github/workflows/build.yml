name: Build
# The name of this workflow (Build) should be in sync with the test-e2e.yml workflow's workflow_run listener.

on:
  pull_request:
    paths-ignore:
    - 'README.md'
    - 'CODE_OF_CONDUCT.md'
    - 'CONTRIBUTING.md'
    - 'LICENSE'
    - 'SECURITY.md'
    - 'documentation/**'
    - '.github/**'
    - '!.github/workflows/build.yml'
    - '!.github/workflows/test-e2e.yml'
    - '.husky/**'
    - 'docker/**'
    - '!docker/*'
    - 'docker/README.md'
    - '!docker/artemis/Dockerfile'
    - 'rules/**'
    - 'supporting_scripts/**'
    - '.coderabbit.yaml'
    - '.editorconfig'
    - '.gitattributes'
    - '.lintstagedrc.js'
    - '.prettierignore'
    - '.prettierrc'
    - '.whitesource'
    - 'artemis-server-cli'
    - 'CITATION.cff'
    - 'jest.config.js'
    - 'linting.sh'
    - 'proxy.conf.mjs'
    - 'read.ms'
    - 'result.md'
    - 'src/test/javascript/spec/stub.js'

  push:
    branches:
    - develop
    - main
    - release/*
    tags:
    - '[0-9]+.[0-9]+'
    - '[0-9]+.[0-9]+.[0-9]+'
  release:
    # Use `published` (not `created`) so we also fire when a draft release is
    # promoted to published; `created` does not fire for draft → published
    # transitions, which previously caused release 9.2 to ship without a WAR.
    types:
    - published


# Concurrency control for GitHub Actions workflow
# Ensures efficient use of CI resources by canceling redundant runs where needed.
#
# - Pull requests: Cancel previous runs for the same PR to avoid redundant builds.
#   Example: PR #42 → "build-pr-42"
#
# - Pushes (branches & tags): Each branch or tag runs independently. If a run is in progress for the same branch or tag, it is canceled.
#   Example: Push to "develop" → "build-refs/heads/develop"
#   Example: Push to "release/9.2" → "build-refs/heads/release/9.2"
#   Example: Tag "9.2" → "build-refs/tags/9.2"
#
# - Releases: Each release runs independently.
#   Example: Release for "9.2" → "build-release-9.2"
#
# - Default fallback: Ensures the workflow always has a concurrency group.
#   Example: Unexpected event type → "build-default"
concurrency:
  group: |
    ${{
      github.event_name == 'pull_request' && format('build-pr-{0}', github.event.pull_request.number) ||
      github.event_name == 'push' && format('build-{0}', github.ref) ||
      github.event_name == 'release' && format('build-release-{0}', github.event.release.tag_name) ||
      'build-default'
    }}
  cancel-in-progress: true


# Keep this filename in sync with the filename environment variable (PR_AUTO_BUILD_FILE_NAME) in the testserver-deployment.yml workflow
# and with the build_workflow_name environment variable in the staging-deployment.yml workflow


# Keep in sync with codeql-analysis.yml and test.yml and analysis-of-endpoint-connections.yml
env:
  CI: true
  node: 24
  java: 25
  GIT_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
  GIT_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}

jobs:

  build-war:
    name: Build .war artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Use PR head commit on pull_request, otherwise fall back to the event SHA
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '${{ env.node }}'
          cache: 'pnpm'
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '${{ env.java }}'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Restore Angular build cache
        # Restore the Angular CLI esbuild disk cache (build/angular/) from the most
        # recent run on the same config, falling back to any run on the same OS/node.
        # Saving is intentionally split into a separate step below so that only builds
        # on long-lived branches write new entries — mirroring the default behaviour of
        # gradle/actions/setup-gradle (see https://github.com/gradle/actions/blob/main/docs/setup-gradle.md#select-which-branches-should-write-to-the-cache).
        # Key includes hashes of files whose changes require a fresh cache:
        #   pnpm-lock.yaml    — dependency versions (affects angular-compiler.db / LMDB)
        #   angular.json      — build configuration
        #   tsconfig.json     — TypeScript compiler options (affects .tsbuildinfo)
        #   tsconfig.app.json — app-specific TS options
        # run_id makes the primary key unique so every save captures the latest
        # incremental state; restore-keys pick the most recent matching snapshot.
        uses: actions/cache/restore@v5
        id: angular_build_cache
        with:
          path: build/angular
          key: angular-build-cache-${{ runner.os }}-node${{ env.node }}-${{ hashFiles('pnpm-lock.yaml', 'angular.json', 'tsconfig.json', 'tsconfig.app.json') }}-${{ github.run_id }}
          restore-keys: |
            angular-build-cache-${{ runner.os }}-node${{ env.node }}-${{ hashFiles('pnpm-lock.yaml', 'angular.json', 'tsconfig.json', 'tsconfig.app.json') }}-
            angular-build-cache-${{ runner.os }}-node${{ env.node }}-
      - name: Debug Angular build cache contents
        run: |
          echo "cache-hit=${{ steps.angular_build_cache.outputs.cache-hit }}"
          echo "cache-primary-key=${{ steps.angular_build_cache.outputs.cache-primary-key }}"
          echo "cache-matched-key=${{ steps.angular_build_cache.outputs.cache-matched-key }}"
          if [ -d build/angular ]; then
            echo "build/angular exists"
            du -sh build/angular
            find build/angular -maxdepth 4 -type f | head -n 200
          else
            echo "build/angular is missing"
          fi
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Angular Client
        # Build the Angular client separately so that Node.js/esbuild get full system
        # memory without competing with the Gradle JVM (which reserves up to 4g).
        # Use --optimization=false to work around esbuild crash during script optimization.
        run: pnpm run clean-www && pnpm run prebuild && pnpm exec ng build --configuration production --optimization=false
      - name: Build .war
        # Skip the webapp Gradle task since the Angular client was already built above.
        run: ./gradlew -Pprod -Pwar bootWar -x webapp
      - name: Save Angular build cache
        # Only write cache entries from the default branch and release/* branches.
        # PR caches are scoped to the merge ref and invisible to other PRs, so saving
        # from PRs wastes cache quota without benefiting other contributors.
        if: |
          github.ref == format('refs/heads/{0}', github.event.repository.default_branch) ||
          startsWith(github.ref, 'refs/heads/release/')
        uses: actions/cache/save@v5
        with:
          path: build/angular
          key: angular-build-cache-${{ runner.os }}-node${{ env.node }}-${{ hashFiles('pnpm-lock.yaml', 'angular.json', 'tsconfig.json', 'tsconfig.app.json') }}-${{ github.run_id }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Artemis.war
          path: build/libs/Artemis-*.war
      - name: Upload Release Artifact
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/libs/Artemis-${{ github.event.release.tag_name }}.war
          asset_name: Artemis.war
          asset_content_type: application/x-webarchive

  # Fast PR path: single-arch (linux/amd64) image that reuses the .war produced by
  # `build-war` via the Dockerfile's `external_builder` stage. Skips the duplicate
  # Angular + Gradle build that the reusable multi-arch workflow would otherwise
  # run inside the image.
  docker-pr:
    name: Build and Push Docker Image (PR, amd64)
    needs: build-war
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == 'ls1intum/Artemis' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Download .war artifact
        uses: actions/download-artifact@v8
        with:
          name: Artemis.war
          path: build/libs
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/ls1intum/artemis
          tags: |
            type=ref,event=pr
      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/artemis/Dockerfile
          platforms: linux/amd64
          # Skip the in-image .war build; COPY the artifact produced by `build-war` instead.
          build-args: WAR_FILE_STAGE=external_builder
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Consumed by .github/actions/e2e-setup, which downloads the `docker-tag`
      # artifact from the triggering Build run and pulls ghcr.io/ls1intum/artemis:<tag>.
      - name: Save Docker tag to file
        env:
          DOCKER_TAG: ${{ steps.meta.outputs.version }}
        run: |
          printf '%s' "$DOCKER_TAG" > docker-tag.txt
          echo "Using Docker tag: $DOCKER_TAG"
      - name: Upload Docker tag as artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-tag
          path: docker-tag.txt

  # Release / default-branch path: multi-arch publish via the shared reusable workflow.
  # Kept as-is because the reusable workflow runs its own checkout and cannot see the
  # `build-war` artifact, so it must keep rebuilding the .war inside the image. This
  # path only fires on develop/main/release/* pushes, tags, and release events — not
  # on the PR-to-test-server critical path.
  docker-release:
    name: Build and Push Docker Image
    if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.1.1
    with:
      ref: ${{ github.ref_name }}
      image-name: ls1intum/artemis
      docker-file: ./docker/artemis/Dockerfile
      tags: |
        type=ref,event=tag

  # Mirrors the `docker-tag` artifact upload from `docker-pr` for the release path,
  # so .github/actions/e2e-setup can consume it uniformly regardless of which docker
  # job produced the image.
  save-docker-tag:
    name: Save Docker Image Tag
    needs: docker-release
    if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Save Docker tag to file
        env:
          DOCKER_TAG: ${{ needs.docker-release.outputs.image_tag }}
        run: |
          printf '%s' "$DOCKER_TAG" > docker-tag.txt
          echo "Using Docker tag: $DOCKER_TAG"
      - name: Upload Docker tag as artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-tag
          path: docker-tag.txt
