name: Build
# The name of this workflow (Build) should be in sync with the test-e2e.yml workflow's workflow_run listener.

on:
  pull_request:
    paths-ignore:
    - 'README.md'
    - 'CODE_OF_CONDUCT.md'
    - 'CONTRIBUTING.md'
    - 'LICENSE'
    - 'SECURITY.md'
    - 'documentation/**'
    - '.github/**'
    - '!.github/workflows/build.yml'
    - '!.github/workflows/test-e2e.yml'
    - '.husky/**'
    - 'docker/**'
    - '!docker/*'
    - 'docker/README.md'
    - '!docker/artemis/Dockerfile'
    - 'rules/**'
    - 'supporting_scripts/**'
    - '.coderabbit.yaml'
    - '.editorconfig'
    - '.gitattributes'
    - '.lintstagedrc.js'
    - '.prettierignore'
    - '.prettierrc'
    - '.whitesource'
    - 'artemis-server-cli'
    - 'CITATION.cff'
    - 'jest.config.js'
    - 'linting.sh'
    - 'proxy.conf.mjs'
    - 'read.ms'
    - 'result.md'
    - 'src/test/javascript/spec/stub.js'

  push:
    branches:
    - develop
    - main
    - release/*
    tags:
    - '[0-9]+.[0-9]+'
    - '[0-9]+.[0-9]+.[0-9]+'
  release:
    # Use `published` (not `created`) so we also fire when a draft release is
    # promoted to published; `created` does not fire for draft → published
    # transitions, which previously caused release 9.2 to ship without a WAR.
    types:
    - published


# Concurrency control for GitHub Actions workflow
# Ensures efficient use of CI resources by canceling redundant runs where needed.
#
# - Pull requests: Cancel previous runs for the same PR to avoid redundant builds.
#   Example: PR #42 → "build-pr-42"
#
# - Pushes (branches & tags): Each branch or tag runs independently. If a run is in progress for the same branch or tag, it is canceled.
#   Example: Push to "develop" → "build-refs/heads/develop"
#   Example: Push to "release/9.2" → "build-refs/heads/release/9.2"
#   Example: Tag "9.2" → "build-refs/tags/9.2"
#
# - Releases: Each release runs independently.
#   Example: Release for "9.2" → "build-release-9.2"
#
# - Default fallback: Ensures the workflow always has a concurrency group.
#   Example: Unexpected event type → "build-default"
concurrency:
  group: |
    ${{
      github.event_name == 'pull_request' && format('build-pr-{0}', github.event.pull_request.number) ||
      github.event_name == 'push' && format('build-{0}', github.ref) ||
      github.event_name == 'release' && format('build-release-{0}', github.event.release.tag_name) ||
      'build-default'
    }}
  cancel-in-progress: true


# Keep this filename in sync with the filename environment variable (PR_AUTO_BUILD_FILE_NAME) in the testserver-deployment.yml workflow
# and with the build_workflow_name environment variable in the staging-deployment.yml workflow


# Keep in sync with codeql-analysis.yml and test.yml and analysis-of-endpoint-connections.yml
env:
  CI: true
  node: 24
  java: 25
  GIT_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
  GIT_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}

jobs:

  build-war:
    name: Build .war artifact
    runs-on: arc-buildkit-ls1intum-stud-amd64
    steps:
      - uses: actions/checkout@v6
        with:
          # Use PR head commit on pull_request, otherwise fall back to the event SHA
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '${{ env.node }}'
          cache: 'pnpm'
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '${{ env.java }}'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Angular Client
        # Build the Angular client separately so that Node.js/esbuild get full system
        # memory without competing with the Gradle JVM (which reserves up to 4g).
        # Use --optimization=false to work around esbuild crash during script optimization.
        run: pnpm run clean-www && pnpm run prebuild && pnpm exec ng build --configuration production --optimization=false
      - name: Decide whether to include the SBOM
        # SBOM generation (cdxgen + cyclonedxBom + copySbomsToResources) adds ~60 s to a cold
        # WAR build and is only needed for release-eligible artifacts. Opt in via `-Psbom` on
        # pushes to develop, main, release/*, version tags, and published releases. All other
        # builds (PRs, feature branches) ship a WAR without SBOM — AdminSbomResource handles
        # this gracefully by returning 404, and the admin UI renders an info banner.
        id: sbom
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          case "$EVENT_NAME:$REF" in
            release:*|push:refs/heads/develop|push:refs/heads/main|push:refs/heads/release/*|push:refs/tags/*)
              echo "flag=-Psbom" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "flag=" >> "$GITHUB_OUTPUT"
              ;;
          esac
      - name: Build .war
        # Skip the webapp Gradle task since the Angular client was already built above.
        run: ./gradlew -Pprod -Pwar bootWar -x webapp ${{ steps.sbom.outputs.flag }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Artemis.war
          path: build/libs/Artemis-*.war
      - name: Upload Release Artifact
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/libs/Artemis-${{ github.event.release.tag_name }}.war
          asset_name: Artemis.war
          asset_content_type: application/x-webarchive

  # PR path: single-arch (linux/amd64) image built through the shared ARC BuildKit
  # reusable workflow. This intentionally exercises the same stateful BuildKit
  # infrastructure used by release image builds.
  docker-pr:
    name: Build and Push Docker Image (PR, amd64)
    needs: build-war
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == 'ls1intum/Artemis' }}
    permissions:
      contents: read
      packages: write
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image-self-hosted-buildkit.yml@feature/split-build-workflow-modes
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      image-name: ls1intum/artemis
      docker-file: ./docker/artemis/Dockerfile
      runner-amd64: arc-buildkit-ls1intum-stud-amd64
      runner-arm64: arc-buildkit-ls1intum-parma-arm64
      runner-merge: arc-buildkit-ls1intum-stud-amd64
      build-amd64: true
      build-arm64: false
      tags: |
        type=ref,event=pr

  # Release / default-branch path: multi-arch publish via the shared reusable workflow.
  # Kept as-is because the reusable workflow runs its own checkout and cannot see the
  # `build-war` artifact, so it must keep rebuilding the .war inside the image. This
  # path only fires on develop/main/release/* pushes, tags, and release events — not
  # on the PR-to-test-server critical path.
  docker-release:
    name: Build and Push Docker Image
    if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image-self-hosted-buildkit.yml@feature/split-build-workflow-modes
    with:
      ref: ${{ github.ref_name }}
      image-name: ls1intum/artemis
      docker-file: ./docker/artemis/Dockerfile
      runner-amd64: arc-buildkit-ls1intum-stud-amd64
      runner-arm64: arc-buildkit-ls1intum-parma-arm64
      runner-merge: arc-buildkit-ls1intum-stud-amd64
      tags: |
        type=ref,event=tag

  # Uploads the docker-tag artifact for both PR and release paths, so
  # .github/actions/e2e-setup can consume it uniformly regardless of which Docker
  # job produced the image.
  save-docker-tag:
    name: Save Docker Image Tag
    needs: [docker-pr, docker-release]
    if: ${{ always() && (needs.docker-pr.result == 'success' || needs.docker-release.result == 'success') }}
    runs-on: arc-buildkit-ls1intum-stud-amd64
    steps:
      - name: Save Docker tag to file
        env:
          DOCKER_TAG: ${{ needs.docker-pr.outputs.image_tag || needs.docker-release.outputs.image_tag }}
        run: |
          printf '%s' "$DOCKER_TAG" > docker-tag.txt
          echo "Using Docker tag: $DOCKER_TAG"
      - name: Upload Docker tag as artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-tag
          path: docker-tag.txt

  arc-e2e-test:
    name: ARC E2E Test
    needs: save-docker-tag
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: arc-buildkit-ls1intum-stud-amd64
    timeout-minutes: 120
    environment: playwright-e2e-tests
    env:
      ARTEMIS_ADMIN_PASSWORD: ${{ secrets.ARTEMIS_ADMIN_PASSWORD }}
      ARTEMIS_ADMIN_USERNAME: ${{ secrets.ARTEMIS_ADMIN_USERNAME }}
      PLAYWRIGHT_CREATE_USERS: ${{ vars.PLAYWRIGHT_CREATE_USERS }}
      PLAYWRIGHT_PASSWORD_TEMPLATE: ${{ vars.PLAYWRIGHT_PASSWORD_TEMPLATE }}
      PLAYWRIGHT_USERNAME_TEMPLATE: ${{ vars.PLAYWRIGHT_USERNAME_TEMPLATE }}
      SLOW_TEST_TIMEOUT_SECONDS: ${{ vars.SLOW_TEST_TIMEOUT_SECONDS }}
      TEST_RETRIES: ${{ vars.TEST_RETRIES }}
      TEST_TIMEOUT_SECONDS: ${{ vars.TEST_TIMEOUT_SECONDS }}
      TEST_WORKER_PROCESSES: ${{ vars.TEST_WORKER_PROCESSES }}
      PLAYWRIGHT_REPORT_SERVER_URL: ${{ vars.PLAYWRIGHT_REPORT_SERVER_URL }}
      PLAYWRIGHT_REPORT_TOKEN: ${{ secrets.PLAYWRIGHT_REPORT_TOKEN }}
      PLAYWRIGHT_REPORT_BRANCH: ${{ github.event.pull_request.head.ref }}
      PLAYWRIGHT_REPORT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      PLAYWRIGHT_REPORT_PR_NUMBER: ${{ github.event.pull_request.number }}
      PLAYWRIGHT_REPORT_PHASE: arc
      PLAYWRIGHT_REPORT_TRIGGERED_BY: pull_request
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Download Docker tag
        uses: actions/download-artifact@v8
        with:
          name: docker-tag
      - name: Set Docker tag environment variable
        run: |
          ARTEMIS_DOCKER_TAG="$(cat docker-tag.txt)"
          echo "ARTEMIS_DOCKER_TAG=${ARTEMIS_DOCKER_TAG}" >> "$GITHUB_ENV"
          echo "Using Docker tag: ${ARTEMIS_DOCKER_TAG}"
      - name: Make E2E scripts executable
        run: chmod +x .ci/E2E-tests/cleanup.sh .ci/E2E-tests/execute.sh
      - name: Run cleanup script before E2E
        run: .ci/E2E-tests/cleanup.sh
      - name: Run ARC E2E tests
        run: .ci/E2E-tests/execute.sh postgres-localci playwright
        env:
          FAST_TEST_TIMEOUT_SECONDS: 60

  block-default-e2e-workflow-run:
    name: Block default workflow_run E2E
    needs: arc-e2e-test
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: arc-buildkit-ls1intum-stud-amd64
    steps:
      - name: Fail intentionally after ARC E2E test
        run: |
          echo "Intentional temporary failure: keep the Build workflow conclusion non-successful so the default-branch workflow_run E2E path does not start on the old runners."
          exit 1
