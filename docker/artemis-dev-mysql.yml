# ----------------------------------------------------------------------------------------------------------------------
# Artemis-Dev-MySQL Setup
# ----------------------------------------------------------------------------------------------------------------------

services:
    artemis-app:
        extends:
            file: ./artemis.yml
            service: artemis-app
        # just add this linux workaround for docker compose in a development version of artemis as developers
        # might want to access external services on the docker host
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "8080:8080"
            - "5005:5005" # Java Remote Debugging port declared in the java cmd options
        # expose the port to make it reachable docker internally even if the external port mapping changes
        expose:
            - "5005"
        env_file:
            - ./artemis/config/dev.env
        depends_on:
            mysql:
                condition: service_healthy
            flask-transcription: # Ensure Flask starts before Artemis
              condition: service_started
    mysql:
        extends:
            file: ./mysql.yml
            service: mysql
    flask-transcription:
      build: ./flask-transcription
      ports:
        - "5001:5001"
      volumes:
        - ./flask-transcription/temp:/app/temp  # Persist transcription files
      restart: always
      networks:
        - artemis

networks:
    artemis:
        driver: "bridge"
        name: artemis
volumes:
    artemis-mysql-data:
        name: artemis-mysql-data
    artemis-data:
        name: artemis-data
