---
services:
  weaviate:
    container_name: artemis-weaviate
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --scheme
      - http
    # Must be compatible with the Java client: https://docs.weaviate.io/weaviate/release-notes
    image: cr.weaviate.io/semitechnologies/weaviate:${WEAVIATE_SERVER_VERSION:-1.34.14}
    expose:
      - 8001
      - 50051
    ports:
      - "${WEAVIATE_REST_PORT:-8001}:8001"
      - "${WEAVIATE_GRPC_PORT:-50051}:50051"
    volumes:
      - artemis-weaviate:/var/lib/weaviate
    restart: on-failure:3
    env_file:
      - ./weaviate/default.env

volumes:
  artemis-weaviate:
    name: artemis-weaviate
