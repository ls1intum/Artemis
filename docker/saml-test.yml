# ----------------------------------------------------------------------------------------------------------------------
# SAML2 Testing service (Keycloak)
# ----------------------------------------------------------------------------------------------------------------------
# Keycloak provides a full-featured SAML2 Identity Provider for local testing.
#
# Admin console: http://localhost:8443 (admin/admin)
# SAML metadata: http://localhost:8443/realms/artemis/protocol/saml/descriptor
#
# When using this service you have to manually add the saml2 spring profile in your Artemis configuration.
#
# Out of the box this setup just works with a containerized Artemis instance.
# See comments above artemis-app on how to get it working with a non-containerized Artemis instance.
# ----------------------------------------------------------------------------------------------------------------------

services:
    keycloak:
        container_name: artemis-keycloak
        image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
        pull_policy: missing
        command: start-dev --import-realm
        environment:
            KC_BOOTSTRAP_ADMIN_USERNAME: admin
            KC_BOOTSTRAP_ADMIN_PASSWORD: admin
            KC_HTTP_PORT: 9080
        ports:
            - "9080:9080"
        expose:
            - "9080"
        volumes:
            - ./saml-test/artemis-realm.json:/opt/keycloak/data/import/artemis-realm.json
        networks:
            - artemis

    # comment this section if you use the saml-test service with a non-containerized Artemis instance
    # and copy the ./saml-test/application-saml2.yml to your server configs
    artemis-app:
        volumes:
            - ./saml-test/application-saml2.yml:/opt/artemis/config/application-saml2.yml

networks:
    artemis:
        driver: "bridge"
        name: artemis
