# ----------------------------------------------------------------------------------------------------------------------
# SAML2 Testing service (Keycloak)
# ----------------------------------------------------------------------------------------------------------------------
# Keycloak provides a full-featured SAML2 Identity Provider for local testing.
#
# Admin console: http://localhost:9080 (admin/admin)
# SAML metadata: http://localhost:9080/realms/artemis/protocol/saml/descriptor
# Test users:    saml2user1 / password, saml2user2 / password
#
# This file can be run standalone for non-containerized Artemis (e.g. IntelliJ):
#   docker compose -f docker/saml-test.yml up
#
# For non-containerized Artemis, add the saml2 Spring profile and the Keycloak SAML2 configuration
# to your application-local.yml. See the developer documentation for the full configuration:
#   https://docs.artemis.tum.de/developer/docker-compose
#
# For containerized Artemis, combine with an Artemis setup, add the saml2 profile, and mount the config:
#   docker compose -f docker/artemis-dev-mysql.yml -f docker/saml-test.yml up
#   (also add 'saml2' to SPRING_PROFILES_ACTIVE and mount application-saml2.yml into the container)
# ----------------------------------------------------------------------------------------------------------------------

services:
    keycloak:
        container_name: artemis-keycloak
        image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
        pull_policy: missing
        command: start-dev --import-realm
        environment:
            KC_BOOTSTRAP_ADMIN_USERNAME: admin
            KC_BOOTSTRAP_ADMIN_PASSWORD: admin
            KC_HTTP_PORT: 9080
        ports:
            - "9080:9080"
        expose:
            - "9080"
        volumes:
            - ./saml-test/artemis-realm.json:/opt/keycloak/data/import/artemis-realm.json
        networks:
            - artemis

networks:
    artemis:
        driver: "bridge"
        name: artemis
