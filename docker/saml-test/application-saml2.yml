# Spring Security SAML2 relying party registration (required for the RelyingPartyRegistrationRepository bean)
# NOTE: Signing credentials are required by Spring Security. Generate them with:
#   openssl req -x509 -newkey rsa:2048 -keyout saml-key.pem -out saml-cert.crt -days 365 -nodes -subj "/CN=artemis"
#   openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in saml-key.pem -out saml-key-pkcs8.pem
# Then mount the files into the container and add the signing section below.
# See https://docs.artemis.tum.de/developer/keycloak-saml2-setup for full instructions.
spring:
    security:
        saml2:
            relyingparty:
                registration:
                    keycloak:
                        entity-id: artemis
                        # signing:
                        #     credentials:
                        #         - private-key-location: file:/path/to/saml-key-pkcs8.pem
                        #           certificate-location: file:/path/to/saml-cert.crt
                        assertingparty:
                            metadata-uri: http://keycloak:9080/realms/artemis/protocol/saml/descriptor

# Artemis-specific SAML2 properties (user attribute mapping)
saml2:
    username-pattern: 'saml2-{first_name}_{last_name}'
    first-name-pattern: '{first_name}'
    last-name-pattern: '{last_name}'
    email-pattern: '{email}'
    registration-number-pattern: '{uid}'
    identity-providers:
        - metadata: http://keycloak:9080/realms/artemis/protocol/saml/descriptor
          registration-id: keycloak
          entity-id: artemis

info.saml2:
    buttonLabel: 'SAML2 Login'
    passwordLoginDisabled: false
    enablePassword: true
