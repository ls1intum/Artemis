          description: Question type
          enum:
          - single-choice
          - multiple-choice
          - true-false
        title:
          type: string
          description: Question title
          minLength: 1
        questionText:
          type: string
          description: Question text
          minLength: 1
        options:
          type: array
          description: Answer options
          items:
            $ref: "#/components/schemas/GeneratedQuizAnswerOption"
          minItems: 1
      required:
      - options
      - questionText
      - title
      - type
    ChecklistAnalysisResponse:
      type: object
      description: Response containing the checklist analysis results
      properties:
        inferredCompetencies:
          type: array
          description: Top inferred competencies from the standardized catalog
          items:
