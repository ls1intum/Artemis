      properties:
        actionType:
          type: string
          description: Type of action to apply
          enum:
          - FIX_QUALITY_ISSUE
          - FIX_ALL_QUALITY_ISSUES
          - ADAPT_DIFFICULTY
        problemStatementMarkdown:
          type: string
          description: Current problem statement markdown
          maxLength: 50000
          minLength: 0
        context:
          type: object
          additionalProperties:
            type: string
          description: Action-specific context parameters
      required:
      - actionType
      - problemStatementMarkdown
    GeneratedQuizQuestion:
      type: object
      description: One generated quiz question
      properties:
        type:
