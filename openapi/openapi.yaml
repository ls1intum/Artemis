  /api/search:
    get:
      tags:
      - Glob
      summary: Perform a unified semantic search across entity types
      description: |-
        Searches across multiple entity types (exercises, lectures, lecture units, exams, FAQs, channels)
        with a consistent response format. When courseId is not specified, the search is performed
        globally across all courses the authenticated user has access to. Per-type access rules are
        enforced server-side via compound Weaviate filters.
      operationId: globalSearch
      parameters:
      - name: q
        in: query
        description: Search query; can be empty to retrieve recent items
        required: true
        schema:
          type: string
      - name: types
        in: query
        description: "Comma-separated entity type filter (exercise, lecture, lecture_unit,\
          \ exam, faq, channel) or 'all'; default 'all'"
        required: false
        schema:
          type: string
      - name: courseId
        in: query
        description: Course ID to restrict the search to a single course
        required: false
        schema:
          type: integer
          format: int64
      - name: limit
        in: query
        description: "Maximum number of results (1–100, default 10)"
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "200":
          description: Search results matching the query
          content:
