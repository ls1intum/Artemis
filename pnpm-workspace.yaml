autoInstallPeers: true

# Treat the lockfile as authoritative; never silently update it during install.
preferFrozenLockfile: true

# Allow our own pre/post lifecycle scripts (postinstall, prepare) to run.
enablePrePostScripts: true

# Tell pnpm that Angular 21 is an acceptable peer for packages whose published
# peerDependencies range still lists only "18.x || 19.x || 20.x".
# We already pin every relevant @angular/* dep under @swimlane/* and ng-mocks
# to ^21.2.0 via the `overrides:` block below; this block just suppresses
# the cosmetic peer-range warning that overrides do not silence on their own.
# When @swimlane / ng-mocks publish releases that declare Angular 21 in their
# peer range, this block (and the matching overrides) can be removed.
peerDependencyRules:
    allowedVersions:
        # eslint-plugin-jest-extended still declares "^7 || ^8 || ^9"; the plugin works fine on
        # ESLint 10. Scoped to that one package so we don't silence legitimate ESLint-version
        # warnings from other plugins. Drop this entry once upstream lists ESLint 10.
        'eslint-plugin-jest-extended>eslint': '10'
        '@angular/animations': '21'
        '@angular/cdk': '21'
        '@angular/common': '21'
        '@angular/compiler': '21'
        '@angular/core': '21'
        '@angular/forms': '21'
        '@angular/platform-browser': '21'
        '@angular/platform-browser-dynamic': '21'
        '@angular/router': '21'

# Dependency overrides. pnpm 11 reads overrides from this file in preference to
# the legacy `pnpm.overrides` block in package.json. We pin a handful of
# transitive packages to CVE-patched versions and force Angular 21 across all
# @swimlane/* and ng-mocks subtrees (still on older peer ranges).
overrides:
    '@angular-builders/jest>@angular-devkit/build-angular': '^21.2.0'
    '@angular-builders/jest>@angular/cdk': '^21.2.0'
    '@angular-builders/jest>@angular/common': '^21.2.0'
    '@angular-builders/jest>@angular/compiler': '^21.2.0'
    '@angular-builders/jest>@angular/core': '^21.2.0'
    '@angular-builders/jest>@angular/forms': '^21.2.0'
    '@angular-builders/jest>@angular/platform-browser': '^21.2.0'
    '@angular-builders/jest>@angular/platform-browser-dynamic': '^21.2.0'
    '@angular-builders/jest>@angular/router': '^21.2.0'
    '@angular-builders/jest>@angular/compiler-cli': '^21.2.0'
    '@swimlane/ngx-charts>@angular/animations': '^21.2.0'
    '@swimlane/ngx-charts>@angular/cdk': '^21.2.0'
    '@swimlane/ngx-charts>@angular/common': '^21.2.0'
    '@swimlane/ngx-charts>@angular/compiler': '^21.2.0'
    '@swimlane/ngx-charts>@angular/core': '^21.2.0'
    '@swimlane/ngx-charts>@angular/forms': '^21.2.0'
    '@swimlane/ngx-charts>@angular/platform-browser': '^21.2.0'
    '@swimlane/ngx-charts>@angular/platform-browser-dynamic': '^21.2.0'
    '@swimlane/ngx-charts>@angular/router': '^21.2.0'
    '@swimlane/ngx-charts>rxjs': '^7.8.2'
    '@swimlane/ngx-graph>@angular/animations': '^21.2.0'
    '@swimlane/ngx-graph>@angular/cdk': '^21.2.0'
    '@swimlane/ngx-graph>@angular/common': '^21.2.0'
    '@swimlane/ngx-graph>@angular/compiler': '^21.2.0'
    '@swimlane/ngx-graph>@angular/core': '^21.2.0'
    '@swimlane/ngx-graph>@angular/forms': '^21.2.0'
    '@swimlane/ngx-graph>@angular/platform-browser': '^21.2.0'
    '@swimlane/ngx-graph>@angular/platform-browser-dynamic': '^21.2.0'
    '@swimlane/ngx-graph>@angular/router': '^21.2.0'
    '@swimlane/ngx-graph>rxjs': '^7.8.2'
    'ng-mocks>@angular/common': '^21.2.0'
    'ng-mocks>@angular/core': '^21.2.0'
    'ng-mocks>@angular/forms': '^21.2.0'
    'ng-mocks>@angular/platform-browser': '^21.2.0'
    'ng-mocks>@angular/platform-browser-dynamic': '^21.2.0'
    'ng-mocks>@angular/router': '^21.2.0'
    'ng-mocks>rxjs': '^7.8.2'
    'babel-plugin-istanbul>test-exclude': '8.0.0'
    '@babel/runtime': '7.29.2'
    '@babel/plugin-transform-modules-systemjs': '7.29.4'
    '@primeuix/styled': '0.7.4'
    '@sinonjs/fake-timers': '15.4.0'
