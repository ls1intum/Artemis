# pnpm 11+ moved install/resolution settings out of `.npmrc` (which it now
# ignores for everything except registry/auth/Node settings like node-options)
# and into this file. Settings here govern the install behaviour in this
# project root.

# Keep an npm-like hoisted node_modules so the few places that deep-path into it
# (Angular asset paths in angular.json, the pdfjs postinstall worker copy,
# Jest moduleNameMapper) continue to resolve packages at the top level.
# Follow-up: tighten by removing this once phantom dependencies are made explicit.
shamefullyHoist: true
publicHoistPattern:
    - '*'

# Treat the lockfile as authoritative; never silently update it during install.
preferFrozenLockfile: true

# Allow our own pre/post lifecycle scripts (postinstall, prepare) to run.
enablePrePostScripts: true

# Native bindings that need their postinstall scripts to run for Angular CLI /
# esbuild / eslint to work end-to-end.
allowBuilds:
    '@parcel/watcher': true
    '@swc/core': true
    core-js: true
    esbuild: true
    husky: true
    lmdb: true
    msgpackr-extract: true
    unrs-resolver: true
