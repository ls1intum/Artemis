# Pyris application config for the Iris (real-Pyris) e2e stack.
#
# Derived from edutelligence/iris application.example.yml (origin/main) with the
# changes required to run unmodified Pyris against a MOCK LLM and a real Weaviate,
# calling back to Artemis on the host:
#
#   * api_keys[0].token MUST equal Artemis `artemis.iris.secret-token`
#     (ARTEMIS_IRIS_SECRETTOKEN). Pyris raw-compares the incoming Authorization
#     header to this token (no Bearer prefix).
#   * weaviate.host = "weaviate" (the compose service name; same docker network).
#   * memiris.enabled = false  -> no Ollama/embedding calls from memory pipelines.
#   * local_llm_enabled = false -> only the `.cloud` llm ids must resolve; Artemis
#     sends selection=CLOUD_AI by default, so only cloud ids are used at runtime.
#   * llm_configuration adds the `chat_pipeline` key (the unified chat pipeline,
#     PIPELINE_ID "chat_pipeline"); the legacy *_chat_pipeline keys are now dead
#     but kept (ignored) for parity with the upstream example.
#   * All chat/keyword_summary cloud ids resolve to mock-backed openai_chat models
#     defined in llm_config.local.yml.

api_keys:
  - token: "iris-e2e-secret-token"

weaviate:
  host: "weaviate"
  port: 8001
  grpc_port: 50051
  http_secure: false
  grpc_secure: false

memiris:
  enabled: false
  sleep_enabled: false

local_llm_enabled: false

langfuse:
  enabled: false

transcription:
  enabled: false

env_vars:
  SOME: "value"

# Values are LLM entry IDs (the "id" field in llm_config.local.yml).
llm_configuration:
  # The unified chat pipeline (course/exercise/text/lecture chat). REQUIRED key.
  chat_pipeline:
    default:
      chat:
        local: oai-gpt-5-mini
        cloud: oai-gpt-5-mini
    advanced:
      chat:
        local: oai-gpt-52
        cloud: oai-gpt-52

  course_chat_pipeline:
