artemis:
    atlas:
        enabled: true
        atlasml:
            enabled: false
    hyperion:
        enabled: false
    iris:
        enabled: false
    exam:
        enabled: true
    plagiarism:
        enabled: true
    text:
        enabled: true
    modeling:
        enabled: true
    fileupload:
        enabled: true
    lecture:
        enabled: true
    sharing:
        enabled: false
    tutorialgroup:
        enabled: true
    lti:
        enabled: false
    athena:
        enabled: false
        modules:
            text: module_text_test
            programming: module_programming_test
            modeling: module_modeling_test
    apollon:
        enabled: false
    user-management:
        ldap:
            enabled: false
        saml2:
            enabled: false
        passkey:
            enabled: false
            require-for-administrator-features: false
            ask-users-to-setup: true
            token-validity-in-seconds-for-passkey: 15552000
spring:
    liquibase:
        enabled: true
    autoconfigure:
        exclude:
          # Keep in sync with application-core.yml — this test file shadows the main one entirely,
          # so the core-profile exclude list must be repeated here. Without it the buildagent
          # profile's JPA exclusions (HibernateJpaAutoConfiguration etc.) are not overridden by
          # the lighter core list, and entityManagerFactory is never created in LocalCI tests.
          - org.springframework.boot.data.autoconfigure.metrics.DataRepositoryMetricsAutoConfiguration
          - org.springframework.boot.micrometer.metrics.autoconfigure.startup.StartupTimeMetricsListenerAutoConfiguration
          - org.springframework.boot.micrometer.metrics.autoconfigure.task.TaskExecutorMetricsAutoConfiguration
          - org.springframework.boot.tomcat.autoconfigure.metrics.TomcatMetricsAutoConfiguration
    cloud:
        loadbalancer:
            cache:
                enabled: true
