<div class="slider m-2 mb-5">
    <div class="range-input">
        <div class="progress" [style.left.%]="sliderMinPercentage()" [style.right.%]="sliderMaxPercentage()"></div>
        <span class="slider-value" [style.left.%]="sliderMinPercentage() * SLIDER_THUMB_LABEL_POSITION_ADJUSTMENT_FACTOR" [style.margin-left]="labelMargin() + 'rem'"
            >{{ localMinValue() }}{{ labelSymbol() }}</span
        >
        <span class="slider-value" [style.right.%]="sliderMaxPercentage() * SLIDER_THUMB_LABEL_POSITION_ADJUSTMENT_FACTOR" [style.margin-right]="labelMargin() + 'rem'"
            >{{ localMaxValue() }}{{ labelSymbol() }}</span
        >

        <input
            type="range"
            [min]="generalMinValue()"
            [max]="generalMaxValue()"
            [ngModel]="localMinValue()"
            (ngModelChange)="localMinValue.set($event)"
            (input)="onSelectedValueDuringDrag($event)"
            class="range-min"
            [step]="step()"
            (change)="onSelectedMinValueChanged($event)"
        />
        <input
            type="range"
            [min]="generalMinValue()"
            [max]="generalMaxValue()"
            [ngModel]="localMaxValue()"
            (ngModelChange)="localMaxValue.set($event)"
            (input)="onSelectedValueDuringDrag($event)"
            class="range-max"
            [step]="step()"
            (change)="onSelectedMaxValueChanged($event)"
        />
    </div>
</div>
