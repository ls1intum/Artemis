<jhi-unified-feedback
    #unifiedFeedback
    [editable]="true"
    [readOnly]="readOnly()"
    [feedback]="feedback()"
    [highlightDifferences]="highlightDifferences()"
    [useDefaultFeedbackSuggestionBadgeText]="true"
    [(feedbackTitle)]="feedback().text"
    [(feedbackDetail)]="feedback().detailText"
    [(feedbackCredits)]="feedback().credits!"
    (feedbackTitleChange)="didChange()"
    (feedbackDetailChange)="didChange()"
    (feedbackCreditsChange)="onScoreChange()"
    (onDelete)="dismiss()"
    (keydown.escape)="escKeyup()"
>
    @if (criteria(); as criteriaList) {
        @if (criteriaList.length > 0) {
            <div unifiedFeedbackExtraControls class="dropdown" ngbDropdown (drop)="connectFeedbackWithInstruction($event)" (dragover)="$event.preventDefault()">
                <button class="btn btn-primary dropdown-toggle" ngbDropdownToggle type="button" [attr.aria-label]="connectToInstructionAriaLabel()"></button>
                @if (criteriaList.length === 1) {
                    <ul ngbDropdownMenu>
                        <jhi-textblock-feedback-dropdown [criterion]="criteriaList[0]" [feedback]="feedback()" (didChange)="didChange()" />
                    </ul>
                } @else {
                    <ul class="dropdown-menu" ngbDropdownMenu>
                        @for (criterion of criteriaList; track criterion) {
                            <li>
                                @if (criterion.title) {
                                    <a class="dropdown-item">{{ criterion.title }}&nbsp;<fa-icon class="float-end" [icon]="faAngleRight" /></a>
                                } @else {
                                    <a class="dropdown-item">(No title)<fa-icon class="float-end" [icon]="faAngleRight" /></a>
                                }
                                <ul class="dropdown-menu dropdown-submenu">
                                    <jhi-textblock-feedback-dropdown [criterion]="criterion" [feedback]="feedback()" (didChange)="didChange()" />
                                </ul>
                            </li>
                        }
                    </ul>
                }
            </div>
        }
    }
</jhi-unified-feedback>
