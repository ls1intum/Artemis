@if (metadata().isOpen) {
    <div class="pdf-fullscreen-overlay" (click)="close()">
        <div class="pdf-fullscreen-window" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
            <button
                class="pdf-fullscreen-close"
                type="button"
                [attr.aria-label]="'artemisApp.attachmentVideoUnit.pdfViewer.closeFullscreen' | artemisTranslate"
                [title]="'artemisApp.attachmentVideoUnit.pdfViewer.closeFullscreen' | artemisTranslate"
                (click)="close()"
            >
                <fa-icon [icon]="faXmark" />
            </button>
            <iframe
                #fullscreenIframe
                [src]="iframeSrc | safeResourceUrl"
                class="pdf-iframe"
                [attr.title]="'artemisApp.attachmentVideoUnit.pdfViewer.title' | artemisTranslate"
            ></iframe>
            @if (metadata().uploadDate || metadata().version) {
                <div class="pdf-viewer-footer">
                    @if (metadata().uploadDate) {
                        <span jhiTranslate="artemisApp.attachmentVideoUnit.uploadDate">Upload Date</span>:
                        {{ metadata().uploadDate | artemisDate }}
                    }
                    @if (metadata().uploadDate && metadata().version) {
                        <span class="pdf-viewer-footer__separator">-</span>
                    }
                    @if (metadata().version) {
                        <span jhiTranslate="artemisApp.attachmentVideoUnit.version">Version</span>:
                        {{ metadata().version }}
                    }
                </div>
            }
        </div>
    </div>
}
