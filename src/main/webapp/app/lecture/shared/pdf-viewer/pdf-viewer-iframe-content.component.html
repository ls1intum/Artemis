<div class="iframe-pdf-container" [class.dark-mode]="isDarkMode()">
    <ngx-extended-pdf-viewer
        class="iframe-pdf-viewer"
        [src]="pdfUrl()"
        [page]="currentPage()"
        [customToolbar]="customToolbar"
        (pageChange)="onPageChange($event)"
        (pagesLoaded)="onPagesLoaded($event)"
        (pdfLoadingFailed)="onPdfLoadingFailed()"
        (updateFindMatchesCount)="onFindMatchesCountUpdate($event)"
        [ignoreKeyboard]="true"
        [zoom]="'page-width'"
        [textLayer]="true"
        [sidebarVisible]="false"
        [showSidebarButton]="false"
        [showFindButton]="false"
        [showOpenFileButton]="false"
        [showPrintButton]="false"
        [showDownloadButton]="false"
        [showSecondaryToolbarButton]="false"
        [showRotateButton]="false"
        [showSpreadButton]="false"
        [showPropertiesButton]="false"
        [showScrollingButtons]="false"
        [showTextEditor]="false"
        [showStampEditor]="false"
        [showCommentEditor]="false"
        [showDrawEditor]="false"
        [showHighlightEditor]="false"
        [showSignatureEditor]="false"
        [showPagingButtons]="false"
        [showZoomDropdown]="false"
    />
    <ng-template #customToolbar>
        <div id="toolbarViewer" class="artemis-pdf-toolbar">
            <div class="artemis-pdf-toolbar__center">
                <div class="artemis-pdf-toolbar__search">
                    <div class="artemis-pdf-toolbar__search-field">
                        <fa-icon class="artemis-pdf-toolbar__search-icon" [icon]="faMagnifyingGlass" />
                        <input
                            pInputText
                            type="text"
                            class="artemis-pdf-toolbar__search-input"
                            [placeholder]="'artemisApp.attachmentVideoUnit.pdfViewer.searchPlaceholder' | artemisTranslate"
                            [ngModel]="searchQuery()"
                            (ngModelChange)="performSearch($event)"
                            (keydown.enter)="onSearchInputEnter($event)"
                            [attr.aria-label]="'artemisApp.attachmentVideoUnit.pdfViewer.search' | artemisTranslate"
                        />
                    </div>
                    @if (searchQuery()) {
                        <div class="artemis-pdf-toolbar__search-controls">
                            @if (searchMatchesCount()) {
                                <span class="artemis-pdf-toolbar__search-count"> {{ searchMatchesCount()!.current }}/{{ searchMatchesCount()!.total }} </span>
                            }
                            <button
                                class="artemis-pdf-toolbar__button"
                                type="button"
                                [title]="'artemisApp.attachmentVideoUnit.pdfViewer.previousMatch' | artemisTranslate"
                                [disabled]="!searchMatchesCount()?.total"
                                (click)="search(true)"
                            >
                                <fa-icon [icon]="faChevronUp" />
                            </button>
                            <button
                                #searchNextButton
                                class="artemis-pdf-toolbar__button"
                                type="button"
                                [title]="'artemisApp.attachmentVideoUnit.pdfViewer.nextMatch' | artemisTranslate"
                                [disabled]="!searchMatchesCount()?.total"
                                (click)="search(false)"
                            >
                                <fa-icon [icon]="faChevronDown" />
                            </button>
                            <button
                                class="artemis-pdf-toolbar__button"
                                type="button"
                                [title]="'artemisApp.attachmentVideoUnit.pdfViewer.clearSearch' | artemisTranslate"
                                (click)="clearSearch()"
                            >
                                <fa-icon [icon]="faTimes" />
                            </button>
                        </div>
                    }
                </div>
                <div class="artemis-pdf-toolbar__divider"></div>
                @if (totalPages() > 0) {
                    <div class="artemis-pdf-toolbar__page-navigation">
                        <p-inputNumber
                            #pageInput
                            [ngModel]="pageInputValue()"
                            (ngModelChange)="pageInputValue.set($event ?? undefined)"
                            (keydown.enter)="confirmPageNavigation()"
                            (onFocus)="onPageInputFocus()"
                            [showButtons]="false"
                            [placeholder]="'artemisApp.attachmentVideoUnit.pdfViewer.pageInputPlaceholder' | artemisTranslate"
                            [attr.aria-label]="'artemisApp.attachmentVideoUnit.pdfViewer.goToPage' | artemisTranslate"
                            inputStyleClass="artemis-pdf-toolbar__page-input"
                        />
                        <button
                            class="artemis-pdf-toolbar__button artemis-pdf-toolbar__page-confirm"
                            type="button"
                            [title]="'artemisApp.attachmentVideoUnit.pdfViewer.confirmPage' | artemisTranslate"
                            (click)="confirmPageNavigation()"
                        >
                            <fa-icon [icon]="faCheck" />
                        </button>
                        <span class="artemis-pdf-toolbar__page-total">/{{ totalPages() }}</span>
                    </div>
                    <div class="artemis-pdf-toolbar__divider"></div>
                }
                <button
                    class="artemis-pdf-toolbar__button"
                    type="button"
                    [title]="'artemisApp.attachmentVideoUnit.pdfViewer.zoomOut' | artemisTranslate"
                    [attr.aria-label]="'artemisApp.attachmentVideoUnit.pdfViewer.zoomOut' | artemisTranslate"
                    (click)="zoomOut()"
                >
                    <fa-icon [icon]="faMagnifyingGlassMinus" />
                </button>
                <button
                    class="artemis-pdf-toolbar__button"
                    type="button"
                    [title]="'artemisApp.attachmentVideoUnit.pdfViewer.zoomIn' | artemisTranslate"
                    [attr.aria-label]="'artemisApp.attachmentVideoUnit.pdfViewer.zoomIn' | artemisTranslate"
                    (click)="zoomIn()"
                >
                    <fa-icon [icon]="faMagnifyingGlassPlus" />
                </button>
                <div class="artemis-pdf-toolbar__divider"></div>
                <button
                    class="artemis-pdf-toolbar__button"
                    type="button"
                    [title]="'artemisApp.attachmentVideoUnit.pdfViewer.downloadPdf' | artemisTranslate"
                    [attr.aria-label]="'artemisApp.attachmentVideoUnit.pdfViewer.downloadPdf' | artemisTranslate"
                    (click)="triggerDownload()"
                >
                    <fa-icon [icon]="faDownload" />
                </button>
                @if (!isFullscreenMode()) {
                    <div class="artemis-pdf-toolbar__divider"></div>
                    <button
                        class="artemis-pdf-toolbar__button"
                        type="button"
                        [title]="'artemisApp.attachmentVideoUnit.pdfViewer.openFullscreen' | artemisTranslate"
                        [attr.aria-label]="'artemisApp.attachmentVideoUnit.pdfViewer.openFullscreen' | artemisTranslate"
                        (click)="requestFullscreen()"
                    >
                        <fa-icon [icon]="faExpand" />
                    </button>
                }
            </div>
        </div>
    </ng-template>
</div>
