<div class="iframe-pdf-container">
    <ngx-extended-pdf-viewer
        class="iframe-pdf-viewer"
        [src]="pdfUrl()"
        [page]="initialPage()"
        [customToolbar]="customToolbar"
        (pageChange)="onPageChange($event)"
        (pagesLoaded)="onPagesLoaded($event)"
        [showToolbar]="true"
        [ignoreKeyboard]="true"
        [zoom]="'page-width'"
        [showSidebarButton]="false"
        [showFindButton]="false"
        [showOpenFileButton]="false"
        [showPrintButton]="false"
        [showDownloadButton]="false"
        [showSecondaryToolbarButton]="false"
        [showPresentationModeButton]="false"
        [showRotateButton]="false"
        [showRotateCwButton]="false"
        [showRotateCcwButton]="false"
        [showHandToolButton]="false"
        [showSpreadButton]="false"
        [showPropertiesButton]="false"
        [showSinglePageModeButton]="false"
        [showVerticalScrollButton]="false"
        [showHorizontalScrollButton]="false"
        [showWrappedScrollButton]="false"
        [showInfiniteScrollButton]="false"
        [showBookModeButton]="false"
        [showTextEditor]="false"
        [showStampEditor]="false"
        [showCommentEditor]="false"
        [showDrawEditor]="false"
        [showHighlightEditor]="false"
        [showSignatureEditor]="false"
        [showMovePageButton]="false"
        [showPagingButtons]="false"
        [showFirstAndLastPageButtons]="false"
        [showPreviousAndNextPageButtons]="false"
        [showPageNumber]="false"
        [showPageLabel]="false"
        [showZoomButtons]="true"
        [showZoomDropdown]="false"
        [showScrollingButtons]="false"
    />
    <ng-template #customToolbar>
        <div id="toolbarViewer" class="artemis-pdf-toolbar">
            <div class="artemis-pdf-toolbar__center">
                <button class="artemis-pdf-toolbar__button" type="button" title="Zoom Out" (click)="zoomOut()">
                    <fa-icon [icon]="faMagnifyingGlassMinus" />
                </button>
                <button class="artemis-pdf-toolbar__button" type="button" title="Zoom In" (click)="zoomIn()">
                    <fa-icon [icon]="faMagnifyingGlassPlus" />
                </button>
                @if (totalPages() > 0) {
                    <span class="artemis-pdf-toolbar__page">{{ currentPage() }}/{{ totalPages() }}</span>
                }
            </div>
        </div>
    </ng-template>
</div>
