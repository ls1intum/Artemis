<div class="pdf-fullscreen-overlay" (click)="onOverlayClick()">
    <div #fullscreenWindow class="pdf-fullscreen-window" role="dialog" aria-modal="true" tabindex="0" (click)="$event.stopPropagation()" (keydown.escape)="onEscapeKey()">
        <button
            class="pdf-fullscreen-close"
            type="button"
            [attr.aria-label]="'artemisApp.attachmentVideoUnit.pdfViewer.closeFullscreen' | artemisTranslate"
            [title]="'artemisApp.attachmentVideoUnit.pdfViewer.closeFullscreen' | artemisTranslate"
            (click)="onCloseClick()"
        >
            <fa-icon [icon]="faXmark" />
        </button>

        @if (isLoading()) {
            <div class="d-flex justify-content-center align-items-center position-absolute w-100 h-100">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">{{ 'artemisApp.attachmentVideoUnit.pdfViewer.loadingPdf' | artemisTranslate }}</span>
                </div>
            </div>
        }

        <ng-content />
    </div>
</div>
