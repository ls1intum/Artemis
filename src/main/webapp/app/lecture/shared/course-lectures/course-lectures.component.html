<div class="d-flex justify-content-between">
    @if (course()) {
        @if (sidebarData(); as currentSidebarData) {
            <div [class.sidebar-collapsed]="isCollapsed()">
                <jhi-sidebar
                    [itemSelected]="lectureSelected()"
                    [courseId]="courseId()"
                    [sidebarData]="currentSidebarData"
                    [collapseState]="DEFAULT_COLLAPSE_STATE"
                    [sidebarItemAlwaysShow]="DEFAULT_SHOW_ALWAYS"
                    [pageTitle]="pageTitle()"
                    [showSidebarToggle]="true"
                    [isSidebarCollapsed]="isCollapsed()"
                    (toggleSidebar)="toggleSidebar()"
                />
            </div>
        }

        @if (lectureSelected()) {
            <div [class.content-sidebar-width]="!isCollapsed()" class="content-width module-bg rounded-3">
                @if (isCollapsed()) {
                    <div class="px-3 pt-2">
                        <jhi-course-sidebar-toggle-button [isCollapsed]="true" (toggleSidebar)="toggleSidebar()" />
                    </div>
                }
                <router-outlet (deactivate)="onSubRouteDeactivate()" />
            </div>
        } @else {
            <div class="vw-100 module-bg rounded-3 p-3 d-flex justify-content-between">
                <div class="col-12 text-center my-auto" jhiTranslate="artemisApp.courseOverview.lectureDetails.selectLecture"></div>
            </div>
        }
    }
</div>
