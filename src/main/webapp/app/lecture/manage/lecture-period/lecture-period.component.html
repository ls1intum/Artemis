<div class="frame">
    <h3 id="artemisApp.lecture.sections.period" jhiTranslate="artemisApp.lecture.sections.period"></h3>
    <p jhiTranslate="artemisApp.lecture.sections.periodDescription"></p>
    <div class="d-flex gap-3">
        <div class="form-group flex-grow-1">
            <jhi-date-time-picker
                labelName="{{ 'artemisApp.lecture.startDate' | artemisTranslate }}"
                [(ngModel)]="lecture().startDate"
                (valueChange)="onDateChange()"
                name="startDate"
                id="start-date"
            />
        </div>
        <div class="form-group flex-grow-1">
            <jhi-date-time-picker
                labelName="{{ 'artemisApp.lecture.endDate' | artemisTranslate }}"
                [(ngModel)]="lecture().endDate"
                (valueChange)="onDateChange()"
                name="endDate"
                id="end-date"
            />
        </div>
    </div>
</div>
