<div>
    <div class="d-flex flex-wrap justify-content-between align-items-baseline gap-2">
        <div class="d-flex gap-2 align-items-baseline">
            <h4 jhiTranslate="artemisApp.courseStudentDashboard.exerciseLateness.title"></h4>
            <jhi-help-icon text="artemisApp.courseStudentDashboard.exerciseLateness.info" />
        </div>
        @if (isDataAvailable()) {
            <!-- Legend-->
            <div class="d-flex gap-3">
                <div class="d-flex align-items-center gap-1">
                    <span class="tooltip-label" [style.background-color]="YOUR_GRAPH_COLOR"></span>
                    <span jhiTranslate="artemisApp.courseStudentDashboard.exerciseLateness.yourLatenessLabel"></span>
                </div>
                <div class="d-flex align-items-center gap-1">
                    <span class="tooltip-label" [style.background-color]="AVERAGE_GRAPH_COLOR"></span>
                    <span jhiTranslate="artemisApp.courseStudentDashboard.exerciseLateness.averageLatenessLabel"></span>
                </div>
            </div>
        }
    </div>
    @if (isDataAvailable()) {
        <div class="mt-2 justify-content-center">
            <div style="height: 200px">
                <p-chart type="line" [data]="chartData()" [options]="chartOptions()" />
            </div>
        </div>
    } @else {
        <div class="mt-2" jhiTranslate="artemisApp.courseStudentDashboard.exerciseLateness.noData"></div>
    }
</div>
