<div class="flex flex-col gap-1">
    <div class="flex flex-col md:flex-row md:items-center">
        <label for="confirm-entity-name" [ngClass]="warningTextColor()" [jhiTranslate]="confirmationText()"></label>
        <code class="display-spaces background-grey rounded-md inline-block md:ms-2 px-2">{{ entityName() }}</code>
        <jhi-copy-to-clipboard-button [copyText]="entityName()" />
    </div>
    <input id="confirm-entity-name" pInputText type="text" name="confirmEntityName" [formControl]="control" (blur)="onTouched()" />
</div>
