@if (copyText().length > 0) {
    <p-button
        id="copyButton"
        type="button"
        [text]="true"
        size="small"
        [severity]="wasCopied() ? 'success' : 'secondary'"
        [styleClass]="'ms-1 ' + class()"
        [cdkCopyToClipboard]="copyText()"
        (cdkCopyToClipboardCopied)="onCopyFinished()"
        [pTooltip]="'global.generic.copy' | artemisTranslate"
    >
        <fa-icon [icon]="wasCopied() ? faCheck : faCopy" />
    </p-button>
}
