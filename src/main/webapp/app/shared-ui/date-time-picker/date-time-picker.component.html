@if (labelName() && !hideLabelName()) {
    <label for="date-input-field" class="font-bold">
        {{ labelName() }}
    </label>
}
@if (labelTooltip()) {
    <fa-stack class="text-secondary icon-full-size" [pTooltip]="labelTooltip()">
        <fa-icon [icon]="faQuestionCircle" stackItemSize="1x" />
    </fa-stack>
}
@if (shouldDisplayTimeZoneWarning()) {
    <fa-stack pTooltip="{{ 'entity.timeZoneWarning' | artemisTranslate: { timeZone: currentTimeZone } }}" class="icon-full-size">
        <fa-icon [icon]="faGlobe" stackItemSize="1x" class="text-lightgrey" />
        <fa-icon [icon]="faClock" stackItemSize="1x" transform="shrink-6 down-5 right-5" class="text-secondary" />
    </fa-stack>
}
<div class="flex relative" data-testid="date-picker-wrapper" [class.invalid-date-input]="showErrorBorder()">
    <p-datepicker
        #datePicker
        inputId="date-input-field"
        styleClass="w-full"
        [inputStyleClass]="warning() ? 'date-time-picker-warning-border' : ''"
        panelStyleClass="jhi-date-time-picker-panel"
        [ngModel]="value() ?? null"
        [ngModelOptions]="{ standalone: true }"
        (ngModelChange)="updateField($event)"
        (onBlur)="onInputBlur($event)"
        name="datePicker"
        [showTime]="showTime()"
        [timeOnly]="timeOnly()"
        hourFormat="24"
        [dateFormat]="dateFormat()"
        timeSeparator=":"
        [placeholder]="placeholder()"
        [firstDayOfWeek]="1"
        keepInvalid="true"
        showClear="true"
        [showIcon]="true"
        iconDisplay="input"
        showOnFocus="false"
        appendTo="body"
        [baseZIndex]="baseZIndex()"
        [minDate]="minDate()"
        [maxDate]="maxDate()"
        [defaultDate]="startDate()"
        [disabled]="disabled()"
        [showButtonBar]="showTime() || timeOnly()"
        [invalid]="showErrorBorder()"
    >
        <!-- The picker leaves the panel open after a time selection (unlike the legacy picker). Provide an
             explicit confirm button that also commits the currently shown time, so applying it is one click. -->
        <ng-template #buttonbar>
            <div class="flex justify-end w-full">
                <button pButton type="button" size="small" (click)="applyAndClose(datePicker)" jhiTranslate="entity.action.done"></button>
            </div>
        </ng-template>
    </p-datepicker>
</div>
@if (!isInputValid() || (requiredField() && !dateInputValue())) {
    <div class="text-state-danger text-sm mt-1 block" jhiTranslate="entity.dateMissingOrNotValid" [translateValues]="{ labelName: labelName() }"></div>
}
@if (warning()) {
    <div class="text-state-danger text-sm mt-1 block">
        <fa-icon class="text-state-warning" [icon]="faTriangleExclamation" />
        <span class="visible-date-warning" jhiTranslate="entity.visibleDateWarningError" pTooltip="{{ 'entity.visibleDateWarningToolTip' | artemisTranslate }}"></span>
    </div>
}
