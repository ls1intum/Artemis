@if (labelName() && !hideLabelName()) {
    <label for="date-input-field" class="form-control-label col">
        {{ labelName() }}
    </label>
}
@if (labelTooltip()) {
    <fa-stack class="text-secondary icon-full-size" [ngbTooltip]="labelTooltip()">
        <fa-icon [icon]="faQuestionCircle" stackItemSize="1x" />
    </fa-stack>
}
@if (shouldDisplayTimeZoneWarning()) {
    <fa-stack ngbTooltip="{{ 'entity.timeZoneWarning' | artemisTranslate: { timeZone: currentTimeZone } }}" class="icon-full-size">
        <fa-icon [icon]="faGlobe" stackItemSize="1x" class="text-lightgrey" />
        <fa-icon [icon]="faClock" stackItemSize="1x" transform="shrink-6 down-5 right-5" class="text-secondary" />
    </fa-stack>
}
<div class="d-flex position-relative" [class.invalid-date-input]="showErrorBorder()">
    <p-datepicker
        #datePicker
        inputId="date-input-field"
        styleClass="w-100"
        [inputStyleClass]="warning() ? 'border-warning' : ''"
        panelStyleClass="jhi-date-time-picker-panel"
        [ngModel]="value() ?? null"
        [ngModelOptions]="{ standalone: true }"
        (ngModelChange)="updateField($event)"
        name="datePicker"
        [showTime]="showTime()"
        [timeOnly]="timeOnly()"
        hourFormat="24"
        [dateFormat]="dateFormat()"
        timeSeparator=":"
        [placeholder]="placeholder()"
        [firstDayOfWeek]="1"
        keepInvalid="true"
        showClear="true"
        [showIcon]="true"
        iconDisplay="input"
        showOnFocus="false"
        appendTo="body"
        [baseZIndex]="baseZIndex()"
        [minDate]="minDate()"
        [maxDate]="maxDate()"
        [defaultDate]="startDate()"
        [disabled]="disabled()"
        [showButtonBar]="showTime() || timeOnly()"
        [invalid]="showErrorBorder()"
    >
        <!-- The picker applies a time selection immediately, but (unlike the legacy picker) leaves the
             panel open. Provide an explicit confirm/close affordance for the modes with a time spinner. -->
        <ng-template #buttonbar>
            <div class="d-flex justify-content-end w-100">
                <button type="button" class="btn btn-primary btn-sm" (click)="datePicker.hideOverlay()" jhiTranslate="entity.action.done"></button>
            </div>
        </ng-template>
    </p-datepicker>
</div>
@if (!isInputValid() || (requiredField() && !dateInputValue())) {
    <div class="invalid-feedback" jhiTranslate="entity.dateMissingOrNotValid" [translateValues]="{ labelName: labelName() }"></div>
}
@if (warning()) {
    <div class="invalid-feedback">
        <fa-icon class="text-warning" [icon]="faTriangleExclamation" />
        <span class="visible-date-warning" jhiTranslate="entity.visibleDateWarningError" ngbTooltip="{{ 'entity.visibleDateWarningToolTip' | artemisTranslate }}"></span>
    </div>
}
