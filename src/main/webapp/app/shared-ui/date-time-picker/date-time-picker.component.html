@if (labelName() && !hideLabelName()) {
    <label for="date-input-field" class="form-control-label col">
        {{ labelName() }}
    </label>
}
@if (labelTooltip()) {
    <fa-stack class="text-secondary icon-full-size" [pTooltip]="labelTooltip()">
        <fa-icon [icon]="faQuestionCircle" stackItemSize="1x" />
    </fa-stack>
}
@if (shouldDisplayTimeZoneWarning()) {
    <fa-stack pTooltip="{{ 'entity.timeZoneWarning' | artemisTranslate: { timeZone: currentTimeZone } }}" class="icon-full-size">
        <fa-icon [icon]="faGlobe" stackItemSize="1x" class="text-lightgrey" />
        <fa-icon [icon]="faClock" stackItemSize="1x" transform="shrink-6 down-5 right-5" class="text-secondary" />
    </fa-stack>
}
<div class="flex items-center relative">
    <p-datepicker
        #dateInput="ngModel"
        name="datePicker"
        inputId="date-input-field"
        styleClass="w-full"
        [ngClass]="{ 'border-warning': warning() }"
        [ngModel]="value()"
        [disabled]="disabled()"
        [invalid]="!isValid()"
        [showTime]="showTime()"
        [timeOnly]="timeOnly()"
        [showSeconds]="false"
        [hourFormat]="'24'"
        [firstDayOfWeek]="1"
        [minDate]="minDate() ?? null"
        [maxDate]="maxDate() ?? null"
        [defaultDate]="startDate() ?? null"
        [showIcon]="true"
        [iconDisplay]="'input'"
        [appendTo]="'body'"
        (ngModelChange)="updateField($event)"
    />
    <button class="btn relative" type="button" (click)="clearDate()">
        <fa-icon [icon]="faCircleXmark" />
    </button>
</div>
@if (requiredField() && !hasValidValue()) {
    @if (labelName()) {
        <small class="text-danger text-sm mt-1 block" jhiTranslate="entity.dateMissingOrNotValid" [translateValues]="{ labelName: labelName() }"></small>
    } @else {
        <small class="text-danger text-sm mt-1 block" jhiTranslate="entity.dateMissingOrNotValidGeneric"></small>
    }
}
@if (warning()) {
    <small class="text-sm mt-1 block">
        <fa-icon class="text-warning" [icon]="faTriangleExclamation" />
        <span class="visible-date-warning" jhiTranslate="entity.visibleDateWarningError" pTooltip="{{ 'entity.visibleDateWarningToolTip' | artemisTranslate }}"></span>
    </small>
}
