<div [class.build-overview-course-view]="courseId()">
    @if (!courseId()) {
        <h5 *adminTitleBarTitle id="build-overview-heading" class="mb-0" jhiTranslate="artemisApp.buildQueue.title"></h5>
        <div *adminTitleBarActions class="flex items-center gap-2">
            <span class="text-muted-color text-sm" jhiTranslate="artemisApp.buildQueue.jumpTo"></span>
            <p-buttongroup>
                <p-button severity="secondary" size="small" [outlined]="true" (onClick)="scrollToSection('build-queue-running-heading')">
                    <span jhiTranslate="artemisApp.buildQueue.running"></span>
                    <p-tag severity="info" styleClass="ms-1" [value]="(runningBuildJobs()?.length || 0).toString()" />
                </p-button>
                <p-button severity="secondary" size="small" [outlined]="true" (onClick)="scrollToSection('build-queue-queued-heading')">
                    <span jhiTranslate="artemisApp.buildQueue.queued"></span>
                    <p-tag severity="info" styleClass="ms-1" [value]="(queuedBuildJobs()?.length || 0).toString()" />
                </p-button>
                <p-button severity="secondary" size="small" [outlined]="true" (onClick)="scrollToSection('build-queue-finished-heading')">
                    <span jhiTranslate="artemisApp.buildQueue.finished"></span>
                </p-button>
            </p-buttongroup>
            <span
                class="text-muted-color text-sm"
                jhiTranslate="artemisApp.buildQueue.buildCapacityInfo"
                [translateValues]="{ running: currentBuilds(), capacity: buildCapacity(), agents: onlineAgents() }"
            ></span>
        </div>
    }

    @if (courseId()) {
        <!-- Navigation bar for course management view -->
        <div class="build-queue-nav-bar">
            <div class="flex justify-end items-center gap-2">
                <span class="text-muted-color text-sm" jhiTranslate="artemisApp.buildQueue.jumpTo"></span>
                <p-buttongroup>
                    <p-button severity="secondary" size="small" [outlined]="true" (onClick)="scrollToSection('build-queue-running-heading')">
                        <span jhiTranslate="artemisApp.buildQueue.running"></span>
                        <p-tag severity="info" styleClass="ms-1" [value]="(runningBuildJobs()?.length || 0).toString()" />
                    </p-button>
                    <p-button severity="secondary" size="small" [outlined]="true" (onClick)="scrollToSection('build-queue-queued-heading')">
                        <span jhiTranslate="artemisApp.buildQueue.queued"></span>
                        <p-tag severity="info" styleClass="ms-1" [value]="(queuedBuildJobs()?.length || 0).toString()" />
                    </p-button>
                    <p-button severity="secondary" size="small" [outlined]="true" (onClick)="scrollToSection('build-queue-finished-heading')">
                        <span jhiTranslate="artemisApp.buildQueue.finished"></span>
                    </p-button>
                </p-buttongroup>
                <span
                    class="text-muted-color text-sm"
                    jhiTranslate="artemisApp.buildQueue.buildCapacityInfo"
                    [translateValues]="{ running: currentBuilds(), capacity: buildCapacity(), agents: onlineAgents() }"
                ></span>
            </div>
        </div>
    }

    <div class="build-queue-main-content">
        <jhi-build-job-statistics #statisticsComponent />

        <div class="mb-5">
            <div class="flex items-center gap-3 mb-3">
                <h5 id="build-queue-running-heading" class="mb-0 flex items-center gap-2">
                    <span jhiTranslate="artemisApp.buildAgents.runningBuildJobs"></span>
                    <p-tag severity="info" [value]="(runningBuildJobs()?.length ?? 0).toString()" />
                </h5>
                @if (runningBuildJobs()?.length) {
                    <p-button severity="danger" size="small" (onClick)="cancelAllRunningBuildJobs()">
                        <fa-icon [icon]="faTimes" />
                        <span jhiTranslate="artemisApp.buildQueue.cancelAll"></span>
                    </p-button>
                }
            </div>
            <jhi-running-jobs-table
                [buildJobs]="runningBuildJobs()"
                [showCourseId]="isAdministrationView()"
                [isAdminView]="isAdministrationView()"
                [courseId]="courseId()"
                (cancelJob)="cancelBuildJob($event)"
                (jobClick)="navigateToJobDetail($event)"
            />
        </div>
        <div class="mb-5">
            <div class="flex items-center gap-3 mb-3">
                <h5 id="build-queue-queued-heading" class="mb-0 flex items-center gap-2">
                    <span jhiTranslate="artemisApp.buildQueue.queuedBuildJobs"></span>
                    <p-tag severity="secondary" [value]="(queuedBuildJobs()?.length ?? 0).toString()" />
                </h5>
                @if (queuedBuildJobs()?.length) {
                    <p-button severity="danger" size="small" (onClick)="cancelAllQueuedBuildJobs()">
                        <fa-icon [icon]="faTimes" />
                        <span jhiTranslate="artemisApp.buildQueue.cancelAll"></span>
                    </p-button>
                }
            </div>
            <jhi-queued-jobs-table
                [buildJobs]="queuedBuildJobs()"
                [showCourseId]="isAdministrationView()"
                [courseId]="courseId()"
                (cancelJob)="cancelBuildJob($event)"
                (jobClick)="navigateToJobDetail($event)"
            />
        </div>
        <div>
            <div class="flex justify-between">
                <div class="flex items-center gap-2">
                    <h5 id="build-queue-finished-heading" class="mb-0 flex items-center gap-2">
                        <span jhiTranslate="artemisApp.buildQueue.finishedBuildJobs"></span>
                        <p-tag severity="info" [value]="(finishedBuildJobs()?.length ?? 0).toString()" />
                    </h5>
                    <div class="flex items-center gap-2">
                        <input pInputText type="text" name="searchTerm" id="field_searchTerm" [(ngModel)]="searchTerm" (focusout)="triggerLoadFinishedJobs()" />
                        <jhi-help-icon text="artemisApp.buildQueue.filter.search.tooltip" />
                        <p-button size="small" (onClick)="triggerLoadFinishedJobs()">
                            <span jhiTranslate="artemisApp.buildQueue.filter.search.title"></span>
                        </p-button>
                    </div>
                    <p-button size="small" (onClick)="loadFinishedBuildJobs()">
                        <fa-icon [icon]="faSync" />
                        <span jhiTranslate="metrics.refresh.button"></span>
                    </p-button>
                    @if (isLoading()) {
                        <span class="text-muted-color text-sm" jhiTranslate="artemisApp.buildQueue.filter.search.loading"></span>
                    }
                </div>
                <div>
                    <p-button size="small" [severity]="finishedBuildJobFilter()?.numberOfAppliedFilters ? 'success' : 'secondary'" (onClick)="this.openFilterModal()">
                        <fa-icon [icon]="faFilter" />
                        <span class="hidden md:inline">
                            <span jhiTranslate="artemisApp.buildQueue.filter.open" [translateValues]="{ num: finishedBuildJobFilter()?.numberOfAppliedFilters ?? 0 }"></span>
                        </span>
                    </p-button>
                </div>
            </div>
            <jhi-finished-jobs-table
                [buildJobs]="finishedBuildJobs()"
                [showCourseId]="isAdministrationView()"
                [isAdminView]="isAdministrationView()"
                [courseId]="courseId()"
                [buildAgents]="buildAgents()"
                [(predicate)]="predicate"
                [(ascending)]="ascending"
                (sortChange)="loadFinishedBuildJobs()"
                (jobClick)="navigateToJobDetail($event)"
                (viewLogs)="viewBuildLogs($event)"
            />
            @if (finishedBuildJobs()) {
                <div>
                    <div class="flex justify-center">
                        <jhi-slice-navigator [config]="paginationConfig" [hasMoreItems]="hasMore()" [isLoading]="isLoading()" (pageChange)="onPageChange($event)" />
                    </div>
                </div>
            }
        </div>
    </div>

    <!-- Modal -->
    <p-dialog
        [modal]="true"
        [visible]="buildLogsModalVisible()"
        (visibleChange)="buildLogsModalVisible.set($event)"
        [style]="{ width: '90dvw', height: '90dvh' }"
        [contentStyle]="{ overflow: 'auto' }"
        [draggable]="false"
        [dismissableMask]="true"
    >
        <ng-template pTemplate="header">
            <span jhiTranslate="artemisApp.buildQueue.logs.title"></span>
            <span>&nbsp;{{ displayedBuildJobId() }}</span>
        </ng-template>
        <div class="overflow-auto">
            @if (rawBuildLogsString()) {
                <pre class="mb-0">{{ rawBuildLogsString() }}</pre>
            } @else {
                <span jhiTranslate="artemisApp.buildQueue.logs.noLogs"></span>
            }
        </div>
        <ng-template pTemplate="footer">
            <p-button type="button" severity="secondary" size="small" (onClick)="buildLogsModalVisible.set(false)">
                <span jhiTranslate="artemisApp.buildQueue.filter.close"></span>
            </p-button>
            <p-button size="small" (onClick)="downloadBuildLogs()">
                <span jhiTranslate="artemisApp.buildQueue.logs.download"></span>
            </p-button>
        </ng-template>
    </p-dialog>
</div>
