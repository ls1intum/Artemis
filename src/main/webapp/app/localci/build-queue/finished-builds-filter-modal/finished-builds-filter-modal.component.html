<div>
    <div>
        <div>
            <div class="finished-build-jobs-filter-border-bottom flex flex-row pb-1">
                <h5 class="my-0">
                    <span jhiTranslate="artemisApp.buildQueue.filter.buildStatus.title"></span>
                </h5>
            </div>
            <div class="finished-build-jobs-filter-background-accent px-3 py-2">
                <ul class="grid grid-cols-2 gap-2 text-nowrap list-none my-0 p-0 sm:grid-cols-4">
                    @for (status of this.buildStatusFilterValues; track status) {
                        <li class="flex items-center gap-2">
                            <p-radioButton
                                inputId="buildStatusFilter-{{ status }}"
                                name="buildStatusFilter"
                                [value]="status"
                                [ngModel]="this.finishedBuildJobFilter.status"
                                (onClick)="this.toggleBuildStatusFilter(status)"
                            />
                            <label for="buildStatusFilter-{{ status }}">
                                <span jhiTranslate="artemisApp.buildQueue.filter.buildStatus.{{ status }}"></span>
                            </label>
                        </li>
                    }
                    <li class="flex items-center gap-2">
                        <p-radioButton
                            inputId="buildStatusFilter-none"
                            name="buildStatusFilter"
                            [value]="undefined"
                            [ngModel]="this.finishedBuildJobFilter.status"
                            (onClick)="this.toggleBuildStatusFilter()"
                        />
                        <label for="buildStatusFilter-none">
                            <span jhiTranslate="artemisApp.buildQueue.filter.none"></span>
                        </label>
                    </li>
                </ul>
            </div>

            @if (buildAgentFilterable()) {
                <div class="finished-build-jobs-filter-border-bottom flex flex-row pb-1">
                    <h5 class="my-0">
                        <span jhiTranslate="artemisApp.buildQueue.filter.buildAgentAddress"></span>
                    </h5>
                </div>
                <div class="finished-build-jobs-filter-background-accent px-3 my-0 py-2">
                    <p-autoComplete
                        styleClass="w-full"
                        [placeholder]="'artemisApp.buildQueue.filter.buildAgentAddress' | artemisTranslate"
                        [(ngModel)]="finishedBuildJobFilter.buildAgentAddress"
                        [suggestions]="buildAgentAddressSuggestions()"
                        (completeMethod)="searchBuildAgentAddresses($event)"
                        (onSelect)="filterBuildAgentAddressChanged()"
                        (onClear)="filterBuildAgentAddressChanged()"
                        (onBlur)="filterBuildAgentAddressChanged()"
                    />
                </div>
            }
            <div class="finished-build-jobs-filter-border-bottom flex flex-row pb-1">
                <h5 class="my-0">
                    <span jhiTranslate="artemisApp.buildQueue.filter.buildSubmissionDate.title"></span>
                </h5>
            </div>
            <div class="finished-build-jobs-filter-background-accent px-3 my-0 py-2">
                <div class="flex items-center gap-2">
                    <span class="form-item-prepend" jhiTranslate="artemisApp.buildQueue.filter.buildSubmissionDate.from"></span>
                    <jhi-date-time-picker
                        id="field_startDate"
                        [shouldDisplayTimeZoneWarning]="false"
                        [labelName]="''"
                        [(ngModel)]="finishedBuildJobFilter.buildSubmissionDateFilterFrom"
                        [error]="!finishedBuildJobFilter.areDatesValid"
                        (valueChange)="filterDateChanged()"
                    />
                </div>
                <div class="flex items-center gap-2">
                    <span class="form-item-prepend" jhiTranslate="artemisApp.buildQueue.filter.buildSubmissionDate.to"></span>
                    <jhi-date-time-picker
                        id="field_endDate"
                        [shouldDisplayTimeZoneWarning]="false"
                        [labelName]="''"
                        [(ngModel)]="finishedBuildJobFilter.buildSubmissionDateFilterTo"
                        [error]="!finishedBuildJobFilter.areDatesValid"
                        (valueChange)="filterDateChanged()"
                    />
                    @if (!finishedBuildJobFilter.areDatesValid) {
                        <span class="text-danger" jhiTranslate="artemisApp.buildQueue.filter.buildSubmissionDate.invalidDate"></span>
                    }
                </div>
            </div>

            <div class="finished-build-jobs-filter-border-bottom flex flex-row pb-1">
                <h5 class="my-0">
                    <span jhiTranslate="artemisApp.buildQueue.filter.buildDuration.title"></span>
                </h5>
            </div>
            <div class="finished-build-jobs-filter-background-accent px-3 my-0 py-2">
                <div class="flex flex-wrap items-center gap-2">
                    <span jhiTranslate="artemisApp.buildQueue.filter.buildDuration.lowerBound"></span>
                    <input pInputText type="number" [(ngModel)]="finishedBuildJobFilter.buildDurationFilterLowerBound" (change)="filterDurationChanged()" />
                    <span jhiTranslate="artemisApp.buildQueue.filter.buildDuration.upperBound"></span>
                    <input pInputText type="number" [(ngModel)]="finishedBuildJobFilter.buildDurationFilterUpperBound" (change)="filterDurationChanged()" />
                    @if (!finishedBuildJobFilter.areDurationFiltersValid) {
                        <span class="text-danger" jhiTranslate="artemisApp.buildQueue.filter.buildDuration.invalidState"></span>
                    }
                </div>
            </div>
        </div>
    </div>
    <div class="flex justify-end gap-2 mt-3">
        <p-button severity="secondary" size="small" (onClick)="cancel()" [label]="'artemisApp.buildQueue.filter.close' | artemisTranslate" />
        <p-button size="small" (onClick)="confirm()" [label]="'artemisApp.buildQueue.filter.apply' | artemisTranslate" />
    </div>
</div>
