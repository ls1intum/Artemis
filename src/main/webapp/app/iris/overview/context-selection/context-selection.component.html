<div class="iris-context-selection flex items-center gap-2">
    <span [pTooltip]="'artemisApp.iris.contextSelection.addContextTooltip' | artemisTranslate" tooltipPosition="bottom" tooltipStyleClass="iris-context-tooltip">
        <p-select
            [attr.aria-label]="'artemisApp.iris.contextSelection.label' | artemisTranslate"
            [disabled]="disabled()"
            [pt]="{ header: { style: 'padding-left: 12px; padding-right: 12px;' } }"
            [options]="allGroups()"
            [group]="true"
            optionGroupLabel="label"
            optionGroupChildren="items"
            optionLabel="label"
            optionValue="value"
            [ngModel]="selectedValue()"
            (onChange)="onSelectionChange($event.value)"
            [filter]="true"
            filterBy="label"
            [filterPlaceholder]="'artemisApp.iris.contextSelection.search' | artemisTranslate"
            [resetFilterOnHide]="true"
            scrollHeight="40vh"
            [panelStyle]="{ 'min-width': '250px' }"
            variant="outlined"
            size="small"
            class="iris-context-trigger"
        >
            <ng-template #dropdownicon>
                <fa-icon [icon]="faPlus" />
            </ng-template>
            <ng-template #item let-option>
                <div class="flex items-center gap-2">
                    <fa-icon [icon]="option.faIcon" />
                    <span>{{ option.label }}</span>
                </div>
            </ng-template>
            <ng-template #group let-group>
                <span [jhiTranslate]="group.label"></span>
            </ng-template>
        </p-select>
    </span>

    @if (activeChip(); as chip) {
        <p-chip [removable]="true" (onRemove)="onChipRemove()" styleClass="iris-context-chip">
            <fa-icon [icon]="chip.faIcon" />
            <span class="ms-1">{{ chip.label }}</span>
            <ng-template #removeicon>
                <fa-icon [icon]="faXmark" />
            </ng-template>
        </p-chip>
    }
</div>
