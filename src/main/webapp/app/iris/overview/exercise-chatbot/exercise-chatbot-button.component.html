@if (!chatOpen()) {
    <div
        #chatBubble
        class="message-bubble"
        (click)="handleButtonClick()"
        [ngClass]="{ 'content-overflow': isOverflowing(), 'bubble-visible': newIrisMessage(), 'bubble-hidden': !newIrisMessage() }"
    >
        @if (newIrisMessage()) {
            <div class="bubble-text" [innerHTML]="newIrisMessage() | htmlForMarkdown: [] : undefined : undefined : true"></div>
            @if (isOverflowing()) {
                <div class="read-more">
                    <fa-icon [icon]="faArrowRight" class="read-more-icon" />
                </div>
            }
        }
    </div>
    @if (isProcessing() && !newIrisMessage()) {
        <div class="status-indicator" role="status">
            <span class="sr-only" jhiTranslate="artemisApp.exerciseChatbot.statusIndicator.thinking"></span>
            <div class="typing-dots" aria-hidden="true">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    }
    <div class="chatbot-button">
        <jhi-iris-logo [size]="IrisLogoSize.MEDIUM" [look]="IrisLogoLookDirection.LEFT" (click)="handleButtonClick()" />
        @if (hasNewMessages()) {
            <fa-icon [icon]="faCircle" size="xl" class="unread-indicator" />
        }
    </div>
}
