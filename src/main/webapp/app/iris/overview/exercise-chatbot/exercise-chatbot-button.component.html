@if (!chatOpen()) {
    @if (newIrisMessage()) {
        <button type="button" class="message-bubble" (click)="handleButtonClick()">
            <span class="preview-text">{{ newIrisMessage() }}</span>
        </button>
    }
    @if (isProcessing() && !newIrisMessage()) {
        <button type="button" class="status-indicator" (click)="handleButtonClick()">
            <span class="visually-hidden" role="status" aria-live="polite">{{ displayName() }}</span>
            <span class="status-label" aria-hidden="true" [class.anim-a]="animToggle()" [class.anim-b]="!animToggle()">{{ displayName() }}</span>
            <div class="typing-dots" aria-hidden="true">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </button>
    }
    <div class="chatbot-button">
        <jhi-iris-logo [size]="IrisLogoSize.MEDIUM" [look]="IrisLogoLookDirection.LEFT" (click)="handleButtonClick()" />
        @if (hasNewMessages()) {
            <fa-icon [icon]="faCircle" size="xl" class="unread-indicator" />
        }
    </div>
}
