@if (!chatOpen()) {
    @if (newIrisMessage()) {
        <div class="message-bubble" (click)="handleButtonClick()">
            <div [innerHTML]="newIrisMessage() | htmlForMarkdown: [] : undefined : undefined : true"></div>
        </div>
    }
    @if (isProcessing() && !newIrisMessage()) {
        <div class="status-indicator">
            <span class="visually-hidden" role="status" aria-live="polite" jhiTranslate="artemisApp.exerciseChatbot.statusIndicator.processing"></span>
            <span
                class="status-label"
                aria-hidden="true"
                [class.slide-out]="statusLabelAnimState() === 'slide-out'"
                [class.slide-in]="statusLabelAnimState() === 'slide-in'"
                [jhiTranslate]="statusLabelKey()"
            ></span>
            <div class="typing-dots" aria-hidden="true">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    }
    <div class="chatbot-button">
        <jhi-iris-logo [size]="IrisLogoSize.MEDIUM" [look]="IrisLogoLookDirection.LEFT" (click)="handleButtonClick()" />
        @if (hasNewMessages()) {
            <fa-icon [icon]="faCircle" size="xl" class="unread-indicator" />
        }
    </div>
}
