<div class="chat-status-bar" [class.open]="open()">
    @if (isError()) {
        <div class="display error">
            <fa-icon [icon]="faCircleXmark" />
            <div>{{ errorMessage() }}</div>
        </div>
    } @else {
        <div class="thinking-state">
            <span class="visually-hidden" role="status" aria-live="polite" jhiTranslate="artemisApp.iris.chatStatus.processing"></span>

            <jhi-iris-logo [size]="20" [spinning]="true" aria-hidden="true" />

            <span class="status-text" aria-hidden="true" [class.anim-a]="animToggle()" [class.anim-b]="!animToggle()" [jhiTranslate]="currentKey()"></span>

            <div class="typing-dots" aria-hidden="true">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    }
</div>
