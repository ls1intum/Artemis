<div
    class="chat-history-item"
    [ngClass]="{ 'chat-history-item-selected': active() }"
    (click)="onItemClick()"
    role="button"
    tabindex="0"
    (keydown.space)="onItemClick()"
    (keydown.enter)="onItemClick()"
>
    <div class="chat-history-text">
        @if (isNewChat()) {
            <fa-icon [icon]="faPlus" class="new-chat-icon" />
        }
        <span class="chat-history-label">{{ session().title ? session().title : (session().creationDate | date: 'dd.MM.yy HH:mm') }}</span>
        @if (!isNewChat()) {
            <button type="button" class="menu-trigger" (click)="onMenuToggle($event)" [attr.aria-label]="'artemisApp.iris.chatHistory.sessionMenuAriaLabel' | artemisTranslate">
                <fa-icon [icon]="faEllipsisVertical" />
            </button>
        }
    </div>
    @if (icon() && entityRoute()) {
        <a
            class="related-entity-icon"
            [routerLink]="entityRoute()!"
            queryParamsHandling="preserve"
            [pTooltip]="tooltipText()!"
            tooltipPosition="right"
            tooltipStyleClass="chat-history-entity-tooltip"
            [attr.aria-label]="ariaLabelText()!"
            (click)="onEntityIconClick($event)"
        >
            <fa-icon [icon]="icon()!" />
        </a>
    }
    <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body" styleClass="chat-history-item-menu">
        <ng-template #item let-item>
            <button type="button" class="p-menu-item-link danger" role="menuitem">
                <fa-icon [icon]="faTrash" />
                <span class="p-menu-item-label" style="margin-left: 0.5rem">{{ item.label }}</span>
            </button>
        </ng-template>
    </p-menu>
</div>
