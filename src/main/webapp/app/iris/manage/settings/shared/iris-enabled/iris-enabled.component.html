<div class="iris-controls">
    <div class="iris-toggle-group" role="group" aria-label="Enable/Disable Iris">
        <button
            type="button"
            class="iris-toggle-btn"
            [class.iris-toggle-btn--active-on]="isEnabled()"
            (click)="setEnabled(true)"
            jhiTranslate="artemisApp.iris.settings.enabled"
        ></button>
        <button
            type="button"
            class="iris-toggle-btn"
            [class.iris-toggle-btn--active-off]="isDisabled()"
            (click)="setEnabled(false)"
            jhiTranslate="artemisApp.iris.settings.disabled"
        ></button>
    </div>
    <a class="iris-configure-link" [routerLink]="getSettingsRoute()">
        <span jhiTranslate="artemisApp.iris.settings.configure"></span>
        <fa-icon [icon]="faArrowRight" />
    </a>
</div>
