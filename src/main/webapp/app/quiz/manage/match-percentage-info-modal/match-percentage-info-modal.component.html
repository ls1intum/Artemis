<p-dialog
    [(visible)]="isVisible"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [dismissableMask]="true"
    [closeOnEscape]="true"
    [closable]="true"
    appendTo="body"
    [style]="{ width: '50rem' }"
    [header]="'artemisApp.quizExercise.matchingInfoModalTitle' | artemisTranslate"
>
    <table class="table">
        <tr>
            <th jhiTranslate="artemisApp.quizExercise.matchLetterCase.title"></th>
            <td jhiTranslate="artemisApp.quizExercise.matchLetterCase.explanation"></td>
        </tr>

        <tr>
            <th jhiTranslate="artemisApp.quizExercise.matchPercentage.explanationTitle"></th>
            <td jhiTranslate="artemisApp.quizExercise.matchPercentage.explanation"></td>
        </tr>
    </table>
    <ng-template pTemplate="footer">
        <button type="button" class="btn btn-outline" (click)="isVisible.set(false)" jhiTranslate="entity.action.close"></button>
    </ng-template>
</p-dialog>
<div>
    <button class="btn" (click)="open()"><fa-icon [icon]="farQuestionCircle" /></button>
</div>
