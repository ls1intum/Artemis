<article class="quiz-ai-generation-question-card">
    <div class="question-card-header">
        <strong>{{ questionIndex() + 1 }}. <span [jhiTranslate]="question().questionKey"></span></strong>
        <span class="type-badge" [jhiTranslate]="getQuestionTypeLabelKey(question().type)"></span>
    </div>
    <div class="option-list">
        @for (option of question().options; track option.key) {
            <div class="option-item" [ngClass]="{ correct: option.correct }">
                <span [jhiTranslate]="option.key"></span>
                @if (option.correct) {
                    <span class="correct-label" jhiTranslate="artemisApp.quizExercise.aiGeneration.preview.correct"></span>
                }
            </div>
        }
    </div>
</article>
