@if (hyperionEnabled && (isOpen() || externalReasoning() !== undefined) && !isRefinementPanelCollapsed()) {
    <div class="quiz-ai-refinement-panel">
        @if (refinementExplanation() !== undefined || externalReasoning() !== undefined) {
            <div class="refinement-explanation-card">
                <div class="refinement-explanation-card-header">
                    <fa-icon [icon]="faWandMagicSparkles" class="refinement-explanation-icon" />
                    <span class="refinement-explanation-label" jhiTranslate="artemisApp.quizExercise.aiGeneration.refinement.changesLabel"></span>
                    <button
                        type="button"
                        class="refinement-explanation-dismiss"
                        (click)="dismissReasoning()"
                        [attr.aria-label]="'artemisApp.quizExercise.aiGeneration.refinement.dismissChanges' | artemisTranslate"
                    >
                        <fa-icon [icon]="faCloseMark" />
                    </button>
                </div>
                <p class="refinement-explanation-text">{{ refinementExplanation() ?? externalReasoning() }}</p>
            </div>
        }
        @if (isOpen()) {
            <div class="refinement-input-row">
                <textarea
                    pTextarea
                    class="refinement-textarea"
                    [placeholder]="promptPlaceholder()"
                    maxlength="2000"
                    [ngModel]="refinePrompt()"
                    (ngModelChange)="refinePrompt.set($any($event))"
                    [disabled]="isRefining()"
                    (keydown.enter)="onEnterKey($event)"
                ></textarea>
                <button pButton type="button" class="refinement-submit-button" [disabled]="!refinePrompt().trim() || isRefining()" (click)="submitRefinement()">
                    @if (isRefining()) {
                        <fa-icon [icon]="faCircleNotch" animation="spin" />
                    } @else {
                        <fa-icon [icon]="faPaperPlane" />
                    }
                </button>
            </div>
        }
    </div>
}
