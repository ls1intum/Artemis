@if (!linkPreview() && !loaded() && showLoadingsProgress()) {
    @if (!hasError()) {
        <div class="loading-container">
            <!-- Loading template -->
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>
    }
} @else {
    @if (linkPreview(); as lp) {
        @if (lp.shouldPreviewBeShown) {
            <div class="preview-container">
                <!-- Link preview template -->
                <div class="preview-card">
                    @if (isAuthorOfOriginalPost) {
                        <jhi-confirm-icon
                            class="close-button"
                            iconSize="sm"
                            (confirmEvent)="removeLinkPreview(lp)"
                            [ngClass]="'faTimes clickable icon'"
                            [initialIcon]="faTimes"
                            [initialTooltip]="'artemisApp.metis.removeLinkPreview' | artemisTranslate"
                            [confirmTooltip]="'artemisApp.metis.confirmRemoveLinkPreview' | artemisTranslate"
                        />
                    }
                    <div class="left-border">
                        <div class="preview-content">
                            <h2 class="preview-title">{{ lp.title }}</h2>
                            <p class="preview-description">{{ lp.description }}</p>
                        </div>
                        @if (lp.image && !multiple()) {
                            <div class="preview-image">
                                <img [src]="lp.image" alt="Preview Image" />
                            </div>
                        }
                    </div>
                </div>
            </div>
        }
    }
}
