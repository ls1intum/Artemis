<div class="d-flex gap-3">
    <!-- Block palette -->
    <div style="width: 140px; flex-shrink: 0">
        <small class="text-muted fw-semibold d-block mb-2" jhiTranslate="artemisApp.mathExercise.builder.palette">Blocks</small>
        @for (block of blocks(); track block.type) {
            <div
                class="mb-1 py-1 px-2 border rounded small"
                [class.border-primary]="selectedBlockType() === block.type"
                [class.bg-primary]="selectedBlockType() === block.type"
                [class.text-white]="selectedBlockType() === block.type"
                style="cursor: grab; user-select: none"
                draggable="true"
                (click)="selectedBlockType.set(block.type)"
                (dragstart)="onBlockDragStart($event, block.type)"
                (dragend)="onBlockDragEnd()"
            >
                {{ block.label }}
            </div>
        }
    </div>

    <!-- Canvas -->
    <div class="flex-grow-1">
        <div class="mb-1 fw-semibold small">{{ label() }}</div>

        <!-- Expression canvas -->
        <jhi-math-expression-canvas
            [rootNodes]="rootNodes()"
            [draggingPayload]="draggingBlockType()"
            [nodeCtx]="nodeCtx()"
            [blocks]="blocks()"
            (gapDrop)="handleGapDrop($event)"
        />

        <!-- LaTeX preview -->
        @if (rootNodes().length > 0) {
            <div class="mt-2 px-2 py-1 border rounded bg-light text-center small">
                <span [innerHTML]="rootNodes()[0] | mathNodeLatex"></span>
            </div>
        }

        <!-- Keyboard fallback controls -->
        <div class="mt-2 d-flex gap-2 align-items-end flex-wrap">
            @if (isTerminal) {
                <div>
                    <label class="form-label small mb-0" jhiTranslate="artemisApp.mathExercise.builder.value">Value</label>
                    <input pInputText pSize="small" style="width: 80px" [value]="terminalValue()" (input)="terminalValue.set($any($event.target).value)" />
                </div>
            }
            <p-button size="small" [label]="'artemisApp.mathExercise.builder.insert' | artemisTranslate" (onClick)="insertAtSelected()" />
            <p-button
                class="ms-auto"
                size="small"
                severity="danger"
                [outlined]="true"
                [label]="'artemisApp.mathExercise.builder.clear' | artemisTranslate"
                (onClick)="clearExpression()"
            />
        </div>

        @if (errorMessage()) {
            <p-message severity="error" [text]="errorMessage()!" styleClass="mt-1" />
        }
    </div>
</div>
