<div>
    @let courseIdToPass = courseId();
    @if (courseIdToPass) {
        <jhi-tutorial-edit [courseId]="courseIdToPass" [tutorialGroup]="tutorialGroup()" [tutors]="tutors()" [schedule]="schedule()" (onUpdate)="updateTutorialGroup($event)" />
    }
    @if (isLoading()) {
        <jhi-loading-indicator-overlay />
    }
</div>
