<div>
    @let tutorialGroupToPass = tutorialGroup();
    @let courseIdToPass = courseId();
    @let isMessagingEnabledToPass = isMessagingEnabled();
    @if (courseIdToPass && tutorialGroupToPass && isMessagingEnabledToPass !== undefined) {
        <div class="p-3 scrollable-content">
            <jhi-tutorial-group-detail
                [tutorialGroup]="tutorialGroupToPass"
                [courseId]="courseIdToPass"
                [isMessagingEnabled]="isMessagingEnabledToPass"
                [loggedInUserAccessLevel]="TutorialGroupDetailManagementAccessLevel.STUDENT"
            />
        </div>
    }
    @if (isLoading()) {
        <jhi-loading-indicator-overlay />
    }
</div>
