<label class="mb-1" for="typeahead-search" jhiTranslate="artemisApp.dataExport.loginOrName"></label>
<p-autoComplete
    inputId="typeahead-search"
    name="search-filter"
    styleClass="w-full"
    [ngModel]="loginOrName()"
    (ngModelChange)="loginOrName.set($event)"
    [suggestions]="suggestions()"
    (completeMethod)="onComplete($event)"
    (onSelect)="onSelectUser($event)"
    optionLabel="login"
    [minLength]="MIN_SEARCH_QUERY_LENGTH"
    [placeholder]="'artemisApp.dataExport.loginOrName' | artemisTranslate"
    (input)="onChange()"
    (onClear)="onChange()"
    (onFocus)="onChange()"
    (onBlur)="onChange()"
    autocomplete="nope"
    role="searchbox"
    aria-autocomplete="list"
    data-1p-ignore="true"
    data-lpignore="true"
    data-form-type="other"
>
    <ng-template let-user #item>
        {{ resultFormatter(user) }}
    </ng-template>
</p-autoComplete>

@if (searching()) {
    <small class="mt-1 block text-muted-color"><fa-icon size="lg" [icon]="faCircleNotch" animation="spin" /></small>
} @else if (searchQueryTooShort()) {
    <small class="mt-1 block text-muted-color">{{ 'artemisApp.dataExport.searchQueryTooShort' | artemisTranslate: { length: MIN_SEARCH_QUERY_LENGTH } }}</small>
} @else if (searchFailed()) {
    <small class="mt-1 block text-state-danger" jhiTranslate="artemisApp.dataTable.search.failed"></small>
} @else if (searchNoResults()) {
    <small class="mt-1 block text-state-warning" jhiTranslate="artemisApp.dataTable.search.noResults"></small>
}
