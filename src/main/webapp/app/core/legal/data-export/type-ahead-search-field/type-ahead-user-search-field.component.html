<label class="mb-1" for="typeahead-search" jhiTranslate="artemisApp.dataExport.loginOrName"></label>
<div class="search-container">
    <p-autoComplete
        inputId="typeahead-search"
        name="search-filter"
        styleClass="w-full"
        [ngModel]="loginOrName()"
        (ngModelChange)="loginOrName.set($event)"
        [suggestions]="suggestions()"
        (completeMethod)="onComplete($event)"
        (onSelect)="onSelectUser($event)"
        optionLabel="login"
        [placeholder]="'artemisApp.dataExport.loginOrName' | artemisTranslate"
        (input)="onChange()"
        (onClear)="onChange()"
        (onFocus)="onChange()"
        (onBlur)="onChange()"
        autocomplete="nope"
        role="searchbox"
        aria-autocomplete="list"
        data-1p-ignore="true"
        data-lpignore="true"
        data-form-type="other"
    >
        <ng-template let-user #item>
            {{ resultFormatter(user) }}
        </ng-template>
    </p-autoComplete>

    <div class="search-info" [class.active]="searching()">
        <fa-icon size="lg" [icon]="faCircleNotch" animation="spin" />
    </div>
    <div class="search-info" [class.active]="searchFailed()">
        <p-tag severity="danger" [value]="'artemisApp.dataTable.search.failed' | artemisTranslate" />
    </div>
    <div class="search-info" [class.active]="searchNoResults()">
        <p-tag severity="warn" [value]="'artemisApp.dataTable.search.noResults' | artemisTranslate" />
    </div>
    <div class="search-info" [class.active]="searchQueryTooShort()">
        <p-tag severity="info" [value]="'artemisApp.dataExport.searchQueryTooShort' | artemisTranslate: { length: MIN_SEARCH_QUERY_LENGTH }" />
    </div>
</div>
