@if (exercise(); as ex) {
    <div class="d-flex flex-column" style="height: 100vh">
        <div class="px-3 py-2 border-bottom d-flex align-items-center gap-2 flex-shrink-0">
            <a href="javascript:void(0)" class="btn btn-sm btn-outline-secondary" (click)="onClose()"> <fa-icon [icon]="faArrowLeft" class="me-1" />Back </a>
            <h5 class="mb-0 fw-semibold">Create AI Variant — {{ ex.title }}</h5>
        </div>
        <jhi-exercise-variant-ai-editor
            class="flex-fill overflow-hidden"
            [visible]="true"
            [sourceExercise]="ex"
            [displayMode]="'page'"
            [courseId]="courseId()"
            (visibleChange)="onClose()"
            (variantAdded)="onVariantAdded($event)"
        />
    </div>
} @else {
    <div class="container-fluid px-3 pt-3">
        <div class="alert alert-warning">Exercise not found.</div>
        <a href="javascript:void(0)" class="btn btn-sm btn-outline-secondary" (click)="onClose()"> <fa-icon [icon]="faArrowLeft" class="me-1" />Back </a>
    </div>
}
