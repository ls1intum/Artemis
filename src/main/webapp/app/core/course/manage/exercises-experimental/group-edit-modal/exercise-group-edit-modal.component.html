<div class="d-flex flex-column gap-4">
    <!-- Name + Points -->
    <div class="d-flex flex-wrap gap-3">
        <div class="flex-grow-1">
            <label class="fw-semibold d-block mb-1" for="group-edit-title" jhiTranslate="artemisApp.exerciseManagement.groupEdit.name"></label>
            <input
                id="group-edit-title"
                pInputText
                class="w-100"
                [ngModel]="draftTitle()"
                (ngModelChange)="draftTitle.set($event)"
                [placeholder]="'artemisApp.exerciseManagement.groupEdit.namePlaceholder' | artemisTranslate"
                [class.ng-invalid]="!isTitleValid()"
            />
        </div>
        <div>
            <div class="d-flex align-items-center gap-1 fw-semibold mb-1">
                <span jhiTranslate="artemisApp.exerciseManagement.groupEdit.maxPoints"></span>
                <fa-icon
                    [icon]="faCircleInfo"
                    [pTooltip]="'artemisApp.exerciseManagement.groupEdit.maxPointsTooltip' | artemisTranslate"
                    tooltipPosition="top"
                    class="text-muted"
                />
            </div>
            <p-inputnumber
                [ngModel]="draftMaxPoints() ?? null"
                (ngModelChange)="draftMaxPoints.set($event ?? undefined)"
                [min]="0"
                [placeholder]="'artemisApp.exerciseManagement.groupEdit.maxPointsPlaceholder' | artemisTranslate"
                styleClass="group-pts-input"
            />
        </div>
    </div>

    <!-- Dates -->
    <div>
        <div class="fw-semibold mb-2" jhiTranslate="artemisApp.exerciseManagement.groupEdit.dates"></div>
        <div class="alert alert-warning py-1 px-2 small d-flex align-items-center gap-2 mb-2">
            <i class="pi pi-exclamation-triangle"></i>
            <span jhiTranslate="artemisApp.exerciseManagement.groupEdit.datesOverrideWarning"></span>
        </div>
        <jhi-exercise-timeline [timelineItems]="timelineItems()" (timelineStatusChange)="timelineStatus.set($event)" />
        @if (!timelineStatus().valid) {
            <div class="alert alert-danger py-1 px-2 small d-flex align-items-center gap-2 mt-2">
                <i class="pi pi-times-circle"></i>
                <span jhiTranslate="artemisApp.exerciseManagement.groupEdit.datesInvalidOrder"></span>
            </div>
        }
    </div>
</div>

<div class="d-flex justify-content-end gap-2 mt-4">
    <p-button severity="secondary" [text]="true" [label]="'entity.action.cancel' | artemisTranslate" (onClick)="onCancel()" />
    <p-button [label]="'entity.action.save' | artemisTranslate" [disabled]="isSaveDisabled()" (onClick)="onSave()" />
</div>
