<div class="position-relative">
    <p-button class="dev-settings-button" severity="secondary" [rounded]="true" [text]="true" (onClick)="settingsVisible.set(true)" title="Dev Settings">
        <fa-icon [icon]="faGear" />
    </p-button>

    <div class="d-flex horizontal-scroll">
        <div [ngClass]="{ 'sidebar-collapsed': isCollapsed }">
            <jhi-sidebar
                [itemSelected]="exerciseSelected()"
                [courseId]="courseId()"
                [sidebarData]="sidebarData()"
                [collapseState]="DEFAULT_COLLAPSE_STATE"
                [sidebarItemAlwaysShow]="DEFAULT_SHOW_ALWAYS"
                [showFilter]="true"
            />
        </div>

        @if (exerciseSelected()) {
            <div [ngClass]="{ 'content-sidebar-width': !isCollapsed }" class="content-width scrollable-content">
                <router-outlet (deactivate)="onSubRouteDeactivate()" />
            </div>
        } @else {
            <div class="vw-100 module-bg rounded-3 p-3 d-flex justify-content-between">
                <div class="col-12 text-center my-auto" jhiTranslate="artemisApp.courseOverview.exerciseDetails.selectExercise"></div>
            </div>
        }
    </div>
</div>

<jhi-student-exercise-dev-settings-modal [visible]="settingsVisible()" (visibleChange)="settingsVisible.set($event)" />
