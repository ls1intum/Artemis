<p-dialog header="Student Exercises Dev Settings" [visible]="visible()" (visibleChange)="visibleChange.emit($event)" [modal]="true" appendTo="body" [style]="{ width: '420px' }">
    <div class="d-flex flex-column gap-3">
        <div>
            <label class="fw-semibold d-block mb-2">Group in sidebar</label>
            <p-selectbutton
                [options]="groupSidebarOptions"
                [ngModel]="devSettings.groupSidebarStyle()"
                (ngModelChange)="devSettings.setGroupSidebarStyle($event)"
                optionValue="value"
                [allowEmpty]="false"
            />
        </div>
        @if (devSettings.groupSidebarStyle() !== 'select') {
            <div>
                <label class="fw-semibold d-block mb-2">On group click</label>
                <p-selectbutton
                    [options]="groupClickOptions"
                    [ngModel]="devSettings.groupClickAction()"
                    (ngModelChange)="devSettings.setGroupClickAction($event)"
                    optionValue="value"
                    [allowEmpty]="false"
                />
            </div>
            <div>
                <label class="fw-semibold d-block mb-2">Problem statement preview</label>
                <p-selectbutton
                    [options]="tileStyleOptions"
                    [ngModel]="devSettings.multiselectTileStyle()"
                    (ngModelChange)="devSettings.setMultiselectTileStyle($event)"
                    optionValue="value"
                    [allowEmpty]="false"
                />
            </div>
            <div>
                <label class="fw-semibold d-block mb-2">Tile layout</label>
                <p-selectbutton
                    [options]="tileLayoutOptions"
                    [ngModel]="devSettings.multiselectTileLayout()"
                    (ngModelChange)="devSettings.setMultiselectTileLayout($event)"
                    optionValue="value"
                    [allowEmpty]="false"
                />
            </div>
        }
    </div>
</p-dialog>
