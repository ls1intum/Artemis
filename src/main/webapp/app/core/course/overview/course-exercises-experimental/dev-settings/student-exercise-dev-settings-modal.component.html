<p-dialog header="Student Exercises Dev Settings" [visible]="visible()" (visibleChange)="visibleChange.emit($event)" [modal]="true" [style]="{ width: '420px' }">
    <div class="d-flex flex-column gap-3">
        <div>
            <label class="fw-semibold d-block mb-2">View Version</label>
            <p-selectbutton
                [options]="versionOptions"
                [ngModel]="devSettings.viewVersion()"
                (ngModelChange)="devSettings.setViewVersion($event)"
                optionValue="value"
                [allowEmpty]="false"
            />
        </div>
        @if (devSettings.viewVersion() === 'grouped') {
            <div>
                <label class="fw-semibold d-block mb-2">Group in sidebar</label>
                <p-selectbutton
                    [options]="groupSidebarOptions"
                    [ngModel]="devSettings.groupSidebarStyle()"
                    (ngModelChange)="devSettings.setGroupSidebarStyle($event)"
                    optionValue="value"
                    [allowEmpty]="false"
                />
            </div>
            @if (devSettings.groupSidebarStyle() !== 'select') {
                <div>
                    <label class="fw-semibold d-block mb-2">On group click</label>
                    <p-selectbutton
                        [options]="groupClickOptions"
                        [ngModel]="devSettings.groupClickAction()"
                        (ngModelChange)="devSettings.setGroupClickAction($event)"
                        optionValue="value"
                        [allowEmpty]="false"
                    />
                </div>
            }
        }
    </div>
</p-dialog>
