<ng-container>
    @if (isProgrammingExercise()) {
        <button
            jhi-exercise-action-button
            [buttonIcon]="faPlayCircle"
            [jhiFeatureToggle]="FeatureToggle.ProgrammingExercises"
            [buttonLabel]="'artemisApp.exerciseActions.startPractice' | artemisTranslate"
            [buttonLoading]="startingPracticeMode()"
            [smallButton]="smallButtons()"
            [hideLabelMobile]="false"
            [ngbPopover]="popContent"
            [autoClose]="'outside'"
            placement="right auto"
            container="body"
        ></button>
        <ng-template #popContent>
            <div class="start-practice-popover">
                <h5 jhiTranslate="artemisApp.exerciseActions.practiceMode.title"></h5>
                <p jhiTranslate="artemisApp.exerciseActions.practiceMode.explanation"></p>
                @if (gradedStudentParticipation()) {
                    <p jhiTranslate="artemisApp.exerciseActions.practiceMode.repositoryChoice"></p>
                }
                <div class="button-footer">
                    <button
                        jhi-exercise-action-button
                        [buttonIcon]="faPlayCircle"
                        [jhiFeatureToggle]="FeatureToggle.ProgrammingExercises"
                        [buttonLabel]="
                            (gradedStudentParticipation() ? 'artemisApp.exerciseActions.practiceMode.practiceWithTemplate' : 'artemisApp.exerciseActions.practice')
                                | artemisTranslate
                        "
                        [buttonLoading]="startingPracticeMode()"
                        [smallButton]="smallButtons()"
                        [hideLabelMobile]="false"
                        (click)="startPractice(false)"
                    ></button>
                    @if (gradedStudentParticipation()) {
                        <button
                            jhi-exercise-action-button
                            class="ms-2"
                            [buttonIcon]="faPlayCircle"
                            [jhiFeatureToggle]="FeatureToggle.ProgrammingExercises"
                            [buttonLabel]="'artemisApp.exerciseActions.practiceMode.practiceWithGradedParticipation' | artemisTranslate"
                            [buttonLoading]="startingPracticeMode()"
                            [smallButton]="smallButtons()"
                            [hideLabelMobile]="false"
                            (click)="startPractice(true)"
                        ></button>
                    }
                </div>
            </div>
        </ng-template>
    } @else {
        <button
            jhi-exercise-action-button
            [buttonIcon]="faPlayCircle"
            [buttonLabel]="'artemisApp.exerciseActions.startPractice' | artemisTranslate"
            [buttonLoading]="startingPracticeMode()"
            [smallButton]="smallButtons()"
            [hideLabelMobile]="false"
            (click)="startPractice(false)"
        ></button>
    }
</ng-container>
