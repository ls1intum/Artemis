@if (exercise) {
    <div id="course-exercise-details" class="d-flex flex-column h-100 overflow-hidden">
        <jhi-exercise-header
            class="p-2 rounded-3 module-bg mb-2"
            [exercise]="exercise"
            [courseId]="courseId"
            [studentParticipation]="gradedStudentParticipation()"
            [practiceParticipation]="practiceStudentParticipation()"
            [submissionPolicy]="submissionPolicy()"
            [onSubmitExercise]="splitPanel()?.canSubmit() ? submitExercise : undefined"
            [plagiarismCaseInfo]="plagiarismCaseInfo()"
            [participationMode]="participationMode()"
            (participationModeChange)="participationMode.set($event)"
        />

        <jhi-exercise-split-panel
            class="flex-fill overflow-hidden"
            [exercise]="exercise"
            [participationMode]="participationMode()"
            [studentParticipation]="activeParticipation()"
            [irisEnabled]="irisEnabled() && irisChatEnabled()"
            [courseId]="courseId"
            [gradedStudentParticipation]="gradedStudentParticipation()"
            [plagiarismCaseInfo]="plagiarismCaseInfo()"
            [latestRatedResult]="latestRatedResult()"
            [resultWithComplaint]="resultWithComplaint()"
            [allowComplaintsForAutomaticAssessments]="allowComplaintsForAutomaticAssessments()"
            [exampleSolutionInfo]="exampleSolutionInfo()"
            [exampleSolutionCollapsed]="exampleSolutionCollapsed() ?? true"
            [onChangeExampleSolution]="changeExampleSolution"
        />
    </div>
}
