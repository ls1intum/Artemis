<p-dialog
    [attr.aria-label]="'global.search.placeholder' | artemisTranslate"
    [visible]="overlay.isOpen()"
    (visibleChange)="$event ? overlay.open() : overlay.close()"
    (onHide)="overlay.close()"
    (onShow)="focusInput()"
    [modal]="true"
    [closable]="true"
    [showHeader]="false"
    [closeOnEscape]="false"
    [dismissableMask]="true"
    contentStyleClass="p-0 d-flex flex-column h-100 overflow-hidden"
    position="top"
    styleClass="global-search-dialog"
    [style.max-width]="currentView() === SearchView.Iris ? '1100px' : '700px'"
>
    <!-- Search Input Container -->
    <jhi-global-search-input
        [searchQuery]="searchQuery()"
        [activeFilters]="activeFilters()"
        [isLoading]="isLoading()"
        (searchInput)="onSearchInput($event)"
        (searchKeyDown)="onSearchKeyDown($event)"
        (filterRemoved)="removeFilter($event)"
    />
    <!-- Results Area -->
    <div class="results-container" [class.results-container--split]="currentView() === SearchView.Iris">
        @switch (currentView()) {
            @case (SearchView.Navigation) {
                <jhi-global-search-navigation-view
                    [searchQuery]="searchQuery()"
                    [selectedIndex]="selectedIndex()"
                    [results]="results()"
                    [hasSearched]="hasSearched()"
                    [showResults]="showResults()"
                    [isLoading]="isLoading()"
                    [searchError]="searchError()"
                    [activeFilters]="activeFilters()"
                    (viewSelected)="navigateTo($event)"
                    (entityClick)="onEntityClick($event)"
                />
            }
            @case (SearchView.Lecture) {
                <jhi-global-search-lecture-results
                    (back)="navigateTo(SearchView.Navigation)"
                    (viewSelected)="navigateTo($event)"
                    [searchQuery]="searchQuery()"
                    [selectedIndex]="selectedIndex()"
                />
            }
            @case (SearchView.Iris) {
                <div class="iris-split-layout">
                    <div class="iris-split-left overflow-y-auto">
                        @if (irisSourceView() === SearchView.Lecture) {
                            <jhi-global-search-lecture-results
                                (back)="updateIrisSource(SearchView.Navigation)"
                                (viewSelected)="updateIrisSource($event)"
                                [searchQuery]="searchQuery()"
                                [selectedIndex]="activeSplitPanel() === 'left' ? selectedIndex() : -1"
                                [irisOpen]="true"
                            />
                        } @else {
                            <jhi-global-search-navigation-view
                                [searchQuery]="searchQuery()"
                                [selectedIndex]="activeSplitPanel() === 'left' ? selectedIndex() : -1"
                                [results]="results()"
                                [hasSearched]="hasSearched()"
                                [showResults]="showResults()"
                                [isLoading]="isLoading()"
                                [searchError]="searchError()"
                                [activeFilters]="activeFilters()"
                                (viewSelected)="updateIrisSource($event)"
                                (entityClick)="onEntityClick($event)"
                                [irisOpen]="true"
                            />
                        }
                    </div>
                    <div class="iris-split-right overflow-hidden">
                        <jhi-global-search-iris-answer
                            [query]="searchQuery()"
                            [selectedSourceIndex]="activeSplitPanel() === 'right' ? selectedIndex() : -1"
                            [active]="activeSplitPanel() === 'right'"
                            (closeDrawer)="navigateTo(irisSourceView())"
                        />
                    </div>
                </div>
            }
        }
    </div>
    <!-- Keyboard hints footer -->
    <div class="search-footer flex-shrink-0 text-start">
        <div class="keyboard-hints d-flex align-items-center justify-content-between text-secondary w-100 gap-3">
            <span class="d-flex align-items-center gap-1">
                <span class="d-flex align-items-center gap-1">
                    <kbd
                        class="key-hint-small d-inline-flex align-items-center font-monospace text-secondary border"
                        [attr.aria-label]="'global.search.arrowUpAriaLabel' | artemisTranslate"
                    >
                        <fa-icon [icon]="faArrowUp" aria-hidden="true" />
                    </kbd>
                    <kbd
                        class="key-hint-small d-inline-flex align-items-center font-monospace text-secondary border"
                        [attr.aria-label]="'global.search.arrowDownAriaLabel' | artemisTranslate"
                    >
                        <fa-icon [icon]="faArrowDown" aria-hidden="true" />
                    </kbd>
                </span>
                <span class="ms-2">{{ 'global.search.toNavigate' | artemisTranslate }}</span>
            </span>
            <span class="d-flex align-items-center gap-1">
                <kbd class="key-hint-small d-inline-flex align-items-center font-monospace text-secondary border" aria-label="Escape">ESC</kbd>
                <span class="ms-2">{{ 'global.search.toClose' | artemisTranslate }}</span>
            </span>
        </div>
    </div>
</p-dialog>
