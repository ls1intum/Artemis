<!-- Action buttons: Only show when no filter is active -->
@if (!showResults()) {
    <!-- Action button: Ask Iris (index 0) -->
    @if (!irisOpen()) {
        <div #selectableItem>
            <jhi-global-search-action-item
                [title]="'global.search.askIris' | artemisTranslate"
                [description]="'global.search.askIrisDescription' | artemisTranslate"
                [selected]="selectedIndex() === 0"
                accentColor="var(--global-search-iris-accent)"
                secondaryAccentColor="var(--global-search-iris-accent-secondary)"
                (clicked)="viewSelected.emit(SearchView.Iris)"
            >
                <jhi-iris-logo slot="icon" [size]="IrisLogoSize.FLUID" aria-hidden="true" />
            </jhi-global-search-action-item>
        </div>
    }

    <!-- Action button: Search Lecture Content (index 1) -->
    <div #selectableItem>
        <jhi-global-search-action-item
            [title]="'global.search.searchLectureContent' | artemisTranslate"
            [description]="'global.search.searchLectureContentDescription' | artemisTranslate"
            [selected]="selectedIndex() === (irisOpen() ? 0 : 1)"
            accentColor="var(--global-search-lecture-accent)"
            secondaryAccentColor="var(--bs-primary)"
            (clicked)="viewSelected.emit(SearchView.Lecture)"
        >
            <fa-icon slot="icon" [icon]="faFileLines" aria-hidden="true" />
        </jhi-global-search-action-item>
    </div>
}

<!-- Results list when searching or filter is active -->
@if (showResults()) {
    <div class="search-results-list mt-3">
        @for (result of results(); track result.id; let i = $index) {
            <div #selectableItem>
                <jhi-global-search-result-item
                    [result]="result"
                    [icon]="getIconForType(result.type, result.badge)"
                    [isSelected]="selectedIndex() === i"
                    (resultClick)="navigateToResult($event)"
                />
            </div>
        }
    </div>
} @else {
    <!-- Searchable entities list (initial state) -->
    <div class="entity-list mt-3">
        @for (entity of searchableEntities; track entity.id; let i = $index) {
            <div #selectableItem>
                <jhi-global-search-entity-item [entity]="entity" [isSelected]="selectedIndex() === NAV_ACTION_COUNT + i" (entityClick)="onEntityItemClick($event)" />
            </div>
        }
    </div>
}
