<div class="rounded-lg border border-surface">
    <div class="border-b border-surface px-3 py-2">
        <h5 class="mb-0" jhiTranslate="artemisApp.standardizedCompetency.manage.filter"></h5>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-3">
        <div class="flex flex-col gap-1">
            <label for="title-filter" jhiTranslate="artemisApp.standardizedCompetency.model.title"> </label>
            <input id="title-filter" pInputText [ngModel]="competencyTitleFilter()" (ngModelChange)="onTitleChange($event)" />
        </div>
        <div class="flex flex-col gap-1">
            <label for="knowledge-area-filter" jhiTranslate="artemisApp.standardizedCompetency.model.knowledgeArea"></label>
            <p-select
                inputId="knowledge-area-filter"
                [ngModel]="knowledgeAreaFilter()"
                (ngModelChange)="onKnowledgeAreaChange($event)"
                [options]="knowledgeAreasForSelect()"
                optionLabel="title"
                [showClear]="true"
                appendTo="body"
            />
        </div>
    </div>
</div>
