<div class="flex flex-col">
    <div class="mb-2">
        <div class="flex justify-between">
            <h4 jhiTranslate="artemisApp.standardizedCompetency.details.title"></h4>
            <p-button
                severity="secondary"
                size="small"
                [text]="true"
                [rounded]="true"
                icon="pi pi-times"
                (onClick)="close()"
                [ariaLabel]="'entity.action.close' | artemisTranslate"
            />
        </div>
    </div>
    <div class="detail-body flex flex-col">
        <div class="detail-row">
            <h5 jhiTranslate="artemisApp.standardizedCompetency.model.title"></h5>
            <p class="mb-0">{{ competency().title }}</p>
        </div>
        <div class="detail-row">
            <h5 jhiTranslate="artemisApp.standardizedCompetency.model.description"></h5>
            <p class="markdown-preview" [innerHTML]="competency().description ?? '&nbsp;' | htmlForMarkdown"></p>
        </div>
        <div class="detail-row">
            <h5 jhiTranslate="artemisApp.standardizedCompetency.model.taxonomy"></h5>
            <p class="mb-0" jhiTranslate="artemisApp.courseCompetency.taxonomies.{{ competency().taxonomy }}"></p>
        </div>
        <div class="detail-row">
            <h5 jhiTranslate="artemisApp.standardizedCompetency.model.knowledgeArea"></h5>
            <p class="mb-0">{{ knowledgeAreaTitle() }}</p>
        </div>
        <div class="detail-row">
            <h5 jhiTranslate="artemisApp.standardizedCompetency.model.source"></h5>
            <p class="mb-0">{{ sourceString() }}</p>
        </div>
    </div>
</div>
