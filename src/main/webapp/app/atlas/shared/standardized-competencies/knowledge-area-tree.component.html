<p-tree
    class="knowledge-area-tree w-full"
    styleClass="w-full"
    [value]="nodes()"
    (onNodeExpand)="onNodeExpand($event.node)"
    (onNodeCollapse)="onNodeCollapse($event.node)"
    data-testid="knowledge-area-tree"
>
    <ng-template let-node pTemplate="knowledgeArea">
        <div class="flex items-center" data-testid="knowledge-area-node">
            <h5 class="mb-0 me-2">{{ node.data.title }}</h5>
            <ng-container [ngTemplateOutlet]="knowledgeAreaTemplate() ?? null" [ngTemplateOutletContext]="{ knowledgeArea: node.data }" />
        </div>
    </ng-template>
    <ng-template let-node pTemplate="competency">
        <div class="flex items-center" data-testid="competency-node">
            <ng-container
                [ngTemplateOutlet]="competencyTemplate() ?? null"
                [ngTemplateOutletContext]="{ competency: node.data.competency, knowledgeArea: node.data.knowledgeArea }"
            />
        </div>
    </ng-template>
    <ng-template pTemplate="emptyKnowledgeArea">
        <h6 class="mb-0" jhiTranslate="artemisApp.knowledgeArea.empty" data-testid="empty-node"></h6>
    </ng-template>
</p-tree>
