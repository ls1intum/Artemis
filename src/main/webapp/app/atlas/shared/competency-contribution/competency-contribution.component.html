@if (atlasEnabled() && competencies().length) {
    <div class="mt-4 mb-2">
        <h5 [jhiTranslate]="'artemisApp.competency.competencyContribution.title'"></h5>
        <div class="d-flex flex-wrap gap-2">
            @for (competency of competencies(); track competency.competencyId) {
                <div class="competency-contribution-item">
                    <jhi-competency-contribution-card
                        [competencyId]="competency.competencyId"
                        [courseId]="courseId()"
                        [title]="competency.title"
                        [weight]="competency.weight"
                        [mastery]="competency.mastery"
                    />
                </div>
            }
        </div>
    </div>
}
