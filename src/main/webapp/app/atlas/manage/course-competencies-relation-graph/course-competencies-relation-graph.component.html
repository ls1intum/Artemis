<div class="course-competencies-graph-container h-100" xmlns:svg="http://www.w3.org/2000/svg">
    <jhi-dag-graph [nodes]="nodes()" [edges]="edges()">
        <ng-template #defsTemplate>
            <svg:marker id="arrow" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="4" markerHeight="4" orient="auto">
                <svg:path d="M0,-5L10,0L0,5" class="arrow-head" />
            </svg:marker>
        </ng-template>
        <ng-template #nodeTemplate let-node>
            <svg:g (click)="onCourseCompetencySelection.emit(node.node.data.id)">
                <svg:foreignObject class="node" [attr.width]="node.dimension.width" [attr.height]="node.dimension.height">
                    <jhi-course-competency-relation-node [courseCompetencyNode]="node.node" (onSizeSet)="setNodeDimension($event)" />
                </svg:foreignObject>
            </svg:g>
        </ng-template>
        <ng-template #linkTemplate let-link>
            <svg:g class="edge" (click)="selectRelation(link.edge.data.id)">
                <svg:path
                    [attr.id]="link.edge.id"
                    class="line"
                    [attr.d]="link.path"
                    [class.selected]="selectedRelationId() === link.edge.data.id"
                    stroke-width="2"
                    marker-end="url(#arrow)"
                />
                <svg:path [attr.id]="link.edge.id + '-text'" [attr.d]="link.textPath" fill="none" stroke="none" />
                <svg:text class="edge-label" text-anchor="middle">
                    <textPath class="text-path" [attr.href]="'#' + link.edge.id + '-text'" [style.dominant-baseline]="link.dominantBaseline" startOffset="50%">
                        {{ ('artemisApp.courseCompetency.relations.relationTypes.' + link.edge.label | artemisTranslate).toUpperCase() }}
                    </textPath>
                </svg:text>
            </svg:g>
        </ng-template>
    </jhi-dag-graph>
</div>
