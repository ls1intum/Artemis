<p-select [formControl]="form()" [inputId]="selectId()" [options]="taxonomyOptions" optionLabel="value" optionValue="value" [showClear]="true" styleClass="w-full">
    <ng-template let-option #item>
        <span class="whitespace-pre">{{ option.indent }}&boxur; </span>
        <span [jhiTranslate]="'artemisApp.courseCompetency.taxonomies.' + option.value"></span>
        (<span [jhiTranslate]="'artemisApp.courseCompetency.keywords.' + option.value"></span>)
    </ng-template>
    <ng-template let-option #selectedItem>
        <span [jhiTranslate]="'artemisApp.courseCompetency.taxonomies.' + option.value"></span>
    </ng-template>
</p-select>
