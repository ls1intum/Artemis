<div class="review-adapt-exercise-dialog">
    <p class="review-adapt-exercise-dialog__summary">
        <fa-icon [icon]="facArtemisIntelligence" class="review-adapt-exercise-dialog__brand-icon" />
        <span jhiTranslate="artemisApp.review.adaptExercise.summary"></span>
    </p>

    <label class="review-adapt-exercise-dialog__label" jhiTranslate="artemisApp.review.adaptExercise.feedbackLabel"></label>
    <div class="review-adapt-exercise-dialog__finding" readonly>{{ findingText }}</div>

    <label class="review-adapt-exercise-dialog__label" for="adaptExerciseInstructions" jhiTranslate="artemisApp.review.adaptExercise.instructionsLabel"></label>
    <textarea
        pTextarea
        id="adaptExerciseInstructions"
        class="review-adapt-exercise-dialog__instructions"
        rows="3"
        [placeholder]="'artemisApp.review.adaptExercise.instructionsPlaceholder' | artemisTranslate"
        [ngModel]="instructions()"
        (ngModelChange)="instructions.set($event)"
    ></textarea>

    <div class="review-adapt-exercise-dialog__actions">
        <button pButton type="button" severity="secondary" (click)="cancel()">
            {{ 'artemisApp.review.adaptExercise.cancel' | artemisTranslate }}
        </button>
        <button pButton type="button" (click)="confirm()">
            <fa-icon [icon]="facArtemisIntelligence" class="me-1" />
            {{ 'artemisApp.review.adaptExercise.confirm' | artemisTranslate }}
        </button>
    </div>
</div>
