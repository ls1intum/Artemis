<div aria-label="Filter Dropdown" ngbDropdown>
    <button class="btn" ngbDropdownToggle id="filter-dropdown-button" [class]="activeFilter() === allValue() ? 'btn-secondary' : 'btn-success'">
        <fa-icon [icon]="faFilter" />
        <span>
            {{
                activeFilter() === allValue()
                    ? ('artemisApp.exercise.filter' | artemisTranslate)
                    : ('artemisApp.exercise.scoresFilter' | artemisTranslate: { filter: ('artemisApp.exercise.show' + activeFilter() | artemisTranslate) })
            }}
        </span>
    </button>
    <ul ngbDropdownMenu class="checkbox-menu text-nowrap pe-2" aria-labelledby="filter-dropdown-button">
        @for (filter of filters(); track filter) {
            <li>
                <label class="radio-inline ms-2 mb-0 d-flex align-items-center">
                    <input type="radio" [ngModel]="activeFilter()" (click)="filterChange.emit(filter)" [value]="filter" />
                    <span class="ms-1">{{ 'artemisApp.exercise.show' + filter | artemisTranslate }}</span>
                </label>
            </li>
        }
    </ul>
</div>
