<div class="progress position-relative" [pTooltip]="tooltip()">
    <div
        class="progress-bar"
        role="progressbar"
        [ngClass]="backgroundColorClass()"
        [style.width]="normalizedPercentage() + '%'"
        attr.aria-valuenow="{{ normalizedPercentage() }}"
        aria-valuemin="0"
        aria-valuemax="100"
    >
        <span class="justify-content-center d-flex position-absolute w-100" [ngClass]="foregroundColorClass()">
            {{ numerator() }} / {{ denominator() }} ({{ normalizedPercentage() + '%' }})
        </span>
    </div>
</div>
