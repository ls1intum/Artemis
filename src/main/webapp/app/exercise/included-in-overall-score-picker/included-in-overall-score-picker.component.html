<div class="flex flex-wrap gap-2">
    <button
        pButton
        type="button"
        size="small"
        [severity]="includedInOverallScore() === IncludedInOverallScore.INCLUDED_COMPLETELY ? 'primary' : 'secondary'"
        [outlined]="includedInOverallScore() !== IncludedInOverallScore.INCLUDED_COMPLETELY"
        (click)="change(IncludedInOverallScore.INCLUDED_COMPLETELY)"
    >
        <span jhiTranslate="artemisApp.exercise.yes"></span>
    </button>
    <button
        pButton
        type="button"
        size="small"
        [severity]="includedInOverallScore() === IncludedInOverallScore.INCLUDED_AS_BONUS ? 'primary' : 'secondary'"
        [outlined]="includedInOverallScore() !== IncludedInOverallScore.INCLUDED_AS_BONUS"
        (click)="change(IncludedInOverallScore.INCLUDED_AS_BONUS)"
    >
        <span jhiTranslate="artemisApp.exercise.bonus"></span>
    </button>
    @if (allowNotIncluded()) {
        <button
            pButton
            type="button"
            size="small"
            [severity]="includedInOverallScore() === IncludedInOverallScore.NOT_INCLUDED ? 'primary' : 'secondary'"
            [outlined]="includedInOverallScore() !== IncludedInOverallScore.NOT_INCLUDED"
            (click)="change(IncludedInOverallScore.NOT_INCLUDED)"
        >
            <span jhiTranslate="artemisApp.exercise.no"></span>
        </button>
    }
</div>
