<div class="flex flex-wrap gap-2">
    <button
        pButton
        type="button"
        size="small"
        [severity]="!exercise().difficulty ? 'primary' : 'secondary'"
        [outlined]="!!exercise().difficulty"
        (click)="setDifficulty(undefined)"
    >
        <span jhiTranslate="artemisApp.exercise.noLevel"></span>
    </button>
    <button
        pButton
        type="button"
        size="small"
        [severity]="exercise().difficulty === DifficultyLevel.EASY ? 'success' : 'secondary'"
        [outlined]="exercise().difficulty !== DifficultyLevel.EASY"
        (click)="setDifficulty(DifficultyLevel.EASY)"
    >
        <span jhiTranslate="artemisApp.exercise.easy"></span>
    </button>
    <button
        pButton
        type="button"
        size="small"
        [severity]="exercise().difficulty === DifficultyLevel.MEDIUM ? 'warn' : 'secondary'"
        [outlined]="exercise().difficulty !== DifficultyLevel.MEDIUM"
        (click)="setDifficulty(DifficultyLevel.MEDIUM)"
    >
        <span jhiTranslate="artemisApp.exercise.medium"></span>
    </button>
    <button
        pButton
        type="button"
        size="small"
        [severity]="exercise().difficulty === DifficultyLevel.HARD ? 'danger' : 'secondary'"
        [outlined]="exercise().difficulty !== DifficultyLevel.HARD"
        (click)="setDifficulty(DifficultyLevel.HARD)"
    >
        <span jhiTranslate="artemisApp.exercise.hard"></span>
    </button>
</div>
