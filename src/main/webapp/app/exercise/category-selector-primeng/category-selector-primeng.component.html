<p-autoComplete
    class="category-chip-list"
    inputId="field_categories"
    [ngModel]="selectedCategoryLabels()"
    [multiple]="true"
    [unique]="true"
    [suggestions]="categorySuggestions()"
    [completeOnFocus]="true"
    [placeholder]="'artemisApp.exercise.tagPlaceholder' | artemisTranslate"
    (completeMethod)="onComplete($event)"
    (onSelect)="onItemSelect($event)"
    (onUnselect)="onItemUnselect($event)"
    (keydown)="onSeparatorKeydown($event)"
>
    <!-- Colored chip token for each selected category: label + remove icon share one colored pill -->
    <ng-template #selecteditem let-label>
        <div class="custom-tag" [style.backgroundColor]="colorFor(label)">
            <span class="category-name" (click)="openColorSelectorForLabel($event, label)">
                {{ label }}
            </span>
            <fa-icon [icon]="faTimes" class="category-chip-remove" (click)="removeChip(label, $event)" />
        </div>
    </ng-template>
    <!-- PrimeNG's default per-chip remove icon is hidden via CSS (.p-chip-remove-icon); the remove control lives inside .custom-tag above -->
    <ng-template #item let-category>
        <span class="tag-option">{{ category }}</span>
    </ng-template>
</p-autoComplete>
<jhi-color-selector [tagColors]="categoryColors" (selectedColor)="onSelectedColor($event)" />
