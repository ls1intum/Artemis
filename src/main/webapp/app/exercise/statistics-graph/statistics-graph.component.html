<div class="row d-flex justify-content-center">
    <div>
        <h3>{{ chartName() | artemisTranslate }}</h3>
    </div>
    <div class="row">
        <fa-icon [icon]="faArrowLeft" size="2x" class="col-1 d-flex justify-content-end align-items-center px-0" role="button" (click)="switchTimeSpan(LEFT)" />
        <div class="chart col-10 px-0" style="height: 250px">
            <p-chart type="bar" [data]="chartData()" [options]="chartOptions()" [plugins]="dataLabelsPlugin" />
        </div>
        <fa-icon [icon]="faArrowRight" size="2x" class="col-1 d-flex justify-content-start align-items-center px-0" role="button" (click)="switchTimeSpan(RIGHT)" />
    </div>
</div>
<h4 class="col-xl-9 offset-xl-2 text-center mt-3 mb-5">{{ chartTime() }}</h4>
