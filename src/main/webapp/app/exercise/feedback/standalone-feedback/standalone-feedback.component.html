@if (exercise() && exerciseType() && result(); as result) {
    <jhi-result-detail
        [exercise]="exercise()"
        [result]="result"
        [showScoreChart]="true"
        [participation]="participation()"
        [exerciseType]="exerciseType()"
        [latestDueDate]="latestDueDate()"
        [messageKey]="messageKey()"
        [showMissingAutomaticFeedbackInformation]="showMissingAutomaticFeedbackInformation()"
        class="modal-padding"
    />
}
