@if (hasPractice()) {
    <div class="segmented-control">
        <button
            class="segmented-control__button"
            [class.segmented-control__button--active]="mode() === 'practice'"
            [class.segmented-control__button--practice]="mode() === 'practice'"
            (click)="selectMode('practice')"
        >
            <fa-icon [icon]="faBook" />
            <span jhiTranslate="artemisApp.exerciseActions.practice"></span>
        </button>
        <button
            class="segmented-control__button"
            [class.segmented-control__button--active]="mode() === 'graded'"
            [class.segmented-control__button--graded]="mode() === 'graded'"
            (click)="selectMode('graded')"
        >
            <fa-icon [icon]="faGraduationCap" />
            <span>Graded</span>
        </button>
    </div>
}
