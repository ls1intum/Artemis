<div id="exercise-header" class="d-flex flex-column flex-fill">
    <div class="d-flex align-items-center justify-content-between gap-2">
        <div class="d-flex align-items-center gap-3">
            @if (exerciseIcon()) {
                <h5 class="mb-0">
                    <fa-icon [icon]="exerciseIcon()!" />
                    {{ exercise().title }}
                </h5>
            }
            <jhi-participation-mode-toggle [mode]="participationMode()" (modeChange)="participationMode.set($event)" [hasPractice]="hasPractice()" />
        </div>
        <jhi-exercise-header-actions class="w-auto" [courseId]="courseId()" [exercise]="exercise()" [onSubmitExercise]="onSubmitExercise()" />
    </div>

    <hr class="my-2" />

    <jhi-exercise-headers-information
        [exercise]="exercise()"
        [studentParticipation]="activeParticipation()"
        [submissionPolicy]="submissionPolicy()"
        [course]="exercise().course"
        [isPractice]="participationMode() === 'practice'"
    />
</div>
