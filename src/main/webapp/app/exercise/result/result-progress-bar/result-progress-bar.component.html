<div class="mw-custom text-nowrap" [class]="showBorder() ? 'rounded-lg p-1 border bg-module font-semibold' : ''" [pTooltip]="'artemisApp.editor.toolTip' | artemisTranslate">
    <div class="mb-1 progress-bar-status-text">
        <fa-icon [icon]="faCircleNotch" animation="spin" class="me-1" />
        @if (isQueued()) {
            <span jhiTranslate="artemisApp.editor.queued"></span>
        } @else {
            <span jhiTranslate="artemisApp.editor.building"></span>
        }
        @if (estimatedRemaining() && estimatedRemaining() > 0) {
            <span> {{ estimatedRemaining() | artemisDurationFromSeconds }}</span>
        }
    </div>
    <div class="flex justify-center items-center gap-2 w-full">
        <p-progressbar
            class="w-1/4"
            [class.no-transition]="!isQueueProgressBarAnimated()"
            [style.opacity]="queueProgressBarOpacity()"
            [value]="queueProgressBarValue()"
            [showValue]="false"
            color="var(--p-yellow-500)"
            [style]="{ height: '3px' }"
            aria-label="queue progress"
        />
        <p-progressbar
            class="w-3/4"
            [class.no-transition]="!isBuildProgressBarAnimated()"
            [style.opacity]="buildProgressBarOpacity()"
            [value]="buildProgressBarValue()"
            [showValue]="false"
            [style]="{ height: '3px' }"
            aria-label="build progress"
        />
    </div>
</div>
