@if (isVisible()) {
    <button
        id="requestAIFeedbackButton"
        class="btn btn-secondary float-end me-2"
        (click)="requestAIFeedback()"
        [disabled]="isRequestingFeedback || feedbackRequested || hasAnyAthenaResultForCurrentAttempt || (athenaFeedbackLimit > 0 && athenaFeedbackUsed >= athenaFeedbackLimit)"
    >
        @if (isRequestingFeedback) {
            <fa-icon [icon]="faSpinner" animation="spin" />
        } @else {
            <fa-icon [icon]="faRobot" />
        }
        @if (feedbackRequested) {
            <span jhiTranslate="artemisApp.exam.examSummary.feedbackRequested"></span>
        } @else {
            <span jhiTranslate="artemisApp.exam.examSummary.requestAIFeedback"></span>
        }
        @if (athenaFeedbackLimit > 0) {
            <span class="ms-1">({{ athenaFeedbackUsed }} / {{ athenaFeedbackLimit }})</span>
        }
    </button>
}
