<div class="d-flex flex-column flex-md-row gap-3 gap-lg-5">
    <jhi-exercise-timeline [timelineItems]="timelineItems()" [showInvalidBeforeTouched]="true" (timelineStatusChange)="timelineStatus.set($event)" />
    <div class="d-flex flex-column gap-2 align-items-start">
        <div class="d-flex flex-column">
            <div>
                <label class="form-check-label" for="workingTimeInMinutes" jhiTranslate="artemisApp.examManagement.workingTime"></label>
                <jhi-help-icon [text]="noWorkingTimeNeeded() ? 'artemisApp.examManagement.workingTimeTooltip' : 'artemisApp.examManagement.testExam.workingTimeTooltip'" />
            </div>
            <p-input-number
                inputId="workingTimeInMinutes"
                (ngModelChange)="workingTime.set($event * 60)"
                [ngModel]="(workingTime() ?? 0) / 60"
                [disabled]="noWorkingTimeNeeded()"
                [showButtons]="true"
                [useGrouping]="false"
                [min]="0"
                [max]="maxWorkingTimeInMinutes()"
                [maxFractionDigits]="3"
                [invalid]="!isWorkingTimeValid()"
            />
            @if (!isWorkingTimeValid()) {
                <p-message severity="error" size="small" variant="simple">
                    <span jhiTranslate="artemisApp.examManagement.workingTimeInvalid"></span>
                </p-message>
            }
        </div>
        <div class="d-flex flex-column">
            <div>
                <label class="form-check-label" for="gracePeriod" jhiTranslate="artemisApp.examManagement.gracePeriod"></label>
                <jhi-help-icon text="artemisApp.examManagement.gracePeriodTooltip" />
            </div>
            <p-input-number
                inputId="gracePeriod"
                [(ngModel)]="gracePeriod"
                [showButtons]="true"
                [useGrouping]="false"
                [min]="0"
                [max]="max_grace_period_in_seconds"
                [maxFractionDigits]="0"
                [invalid]="!isGracePeriodValid()"
            />
            @if (!isGracePeriodValid()) {
                <p-message severity="error" size="small" variant="simple">
                    <span jhiTranslate="artemisApp.examManagement.gracePeriodInvalid"></span>
                </p-message>
            }
        </div>
    </div>
</div>
@if (showVisibleFromWarning()) {
    <p-message class="mt-3" icon="pi pi-exclamation-triangle" size="small" severity="warn">
        <span jhiTranslate="entity.visibleDateWarningError"></span>
    </p-message>
}
