<div id="exam-mode-picker" class="d-flex align-items-start">
    <div class="btn-group" [ngClass]="{ disabled: disableInput() }">
        <div
            id="standard-mode"
            class="btn"
            [class.btn-success]="exam().examType === ExamType.REAL"
            [class.btn-default]="exam().examType !== ExamType.REAL"
            [class.disabled]="disableInput()"
            (click)="setExamType(ExamType.REAL)"
            jhiTranslate="artemisApp.examManagement.testExam.realExam"
        ></div>
        <div
            id="test-mode"
            class="btn"
            [class.btn-primary]="exam().examType === ExamType.TEST"
            [class.btn-default]="exam().examType !== ExamType.TEST"
            [class.disabled]="disableInput()"
            (click)="setExamType(ExamType.TEST)"
            jhiTranslate="artemisApp.examManagement.testExam.testExam"
        ></div>
        <div
            id="test-simulation-mode"
            class="btn"
            [class.btn-primary]="exam().examType === ExamType.TEST_WITH_SIMULATION"
            [class.btn-default]="exam().examType !== ExamType.TEST_WITH_SIMULATION"
            [class.disabled]="disableInput()"
            (click)="setExamType(ExamType.TEST_WITH_SIMULATION)"
            jhiTranslate="artemisApp.examManagement.testExam.testExamWithSimulation"
        ></div>
    </div>
</div>
