<div id="exam-mode-picker" class="d-flex align-items-start">
    <div class="btn-group" [ngClass]="{ disabled: disableInput() }">
        <div
            id="standard-mode"
            class="btn"
            [class.btn-success]="exam().examMode === ExamMode.REAL"
            [class.btn-default]="exam().examMode !== ExamMode.REAL"
            [class.disabled]="disableInput()"
            (click)="setExamMode(ExamMode.REAL)"
            jhiTranslate="artemisApp.examManagement.testExam.realExam"
        ></div>
        <div
            id="test-mode"
            class="btn"
            [class.btn-primary]="exam().examMode === ExamMode.TEST"
            [class.btn-default]="exam().examMode !== ExamMode.TEST"
            [class.disabled]="disableInput()"
            (click)="setExamMode(ExamMode.TEST)"
            jhiTranslate="artemisApp.examManagement.testExam.testExam"
        ></div>
        <div
            id="test-simulation-mode"
            class="btn"
            [class.btn-primary]="exam().examMode === ExamMode.TEST_WITH_SIMULATION"
            [class.btn-default]="exam().examMode !== ExamMode.TEST_WITH_SIMULATION"
            [class.disabled]="disableInput()"
            (click)="setExamMode(ExamMode.TEST_WITH_SIMULATION)"
            jhiTranslate="artemisApp.examManagement.testExam.testExamWithSimulation"
            [pTooltip]="'artemisApp.examManagement.testExam.testExamWithSimulationTooltip' | artemisTranslate"
        ></div>
    </div>
</div>
