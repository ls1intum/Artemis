<div class="row d-flex justify-content-center mb-1">
    <div class="col-md-8 col-11 align-items-center px-0">
        <h6 class="text-center" jhiTranslate="artemisApp.examScores.exerciseGroupTitle" [translateValues]="{ groupTitle: this.averageScores().title }"></h6>
        <div style="height: 100px">
            <p-chart type="bar" [data]="chartData()" [options]="chartOptions()" (onDataSelect)="onSelect($event)" />
        </div>
    </div>
</div>
