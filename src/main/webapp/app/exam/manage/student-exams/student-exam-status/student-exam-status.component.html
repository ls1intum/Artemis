@if (isTestExam()) {
    <p-tag class="d-flex gap-2 align-items-center" severity="info">
        <i class="pi pi-info-circle"></i>
        <span jhiTranslate="artemisApp.studentExams.studentExamStatusTestExam"></span>
    </p-tag>
} @else if (hasStudentsWithoutExam()) {
    <p-tag class="d-flex gap-2 align-items-center" [title]="'artemisApp.studentExams.studentExamStatusWarningTooltip' | artemisTranslate" severity="warn">
        <i class="pi pi-exclamation-triangle"></i>
        <span jhiTranslate="artemisApp.studentExams.studentExamStatusWarning"></span>
    </p-tag>
} @else {
    <p-tag class="d-flex gap-2 align-items-center" severity="success">
        <i class="pi pi-check"></i>
        <span jhiTranslate="artemisApp.studentExams.studentExamStatusSuccess"></span>
    </p-tag>
}
