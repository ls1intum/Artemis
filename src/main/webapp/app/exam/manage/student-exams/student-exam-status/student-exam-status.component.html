<p-tag
    class="d-flex gap-2 align-items-center"
    [severity]="isTestExam() ? 'info' : hasStudentsWithoutExam() ? 'warn' : 'success'"
    [title]="!isTestExam() && hasStudentsWithoutExam() ? ('artemisApp.studentExams.studentExamStatusWarningTooltip' | artemisTranslate) : ''"
>
    @if (isTestExam()) {
        <i class="pi pi-info-circle"></i>
        <span jhiTranslate="artemisApp.studentExams.studentExamStatusTestExam"></span>
    } @else if (hasStudentsWithoutExam()) {
        <i class="pi pi-exclamation-triangle"></i>
        <span jhiTranslate="artemisApp.studentExams.studentExamStatusWarning"></span>
    } @else {
        <i class="pi pi-check"></i>
        <span jhiTranslate="artemisApp.studentExams.studentExamStatusSuccess"></span>
    }
</p-tag>
