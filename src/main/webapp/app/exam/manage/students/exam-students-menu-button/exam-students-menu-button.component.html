<p-menu #menu [model]="model()" [popup]="true" appendTo="body">
    <ng-template #item let-item>
        <span class="p-menu-item-link" [class]="item.styleClass || ''" [title]="item.tooltip ? (item.tooltip | artemisTranslate) : ''">
            @if (item.icon) {
                <i [class]="item.icon + ' me-1'"></i>
            }
            <span class="p-menu-item-label" [jhiTranslate]="item.label"></span>
        </span>
    </ng-template>
</p-menu>

<button pButton [disabled]="disabled()" [class]="buttonClass()" (click)="toggleMenu($event)" [title]="label() | artemisTranslate" [severity]="severity()">
    <i [class]="buttonIconClass() + ' me-1'"></i>
    <span class="d-none d-sm-inline" [jhiTranslate]="label()"></span>
    <i class="pi pi-chevron-down fs-6"></i>
</button>
