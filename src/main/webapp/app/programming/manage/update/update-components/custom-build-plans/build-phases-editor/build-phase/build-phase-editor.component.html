<p-card class="mb-2 border">
    <div class="d-flex align-items-center gap-2 mb-2">
        <p-badge [value]="displayedNumber()" badgeSize="large" />
        <span class="bold">{{ 'artemisApp.programmingExercise.buildPhasesEditor.phase' | artemisTranslate }}: {{ phase().name }}</span>

        <div class="d-flex gap-1 ms-auto">
            <button
                [id]="'move-up-button-' + index()"
                pButton
                [pTooltip]="'artemisApp.programmingExercise.buildPhasesEditor.moveUp' | artemisTranslate"
                tooltipPosition="bottom"
                text
                rounded
                size="small"
                severity="secondary"
                [disabled]="isFirst()"
                (click)="moveUp.emit()"
            >
                <fa-icon [icon]="faArrowUp" pButtonIcon />
            </button>

            <button
                [id]="'move-down-button-' + index()"
                pButton
                [pTooltip]="'artemisApp.programmingExercise.buildPhasesEditor.moveDown' | artemisTranslate"
                tooltipPosition="bottom"
                text
                rounded
                size="small"
                severity="secondary"
                [disabled]="isLast()"
                (click)="moveDown.emit()"
            >
                <fa-icon [icon]="faArrowDown" pButtonIcon />
            </button>

            <button
                [id]="'delete-phase-button-' + index()"
                class="ms-2"
                pButton
                [pTooltip]="'artemisApp.programmingExercise.buildPhasesEditor.delete' | artemisTranslate"
                tooltipPosition="bottom"
                text
                rounded
                size="small"
                severity="danger"
                [disabled]="isOnly()"
                (click)="delete.emit()"
            >
                <fa-icon [icon]="faTrash" pButtonIcon />
            </button>
        </div>
    </div>
    <!-- Phase controls row -->
    <div class="d-flex align-items-start gap-2 mb-2">
        <div class="d-flex flex-column gap-1">
            <label [for]="'phase-name-input-' + index()" jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.phaseName"></label>
            <input
                [id]="'phase-name-input-' + index()"
                pInputText
                pSize="small"
                [ngModel]="phase().name"
                (ngModelChange)="updateName($event)"
                [placeholder]="'artemisApp.programmingExercise.buildPhasesEditor.phaseNamePlaceholder' | artemisTranslate"
                [invalid]="shouldShowNameValidationError()"
            />
            @if (shouldShowNameValidationError()) {
                <p-message severity="error" size="small" variant="simple">{{ nameValidationMessageKey() | artemisTranslate }}</p-message>
            }
        </div>

        <div class="d-flex flex-column gap-1">
            <div class="d-flex gap-1">
                <label [for]="'phase-condition-input-' + index()" jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.condition"></label>
            </div>
            <p-select
                [inputId]="'phase-condition-input-' + index()"
                size="small"
                [options]="conditionOptions()"
                optionLabel="label"
                optionValue="value"
                [ngModel]="phase().condition"
                (ngModelChange)="updateCondition($event)"
            />
        </div>
    </div>

    <div class="d-flex gap-2 mb-2">
        <p-checkbox [inputId]="'phase-force-run-input-' + index()" [binary]="true" [ngModel]="phase().forceRun" (ngModelChange)="updateForceRun($event)" />
        <div class="d-flex gap-1">
            <label [for]="'phase-force-run-input-' + index()" jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.forceRun"></label>
            <jhi-help-icon text="artemisApp.programmingExercise.buildPhasesEditor.forceRunHelp" />
        </div>
    </div>

    <!-- Script editor -->
    <div class="d-flex flex-column gap-1 mb-2">
        <div class="d-flex gap-1">
            <label jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.script"></label>
            <jhi-help-icon text="artemisApp.programmingExercise.buildPhasesEditor.scriptHelp" />
        </div>
        <jhi-monaco-editor-fit-text data-testid="script-editor" [text]="phase().script" (textChange)="updateScript($event)" />
    </div>

    <div class="d-flex gap-2 mb-2">
        <p-checkbox [inputId]="'phase-tests-expected-input-' + index()" [binary]="true" [ngModel]="!!phase().resultPaths?.length" (ngModelChange)="updateTestsExpected($event)" />
        <div class="d-flex gap-1">
            <label [for]="'phase-tests-expected-input-' + index()" jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.testsExpected"></label>
            <jhi-help-icon text="artemisApp.programmingExercise.buildPhasesEditor.resultPathsHelp" />
        </div>
    </div>

    @if (phase().resultPaths?.length) {
        <!-- Result paths -->
        <div class="d-flex flex-column gap-1">
            <div class="d-flex align-items-center">
                <label class="me-1" jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.resultPaths"></label>
            </div>

            @for (path of phase().resultPaths; track $index) {
                <div class="d-flex align-items-center gap-2">
                    <input
                        [attr.data-testid]="'result-path-input-' + $index"
                        pInputText
                        pSize="small"
                        [ngModel]="path"
                        (ngModelChange)="updateResultPath($index, $event)"
                        [placeholder]="'artemisApp.programmingExercise.buildPhasesEditor.resultPathPlaceholder' | artemisTranslate"
                    />
                    <button
                        [attr.data-testid]="'delete-result-path-button-' + $index"
                        pButton
                        [text]="true"
                        [rounded]="true"
                        size="small"
                        severity="danger"
                        (click)="deleteResultPath($index)"
                    >
                        <fa-icon [icon]="faXmark" pButtonIcon />
                    </button>
                </div>
            }

            <div>
                <button [id]="'add-result-path-button-' + index()" pButton [text]="true" size="small" severity="secondary" (click)="addResultPath()">
                    <fa-icon [icon]="faPlus" pButtonIcon />
                    <span pButtonLabel jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.addResultPath"></span>
                </button>
            </div>
        </div>
    }
</p-card>
