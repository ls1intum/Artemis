<div class="p-3 border rounded">
    <label class="mb-3" jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.title"></label>
    <jhi-help-icon text="artemisApp.programmingExercise.buildPhasesEditor.help" />

    @for (phase of phases(); track $index) {
        <jhi-build-phase
            [phase]="phase"
            [index]="$index"
            [phaseNames]="phaseNames()"
            [isLast]="$index === phaseCount() - 1"
            (phaseChange)="updatePhase($index, $event)"
            (delete)="deletePhase($index)"
            (moveUp)="moveUp($index)"
            (moveDown)="moveDown($index)"
        />
    }

    <button id="add-phase-button" pButton [text]="true" size="small" severity="secondary" (click)="addPhase()">
        <fa-icon [icon]="faPlus" pButtonIcon />
        <span pButtonLabel jhiTranslate="artemisApp.programmingExercise.buildPhasesEditor.addPhase"></span>
    </button>
</div>
