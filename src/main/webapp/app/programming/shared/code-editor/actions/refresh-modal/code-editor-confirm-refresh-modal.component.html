<form #confirmForm="ngForm" name="confirmForm" (ngSubmit)="refreshFiles()">
    <div class="p-3">
        <span class="d-inline-flex align-items-center gap-2">
            <fa-icon [icon]="faExclamationTriangle" class="text-warning" />
            <span jhiTranslate="artemisApp.editor.refresh.refreshExplanationLong"></span>
        </span>
    </div>
    <div class="d-flex justify-content-end gap-2 p-3 border-top">
        <button class="btn btn-secondary" type="button" data-dismiss="modal" (click)="closeModal()">
            <fa-icon [icon]="faBan" />&nbsp;<span jhiTranslate="entity.action.cancel"></span>
        </button>
        <button type="submit" class="btn btn-danger" [disabled]="!confirmForm.valid">
            <fa-icon [icon]="faTimes" />&nbsp;<span jhiTranslate="artemisApp.editor.refresh.performRefresh"></span>
        </button>
    </div>
</form>
