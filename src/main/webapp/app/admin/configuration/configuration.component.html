@if (beans()) {
    <h5 *adminTitleBarTitle id="configuration-page-heading" class="mb-0" jhiTranslate="configuration.title" data-cy="configurationPageHeading"></h5>
    <div>
        <div class="flex flex-col gap-2 mb-4">
            <label for="configuration-filter" jhiTranslate="configuration.filter"></label>
            <input
                id="configuration-filter"
                type="text"
                pInputText
                [ngModel]="beansFilter()"
                (ngModelChange)="updateBeansFilter($event)"
                data-testid="configuration-filter-input"
            />
        </div>
        <h3 id="spring-configuration">Spring configuration</h3>
        <p-table
            [value]="beans()"
            [size]="'small'"
            [stripedRows]="true"
            [customSort]="true"
            [sortField]="'prefix'"
            [sortOrder]="beansAscending() ? 1 : -1"
            (onSort)="onTableSort($event)"
            aria-describedby="spring-configuration"
            data-testid="spring-configuration-table"
        >
            <ng-template #header>
                <tr>
                    <th pSortableColumn="prefix" scope="col" class="w-2/5"><span jhiTranslate="configuration.table.prefix"></span> <p-sortIcon field="prefix" /></th>
                    <th scope="col" class="w-3/5"><span jhiTranslate="configuration.table.properties"></span></th>
                </tr>
            </ng-template>
            <ng-template #body let-bean>
                <tr>
                    <td class="break">
                        <span>{{ bean.prefix }}</span>
                    </td>
                    <td>
                        @for (property of bean.properties | keyvalue; track property) {
                            <div class="flex items-start gap-2 py-1">
                                <div class="w-2/5">{{ property.key }}</div>
                                <div class="w-3/5 flex justify-end">
                                    <p-tag severity="secondary" [value]="property.value | json" styleClass="break" data-testid="bean-property-value" />
                                </div>
                            </div>
                        }
                    </td>
                </tr>
            </ng-template>
        </p-table>
        @for (propertySource of propertySources(); track propertySource; let i = $index) {
            <div class="mt-4" data-testid="property-source-section">
                <h4 [id]="'property-source-' + i">
                    <span>{{ propertySource.name }}</span>
                </h4>
                <p-table [value]="propertySource.properties | keyvalue" [size]="'small'" [stripedRows]="true" [attr.aria-describedby]="'property-source-' + i">
                    <ng-template #header>
                        <tr>
                            <th scope="col" class="w-2/5">Property</th>
                            <th scope="col" class="w-3/5">Value</th>
                        </tr>
                    </ng-template>
                    <ng-template #body let-property>
                        <tr>
                            <td class="break">{{ property.key }}</td>
                            <td class="break">
                                <div class="flex justify-end">
                                    <p-tag severity="secondary" [value]="property.value.value" data-testid="property-source-value" />
                                </div>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        }
    </div>
}
