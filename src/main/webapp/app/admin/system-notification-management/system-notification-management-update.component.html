<div class="flex justify-center">
    <div class="w-full md:w-2/3">
        <h5 *adminTitleBarTitle id="myNotificationLabel" class="mb-0" jhiTranslate="artemisApp.systemNotification.createOrEditLabel"></h5>
        <form name="editForm" role="form" (ngSubmit)="save()" #editForm="ngForm" [formGroup]="form">
            <div>
                <div class="mb-3 flex flex-col gap-2">
                    <label for="title" class="font-bold" jhiTranslate="artemisApp.systemNotification.title"></label>
                    <input id="title" type="text" pInputText class="w-full" name="title" formControlName="title" />
                </div>
                <div class="mb-3 flex flex-col gap-2">
                    <label for="text" class="font-bold" jhiTranslate="artemisApp.systemNotification.text"></label>
                    <input id="text" type="text" pInputText class="w-full" name="text" formControlName="text" />
                </div>
                <div class="mb-3 flex flex-col gap-2">
                    <label for="type" class="font-bold" jhiTranslate="artemisApp.systemNotification.type"></label>
                    <p-select inputId="type" [options]="systemNotificationTypes" optionLabel="name" optionValue="value" formControlName="type" styleClass="w-full" />
                </div>
                <div class="mb-3">
                    <jhi-date-time-picker
                        [labelName]="'artemisApp.systemNotification.notificationDate' | artemisTranslate"
                        formControlName="notificationDate"
                        [shouldDisplayTimeZoneWarning]="false"
                        name="notificationDate"
                    />
                </div>
                <div class="mb-3">
                    <jhi-date-time-picker
                        [labelName]="'artemisApp.systemNotification.expireDate' | artemisTranslate"
                        formControlName="expireDate"
                        [shouldDisplayTimeZoneWarning]="false"
                        name="expireDate"
                    />
                    @if (expireDate?.errors?.expireMustBeAfterNotification) {
                        <small class="text-danger text-sm" jhiTranslate="error.systemNotificationNeedsNotificationBeforeExpiration"></small>
                    }
                </div>
                @if (!form.get('id')?.value) {
                    <div class="mb-3">
                        <div class="flex items-center gap-2">
                            <p-checkbox
                                [inputId]="'sendMaintenanceEmail'"
                                [ngModel]="sendMaintenanceEmail()"
                                (ngModelChange)="sendMaintenanceEmail.set($event)"
                                [ngModelOptions]="{ standalone: true }"
                                [binary]="true"
                            />
                            <label for="sendMaintenanceEmail" jhiTranslate="artemisApp.systemNotification.sendMaintenanceEmail"></label>
                        </div>
                        @if (sendMaintenanceEmail() && recipientCount() !== undefined) {
                            <p-message severity="info" class="mt-2">
                                <span jhiTranslate="artemisApp.systemNotification.maintenanceEmailInfo" [translateValues]="{ count: recipientCount() }"></span>
                            </p-message>
                        }
                    </div>
                }
            </div>
            <div class="mt-3 flex items-center gap-2">
                <button id="cancelButton" type="button" pButton size="small" severity="secondary" (click)="goToOverview()">
                    <fa-icon [icon]="faBan" />
                    <span jhiTranslate="entity.action.cancel"></span>
                </button>
                <button id="saveButton" type="submit" pButton size="small" [disabled]="editForm.form.invalid || isSaving()">
                    <fa-icon [icon]="faSave" />
                    <span jhiTranslate="entity.action.save"></span>
                </button>
            </div>
        </form>
    </div>
</div>
