<div class="p-1">
    <jhi-table-view
        [cols]="columns()"
        [vals]="organizations()"
        [totalRows]="totalCount()"
        (onLazyLoad)="loadOrganizations($event)"
        [rowActions]="selectorActions"
        [loading]="isLoading()"
        [options]="selectorTableOptions"
    />

    <div class="flex justify-end mt-3">
        <button type="button" pButton size="small" severity="secondary" (click)="closeModal(undefined)" jhiTranslate="entity.action.cancel" data-testid="cancel-btn"></button>
    </div>
</div>

<ng-template #logoCell let-params>
    @if (params.value) {
        <img [height]="36" [src]="params.value" (error)="$event.target.style.display = 'none'" alt="" />
    }
</ng-template>

<ng-template #selectorActions let-org>
    <button
        type="button"
        pButton
        size="small"
        [disabled]="isAlreadyAssigned()(org)"
        (click)="selectOrganization(org); $event.stopPropagation()"
        jhiTranslate="artemisApp.organizationManagement.modalSelector.select"
        data-testid="select-organization-btn"
    ></button>
</ng-template>
