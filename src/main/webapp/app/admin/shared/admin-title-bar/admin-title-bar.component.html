<div id="admin-title-bar" class="module-bg mb-2 flex min-h-11 items-center justify-between rounded-lg px-3 py-2">
    <div class="self-center">
        @if (customTitleTemplate()) {
            <ng-container *ngTemplateOutlet="customTitleTemplate()!" />
        } @else {
            <h5 class="mb-0" jhiTranslate="global.menu.admin.main"></h5>
        }
    </div>

    <div class="flex items-center gap-2" data-testid="admin-title-bar-actions">
        @if (customActionsTemplate()) {
            <ng-container *ngTemplateOutlet="customActionsTemplate()!" />
        }
    </div>
</div>
