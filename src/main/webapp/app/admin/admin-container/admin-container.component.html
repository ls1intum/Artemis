<div class="admin-layout" [class.admin-layout--collapsed]="isNavbarCollapsed()" data-testid="admin-layout">
    <aside class="admin-sidebar module-bg rounded-lg" data-testid="admin-sidebar-column">
        <jhi-admin-sidebar
            [isNavbarCollapsed]="isNavbarCollapsed()"
            [localCIActive]="localCIActive()"
            [ltiEnabled]="ltiEnabled()"
            [standardizedCompetenciesEnabled]="standardizedCompetenciesEnabled()"
            [atlasEnabled]="atlasEnabled()"
            [examEnabled]="examEnabled()"
            [passkeyEnabled]="passkeyEnabled()"
            [passkeyRequiredForAdmin]="passkeyRequiredForAdmin()"
            [isSuperAdmin]="isSuperAdmin()"
            (toggleCollapseState)="toggleCollapseState()"
        />
    </aside>

    <div class="admin-content ms-2" data-testid="admin-content-column">
        <jhi-admin-title-bar />
        <div class="admin-body module-bg rounded-lg p-3" data-testid="admin-body">
            <router-outlet />
        </div>
    </div>
</div>
