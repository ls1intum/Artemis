<h5 *adminTitleBarTitle id="passkey-management-page-heading" class="mb-0" jhiTranslate="artemisApp.adminPasskeyManagement.title"></h5>

<jhi-table-view [cols]="columns()" [vals]="passkeys()" [loading]="isLoading()" [options]="tableOptions" />

<ng-template #userNameCellTemplate let-cell>{{ cell.value || '-' }}</ng-template>

<ng-template #labelCellTemplate let-cell>{{ cell.value || '-' }}</ng-template>

<ng-template #createdCellTemplate let-cell>{{ cell.value | artemisDate }}</ng-template>

<ng-template #lastUsedCellTemplate let-cell>{{ cell.value ? (cell.value | artemisDate) : '-' }}</ng-template>

<ng-template #approvedCellTemplate let-cell>
    <div class="flex items-center gap-2">
        <p-toggleswitch
            [ngModel]="cell.data.isSuperAdminApproved"
            [inputId]="'approval-' + cell.data.credentialId"
            (onChange)="onApprovalToggle(cell.data)"
            [attr.aria-label]="'artemisApp.adminPasskeyManagement.toggleApproval' | artemisTranslate"
            data-testid="passkey-approval-toggle"
        />
        @if (cell.data.isSuperAdminApproved) {
            <span jhiTranslate="artemisApp.adminPasskeyManagement.yes"></span>
        } @else {
            <span jhiTranslate="artemisApp.adminPasskeyManagement.no"></span>
        }
    </div>
</ng-template>
