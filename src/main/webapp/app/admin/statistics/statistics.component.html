<div>
    <h5 *adminTitleBarTitle id="statistics-page-heading" class="mb-0" jhiTranslate="statistics.title"></h5>
    <div *adminTitleBarActions data-testid="span-selector">
        <p-selectbutton [options]="spanOptions" [ngModel]="currentSpan()" (ngModelChange)="onTabChanged($event)" optionLabel="label" optionValue="value" size="small">
            <ng-template let-option #item>
                {{ option.label | artemisTranslate }}
            </ng-template>
        </p-selectbutton>
    </div>
    <div class="mb-5"></div>
    @for (graph of graphTypes; track graph; let i = $index) {
        <div id="graph-{{ i }}" class="graph">
            <jhi-statistics-graph [graphType]="graph" [currentSpan]="currentSpan()" [statisticsView]="statisticsView()" />
        </div>
    }
</div>
