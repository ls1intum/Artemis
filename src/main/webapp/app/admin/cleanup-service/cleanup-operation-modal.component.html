<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [closable]="true"
    [closeOnEscape]="false"
    [dismissableMask]="false"
    [draggable]="false"
    [appendTo]="'body'"
    [style]="{ width: '50dvw' }"
    [header]="'cleanupService.operation.' + operation().name | artemisTranslate"
>
    @if (operation().name === 'deleteOrphans') {
        <p
            [jhiTranslate]="'cleanupService.execute.questionWithoutDates'"
            [translateValues]="{
                operationName: 'cleanupService.operation.' + operation().name | artemisTranslate,
            }"
        ></p>
    } @else {
        <p
            [jhiTranslate]="'cleanupService.execute.question'"
            [translateValues]="{
                operationName: 'cleanupService.operation.' + operation().name | artemisTranslate,
                deleteFrom: operation().deleteFrom | artemisDate,
                deleteTo: operation().deleteTo | artemisDate,
            }"
        ></p>
    }
    <div>
        <p jhiTranslate="cleanupService.modal.affectedEntities"></p>
        <ul>
            @for (key of cleanupKeys(); track key) {
                <li>
                    <span [jhiTranslate]="'cleanupService.entities.' + key"></span>
                    : {{ counts()[key] }}
                    @if (operationExecuted()) {
                        @if (counts()[key] > 0) {
                            <fa-icon [icon]="faTimes" class="text-(--p-red-500)" />
                        } @else {
                            <fa-icon [icon]="faCheckCircle" class="text-(--p-green-500)" />
                        }
                    }
                </li>
            }
        </ul>
        @if (!hasEntriesToDelete()) {
            <p class="text-muted-color" jhiTranslate="cleanupService.modal.noEntriesToDelete"></p>
        }
    </div>
    <ng-template #footer>
        <div class="flex justify-end gap-2">
            <button pButton type="button" severity="secondary" [outlined]="true" size="small" (click)="close()" data-testid="close-button">
                <span jhiTranslate="cleanupService.button.close"></span>
            </button>
            <button pButton type="button" severity="danger" size="small" [disabled]="!hasEntriesToDelete()" (click)="executeCleanupOperation()" data-testid="execute-button">
                <fa-icon [icon]="faTrash" />
                <span jhiTranslate="cleanupService.button.execute"></span>
            </button>
        </div>
    </ng-template>
</p-dialog>
