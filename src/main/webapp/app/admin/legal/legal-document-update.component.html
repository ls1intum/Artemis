<div>
    <h5 *adminTitleBarTitle id="legal-document-update-heading" class="mb-0" data-cy="legalDocumentPageHeading" jhiTranslate="{{ titleKey() }}"></h5>
    <jhi-markdown-editor-monaco
        [markdown]="legalDocument()?.text ?? ''"
        (markdownChange)="onContentChanged($event)"
        [resizableMinHeight]="MIN_HEIGHT"
        [resizableMaxHeight]="MAX_HEIGHT"
        [initialEditorHeight]="MIN_HEIGHT"
        [enableFileUpload]="false"
    />
    <div data-testid="save-status">
        @if (!unsavedChanges() && !isSaving()) {
            <div data-testid="status-saved">
                <fa-icon [icon]="faCheckCircle" class="text-(--success) me-1" [pTooltip]="'artemisApp.legal.savedTooltip' | artemisTranslate" />
                <span class="text-(--info)" jhiTranslate="artemisApp.legal.saved"></span>
            </div>
        }
        @if (unsavedChanges() && !isSaving()) {
            <div data-testid="status-unsaved">
                <fa-icon [icon]="faExclamationTriangle" class="text-(--warning) me-1" [pTooltip]="'artemisApp.legal.unsavedTooltip' | artemisTranslate" />
                <span class="text-(--info)" jhiTranslate="artemisApp.legal.unsaved"></span>
            </div>
        }
        @if (isSaving()) {
            <div data-testid="status-saving">
                <fa-icon [icon]="faCircleNotch" class="me-1" [pTooltip]="'artemisApp.legal.savingTooltip' | artemisTranslate" />
                <span class="text-(--info)" jhiTranslate="artemisApp.legal.saving"></span>
            </div>
        }
    </div>
    <div class="flex mt-3 gap-3 items-center">
        <button
            type="submit"
            pButton
            size="small"
            (click)="updateLegalDocument()"
            id="update-legal-document-btn"
            data-testid="save-button"
            [disabled]="!currentContentTrimmed() || isSaving()"
        >
            <fa-icon [icon]="faSave" />
            <span jhiTranslate="entity.action.save"></span>
        </button>
        <p-selectButton
            size="small"
            [options]="LANGUAGE_OPTIONS"
            [ngModel]="currentLanguage()"
            (ngModelChange)="onLanguageChange($event)"
            optionLabel="labelKey"
            optionValue="value"
            [allowEmpty]="false"
        >
            <ng-template let-option #item>
                {{ option.labelKey | artemisTranslate }}
            </ng-template>
        </p-selectButton>
    </div>
</div>

<jhi-unsaved-changes-warning [(visible)]="showUnsavedChangesWarning" [textMessage]="warningTextMessage()" (discarded)="onDiscardChanges()" />
