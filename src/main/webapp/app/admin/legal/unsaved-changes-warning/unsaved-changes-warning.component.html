<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [closable]="true"
    [closeOnEscape]="false"
    [dismissableMask]="false"
    [draggable]="false"
    [appendTo]="'body'"
    [style]="{ width: '50dvw' }"
    [header]="'entity.action.unsavedChanges' | artemisTranslate"
>
    <h5 jhiTranslate="{{ textMessage() }}"></h5>
    <div class="flex gap-2 mt-3">
        <button pButton id="discard-content-btn" data-testid="discard-button" (click)="discardContent()" type="button">
            <span jhiTranslate="entity.action.discardChanges"></span>
        </button>
        <button pButton id="continue-editing-btn" data-testid="continue-button" severity="secondary" (click)="continueEditing()" type="button">
            <span jhiTranslate="entity.action.goBack"></span>
        </button>
    </div>
</p-dialog>
