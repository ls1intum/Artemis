<div class="flex flex-col h-full">
    <h5 *adminTitleBarTitle id="organization-management-page-heading" class="mb-0" jhiTranslate="artemisApp.organizationManagement.title"></h5>
    <div *adminTitleBarActions>
        <button pButton size="small" [routerLink]="['./new']" data-testid="add-organization-btn">
            <fa-icon [icon]="faPlus" />
            <span jhiTranslate="artemisApp.organizationManagement.addLabel"></span>
        </button>
    </div>
    <div class="flex-1 min-h-0">
        <jhi-table-view
            [cols]="columns()"
            [vals]="organizations()"
            [totalRows]="totalCount()"
            (onLazyLoad)="loadOrganizations($event)"
            [rowActions]="organizationActions"
            [loading]="isLoading()"
            [options]="tableOptions"
        />
    </div>
</div>

<ng-template #nameColumn let-params>
    <span
        ><a [routerLink]="['./', params.data.id]">{{ params.data.name }}</a></span
    >
</ng-template>

<ng-template #organizationActions let-organization>
    <div class="flex items-center justify-end gap-2" data-testid="organization-row-actions">
        <button
            pButton
            size="small"
            severity="warn"
            type="button"
            [routerLink]="['./', organization.id, 'edit']"
            queryParamsHandling="merge"
            (click)="$event.stopPropagation()"
            data-testid="edit-organization-btn"
        >
            <fa-icon [icon]="faPencil" />
            <span class="hidden md:inline" jhiTranslate="entity.action.edit"></span>
        </button>
        <button
            jhiDeleteButton
            [entityTitle]="organization.name"
            deleteQuestion="artemisApp.organizationManagement.delete.question"
            (delete)="deleteOrganization(organization.id)"
            [dialogError]="dialogError$"
            (click)="$event.stopPropagation()"
            data-testid="delete-organization-btn"
        >
            <fa-icon [icon]="faTrash" />
        </button>
    </div>
</ng-template>
