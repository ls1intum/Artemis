@if (loggers()) {
    <h5 *adminTitleBarTitle id="logs-page-heading" class="mb-0" jhiTranslate="logs.title" data-cy="logsPageHeading"></h5>
    <!--
        Full-height flex column so the table's scroll viewport is bounded by the real available space
        (the .admin-body scroll region), not a magic `calc(100vh - …)` that does not match it.
        The table wrapper is flex: 1 with min-height: 0, and the p-table uses scrollHeight="flex"
        so PrimeNG's virtual-scroll viewport fills exactly that bounded area. This keeps the last
        logger reachable and prevents the scroll from jumping.
    -->
    <div class="flex h-full min-h-0 flex-col gap-3">
        <p jhiTranslate="logs.nbloggers" [translateValues]="{ total: loggers().length }">There are {{ loggers().length }} loggers.</p>
        <div class="flex flex-col gap-2">
            <label for="logs-filter" jhiTranslate="logs.filter"></label>
            <input id="logs-filter" data-testid="logs-filter-input" type="text" pInputText class="w-full" [ngModel]="filterInput()" (ngModelChange)="updateFilter($event)" />
        </div>
        <p-table
            [value]="filteredAndOrderedLoggers()"
            [tableStyle]="{ 'min-width': '30rem' }"
            [scrollable]="true"
            [virtualScroll]="true"
            [virtualScrollItemSize]="logsTableRowHeight"
            scrollHeight="flex"
            styleClass="min-h-0 flex-1"
            aria-describedby="logs-page-heading"
            data-testid="logs-table"
        >
            <ng-template #header>
                <tr jhiSort [predicate]="orderProp()" [ascending]="ascending()" (predicateChange)="orderProp.set($event!)" (ascendingChange)="ascending.set($event)">
                    <th jhiSortBy="name" scope="col" style="width: 100%; max-width: 0"><span jhiTranslate="logs.table.name"></span> <fa-icon [icon]="faSort" /></th>
                    <th jhiSortBy="level" scope="col" class="text-end whitespace-nowrap"><span jhiTranslate="logs.table.level"></span> <fa-icon [icon]="faSort" /></th>
                </tr>
            </ng-template>
            <ng-template #body let-logger>
                <tr>
                    <td class="truncate" style="width: 100%; max-width: 0">
                        <small>{{ logger.name | slice: 0 : 140 }}</small>
                    </td>
                    <td class="text-end whitespace-nowrap">
                        <p-buttongroup>
                            <p-button
                                size="small"
                                data-testid="log-level-trace"
                                [severity]="logger.level === 'TRACE' ? null : 'secondary'"
                                (onClick)="changeLevel(logger.name, 'TRACE')"
                                label="TRACE"
                            />
                            <p-button
                                size="small"
                                data-testid="log-level-debug"
                                [severity]="logger.level === 'DEBUG' ? 'success' : 'secondary'"
                                (onClick)="changeLevel(logger.name, 'DEBUG')"
                                label="DEBUG"
                            />
                            <p-button
                                size="small"
                                data-testid="log-level-info"
                                [severity]="logger.level === 'INFO' ? 'info' : 'secondary'"
                                (onClick)="changeLevel(logger.name, 'INFO')"
                                label="INFO"
                            />
                            <p-button
                                size="small"
                                data-testid="log-level-warn"
                                [severity]="logger.level === 'WARN' ? 'warn' : 'secondary'"
                                (onClick)="changeLevel(logger.name, 'WARN')"
                                label="WARN"
                            />
                            <p-button
                                size="small"
                                data-testid="log-level-error"
                                [severity]="logger.level === 'ERROR' ? 'danger' : 'secondary'"
                                (onClick)="changeLevel(logger.name, 'ERROR')"
                                label="ERROR"
                            />
                            <p-button
                                size="small"
                                data-testid="log-level-off"
                                [severity]="logger.level === 'OFF' ? 'contrast' : 'secondary'"
                                (onClick)="changeLevel(logger.name, 'OFF')"
                                label="OFF"
                            />
                        </p-buttongroup>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
}
