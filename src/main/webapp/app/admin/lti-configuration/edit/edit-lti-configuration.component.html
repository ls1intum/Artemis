<div class="flex justify-center">
    <div class="w-full md:w-2/3">
        <h5
            *adminTitleBarTitle
            id="jhi-lecture-heading"
            class="mb-0"
            jhiTranslate="{{ !platform()?.id ? 'artemisApp.lti.addLtiPlatform' : 'artemisApp.lti.editLtiPlatform' }}"
        ></h5>
        @if (loadFailed()) {
            <p-message severity="error" styleClass="mt-3 w-full" data-testid="lti-load-error">
                <span jhiTranslate="artemisApp.lti.editConfiguration.loadError"></span>
            </p-message>
        } @else {
            <p-message severity="info" styleClass="mt-3 w-full" data-testid="lti-documentation-message">
                <span jhiTranslate="artemisApp.lti.edit.documentationLink"></span>
                <a
                    href="https://docs.artemis.tum.de/instructor/lti-configuration/"
                    target="_blank"
                    rel="external noopener noreferrer"
                    jhiTranslate="artemisApp.lti.edit.documentationLinkText"
                ></a
                >.
            </p-message>
            <form [formGroup]="platformConfigurationForm" (ngSubmit)="save()" #editForm="ngForm">
                <div class="mt-3">
                    <div class="mb-3 flex flex-col gap-2" [hidden]="!platform()?.registrationId">
                        <div class="flex items-center gap-1">
                            <label jhiTranslate="artemisApp.lti.registrationId" for="field_registrationId"></label>
                            <jhi-help-icon text="artemisApp.lti.edit.registrationIdTooltip" />
                        </div>
                        <input type="text" pInputText class="w-full" name="registrationId" id="field_registrationId" formControlName="registrationId" />
                    </div>
                    <div class="mb-3 flex flex-col gap-2">
                        <div class="flex items-center gap-1">
                            <label jhiTranslate="artemisApp.lti.customName" for="field_customName"></label>
                            <jhi-help-icon text="artemisApp.lti.edit.customNameIdTooltip" />
                        </div>
                        <input type="text" pInputText class="w-full" name="customName" id="field_customName" formControlName="customName" />
                    </div>
                    <div class="mb-3 flex flex-col gap-2">
                        <div class="flex items-center gap-1">
                            <label jhiTranslate="artemisApp.lti.toolUrl" for="field_toolUrl"></label>
                            <jhi-help-icon text="artemisApp.lti.edit.originalUrlTooltip" />
                        </div>
                        <input type="text" pInputText class="w-full" name="originalUrl" id="field_toolUrl" formControlName="originalUrl" />
                    </div>
                    <div class="mb-3 flex flex-col gap-2">
                        <div class="flex items-center gap-1">
                            <label jhiTranslate="artemisApp.lti.clientId" for="field_clientId"></label>
                            <span class="text-danger">*</span>
                            <jhi-help-icon text="artemisApp.lti.edit.clientIdTooltip" />
                        </div>
                        <input type="text" pInputText class="w-full" name="clientId" id="field_clientId" formControlName="clientId" [invalid]="isFieldInvalid('clientId')" />
                        @if (isFieldInvalid('clientId')) {
                            <small class="text-danger" jhiTranslate="artemisApp.lti.validation.clientIdRequired"></small>
                        }
                    </div>
                    <div class="mb-3 flex flex-col gap-2">
                        <div class="flex items-center gap-1">
                            <label jhiTranslate="artemisApp.lti.authorizationUri" for="field_authorizationUri"></label>
                            <span class="text-danger">*</span>
                            <jhi-help-icon text="artemisApp.lti.edit.authorizationUriTooltip" />
                        </div>
                        <input
                            type="text"
                            pInputText
                            class="w-full"
                            name="authorizationUri"
                            id="field_authorizationUri"
                            formControlName="authorizationUri"
                            [invalid]="isFieldInvalid('authorizationUri')"
                        />
                        @if (isFieldInvalid('authorizationUri')) {
                            <small class="text-danger" jhiTranslate="artemisApp.lti.validation.authorizationUriRequired"></small>
                        }
                    </div>
                    <div class="mb-3 flex flex-col gap-2">
                        <div class="flex items-center gap-1">
                            <label jhiTranslate="artemisApp.lti.tokenUri" for="field_tokenUri"></label>
                            <span class="text-danger">*</span>
                            <jhi-help-icon text="artemisApp.lti.edit.tokenUriTooltip" />
                        </div>
                        <input type="text" pInputText class="w-full" name="tokenUri" id="field_tokenUri" formControlName="tokenUri" [invalid]="isFieldInvalid('tokenUri')" />
                        @if (isFieldInvalid('tokenUri')) {
                            <small class="text-danger" jhiTranslate="artemisApp.lti.validation.tokenUriRequired"></small>
                        }
                    </div>
                    <div class="mb-3 flex flex-col gap-2">
                        <div class="flex items-center gap-1">
                            <label jhiTranslate="artemisApp.lti.jwkSetUri" for="field_jwkSetUri"></label>
                            <span class="text-danger">*</span>
                            <jhi-help-icon text="artemisApp.lti.edit.jwkSetUriTooltip" />
                        </div>
                        <input type="text" pInputText class="w-full" name="jwkSetUri" id="field_jwkSetUri" formControlName="jwkSetUri" [invalid]="isFieldInvalid('jwkSetUri')" />
                        @if (isFieldInvalid('jwkSetUri')) {
                            <small class="text-danger" jhiTranslate="artemisApp.lti.validation.jwkSetUriRequired"></small>
                        }
                    </div>
                </div>

                <div class="mt-3 flex items-center justify-end gap-2">
                    <p-button type="button" id="cancel-save" size="small" severity="secondary" (onClick)="navigateToLtiConfigurationPage()" data-testid="cancel-platform-button">
                        <fa-icon [icon]="faBan" />
                        <span jhiTranslate="entity.action.cancel"></span>
                    </p-button>
                    <button type="submit" id="save-entity" pButton size="small" [disabled]="isSaving() || platformConfigurationForm.invalid" data-testid="save-platform-button">
                        <fa-icon [icon]="faSave" />
                        <span jhiTranslate="entity.action.save"></span>
                    </button>
                </div>
            </form>
        }
    </div>
</div>
