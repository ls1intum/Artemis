<div>
    <h3>Lernpräferenzen</h3>
    <div>
        <h4>Fokus</h4>
        <label for="aimForGradeOrBonus" class="form-label">Grade</label>
        <label for="aimForGradeOrBonus" class="float-end">Bonus</label>
        <input type="range" class="form-range" min="0" max="5" id="aimForGradeOrBonus" />
    </div>
    <div>
        <h4>Zeitinvestment</h4>
        <label for="timeInvestment" class="form-label">Wenig</label>
        <label for="timeInvestment" class="float-end">Viel</label>
        <input type="range" class="form-range" min="0" max="5" id="timeInvestment" />
    </div>
    <div>
        <h4>Wiederholungen</h4>
        <label for="repetitionIntensity" class="form-label">Selten</label>
        <label for="repetitionIntensity" class="float-end">Oft</label>
        <input type="range" class="form-range" min="0" max="5" id="repetitionIntensity" />
    </div>
</div>
