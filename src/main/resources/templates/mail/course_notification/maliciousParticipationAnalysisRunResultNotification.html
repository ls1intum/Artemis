<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="head">
    <head>
        <title th:text="#{email.courseNotification.maliciousParticipationAnalysisRunResultNotification.title}">Malicious Participation Analysis finished</title>
        <th:block th:replace="~{mail/notification/fragments :: headMetaDataAndIconLink}"/>
        <th:block th:replace="~{mail/notification/fragments :: css}"/>
    </head>
</th:block>
<body>
<th:block th:replace="~{mail/notification/fragments :: header}"/>
<div id="message-body">
    <th:block>
        <span th:text="#{email.greetings}">Dear </span>
        <span class="bold-text" th:text="${recipient.getName()}">fullName</span>
        <br>
    </th:block>

    <div class="notification-content">
        <span th:text="#{email.courseNotification.maliciousParticipationAnalysisRunResultNotification.text(${parameters['scopeTitle']}, ${parameters['courseTitle']})}">
            Malicious Participation Analysis finished.
        </span>

        <p class="bold-text" th:text="#{email.courseNotification.maliciousParticipationAnalysisRunResultNotification.summary}">Summary</p>
        <ul>
            <li>
                <span th:text="#{email.courseNotification.maliciousParticipationAnalysisRunResultNotification.analyzed}">Analyzed participations</span>: <span
                    th:text="${parameters['analyzed']}">0</span>
            </li>
            <li>
                <span th:text="#{email.courseNotification.maliciousParticipationAnalysisRunResultNotification.maliciousCount}">Malicious</span>: <span
                    th:text="${parameters['maliciousCount']}">0</span>
            </li>
            <li>
                <span th:text="#{email.courseNotification.maliciousParticipationAnalysisRunResultNotification.benignCount}">Benign</span>: <span
                    th:text="${parameters['benignCount']}">0</span>
            </li>
            <li>
                <span th:text="#{email.courseNotification.maliciousParticipationAnalysisRunResultNotification.failed}">Failed analyses</span>: <span
                    th:text="${parameters['failed']}">0</span>
            </li>
        </ul>

        <th:block th:replace="~{mail/notification/fragments :: openInArtemisButton}"/>
    </div>

    <th:block th:replace="~{mail/notification/fragments :: farewell}"/>
</div>
<th:block>
    <footer>
        <span th:text="#{email.notification.aux.footer}"/>
        <a th:href="@{|${serverUrl}/courses/${courseId}/settings|}">
            <span th:text="#{email.notification.aux.footer.link}"/>
        </a>
    </footer>
</th:block>
</body>
</html>
