- name: install
  script: 'Rscript -e ''remotes::install_local()'''
- name: syntax_check
  script: 'Rscript -e ''files <- list.files(".", pattern = "\\.[Rr]$", recursive = TRUE, full.names = TRUE); invisible(lapply(files, function(f) parse(file = f, keep.source = FALSE)))'''
- name: run_all_tests
  script: 'Rscript -e ''library("testthat"); options(testthat.output_file = "junit.xml"); test_local(".", reporter = "junit")'''
  resultPaths:
    - tests/testthat/junit.xml
