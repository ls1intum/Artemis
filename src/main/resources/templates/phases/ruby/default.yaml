- name: install_dependencies
  script: |-
    cd "${testWorkingDirectory}"
    bundler install
- name: syntax_check
  script: |-
    find . -type f -name "*.rb" -print0 | xargs -0 -n1 ruby -wc
- name: test
  script: |-
    cd "${testWorkingDirectory}"
    bundler exec rake ci:test
  resultPaths:
    - '${testWorkingDirectory}/report.xml'
