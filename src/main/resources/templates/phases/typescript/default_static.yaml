- name: install_dependencies
  script: 'npm ci --prefer-offline --no-audit'
- name: build
  script: npm run build
- name: test
  script: 'npm run test:ci'
  resultPaths:
    - junit.xml
- name: static_code_analysis
  script: 'npm run lint:ci || [ $? -eq 1 ]'
  forceRun: true
  resultPaths:
    - eslint.sarif
