artemis:
    atlas:
        enabled: true
        atlasml:
            enabled: false
    hyperion:
        enabled: false
    iris:
        enabled: false
    exam:
        enabled: true
    plagiarism:
        enabled: true
    text:
        enabled: true
    modeling:
        enabled: true
    fileupload:
        enabled: true
    lecture:
        enabled: true
    sharing:
        enabled: false
        # the shared common secret
        apikey: <placeholder>
        # a url used to force reinitialization of Sharing Platform configuration
        # if not set, you have to wait for the next scheduled reinitialization request from the sharing platform
        # (typically every 5 minutes)
        serverurl: http://localhost:9001
        actionname: Export to Artemis@testInstance

    tutorialgroup:
        enabled: true
    lti:
        enabled: false
    user-management:
        passkey:
            enabled: false # used by Constants.PASSKEY_ENABLED_PROPERTY_NAME
            require-for-administrator-features: false # if true, administrators must authenticate with passkey to access admin features
            ask-users-to-setup: true # if true, users who have not set up a passkey will be asked to do so
            token-validity-in-seconds-for-passkey: 15552000 # jwtToken is valid for 180 days when using passkey authentication
spring:
    liquibase:
        enabled: true
    autoconfigure:
        # These AutoConfiguration are excluded as they include metrics which are not evaluated and only cause unnecessary network load
        # They can be included once they are processed
        exclude:
          # Important: Keep in sync with application-buildagent.yml (except build agent specific exclusions)
          - org.springframework.boot.data.autoconfigure.metrics.DataRepositoryMetricsAutoConfiguration
          # Note: DataSourcePoolMetricsAutoConfiguration is NOT excluded — it registers hikaricp.connections.* gauges for the admin metrics page
          - org.springframework.boot.micrometer.metrics.autoconfigure.startup.StartupTimeMetricsListenerAutoConfiguration
          - org.springframework.boot.micrometer.metrics.autoconfigure.task.TaskExecutorMetricsAutoConfiguration
          - org.springframework.boot.tomcat.autoconfigure.metrics.TomcatMetricsAutoConfiguration
    cloud:
        loadbalancer:
            cache:
                enabled: true

management:
    endpoint:
        health:
            show-details: when_authorized
            roles: 'ROLE_ADMIN,ROLE_SUPER_ADMIN'
            probes:
                enabled: true
        artemismetrics:
            access: read_only
    metrics:
        enable:
            http: true
            jvm: true
            logback: true
            process: true
            system: true
